<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>圣堂状态</title>
<style>
:root {
  --gold: #d4af69;
  --gold-2: #f3e0b0;
  --rose: #c45c6a;
  --blue: #6a8eab;
  --ok: #7a9e80;
  --text: #f5f1e8;
  --muted: rgba(245, 241, 232, 0.55);
  --font: "Cormorant Garamond", "Noto Serif SC", "Songti SC", serif;
  --sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --ease: cubic-bezier(.22, 1, .36, 1);
  --radius: 22px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body {
  /* padding 必须为 0（MVU 状态栏自查）；边距放容器 */
}
body.demo {
  background:
    radial-gradient(900px 500px at 15% 0%, rgba(158,61,74,.42), transparent 55%),
    radial-gradient(800px 480px at 90% 10%, rgba(91,124,153,.36), transparent 50%),
    linear-gradient(180deg, #1a1520, #0a0b0e 45%, #12161f);
}

/* Ambient orbs (glass needs something to blur) */
.stage {
  position: relative;
  max-width: 960px;
  margin: 0 auto;
  overflow: clip;
  padding: max(8px, env(safe-area-inset-top)) max(6px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left));
}
.status-state {
  display: none;
  margin: 10px;
  padding: 14px;
  border: 1px solid rgba(212, 175, 105, .24);
  border-radius: 14px;
  background: rgba(18, 20, 28, .88);
  color: var(--muted);
  text-align: center;
}
.status-state.show { display: block; }
.status-state.status-error { color: #ef9b91; border-color: rgba(196, 92, 72, .42); }
.status-state.status-empty { color: var(--gold-2); }
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  pointer-events: none;
  z-index: 0;
  opacity: .55;
  animation: orbFloat 9s ease-in-out infinite;
}
.orb.a {
  width: 180px; height: 180px;
  top: -30px; left: -20px;
  background: radial-gradient(circle, rgba(196,92,106,.55), transparent 70%);
}
.orb.b {
  width: 220px; height: 220px;
  top: 20%; right: -40px;
  background: radial-gradient(circle, rgba(106,142,171,.5), transparent 70%);
  animation-delay: -3s;
}
.orb.c {
  width: 160px; height: 160px;
  bottom: 10%; left: 30%;
  background: radial-gradient(circle, rgba(212,175,105,.35), transparent 70%);
  animation-delay: -5s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(12px, -16px) scale(1.08); }
}

.wrap {
  position: relative;
  z-index: 1;
  border-radius: var(--radius);
  overflow: hidden;
  isolation: isolate;
  border: 1px solid rgba(255,255,255,.16);
  background:
    linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.03) 42%, rgba(212,175,105,.06)),
    rgba(16, 18, 26, 0.38);
  backdrop-filter: blur(36px) saturate(1.7);
  -webkit-backdrop-filter: blur(36px) saturate(1.7);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.22),
    inset 0 -1px 0 rgba(0,0,0,.2),
    0 24px 60px rgba(0,0,0,.4),
    0 0 0 1px rgba(212,175,105,.08);
  animation: panelIn .85s var(--ease) both;
}
.wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(700px 260px at 8% -20%, rgba(196,92,106,.2), transparent 55%),
    radial-gradient(600px 240px at 100% 0%, rgba(106,142,171,.18), transparent 50%),
    linear-gradient(180deg, rgba(255,255,255,.12), transparent 32%);
  pointer-events: none;
  z-index: 0;
}
/* film grain */
.wrap::after {
  content: "";
  position: absolute;
  inset: 0;
  opacity: .035;
  pointer-events: none;
  z-index: 3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  mix-blend-mode: overlay;
}
.sheen {
  position: absolute;
  top: -50%; left: -40%;
  width: 45%; height: 200%;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,.14), transparent);
  transform: rotate(18deg);
  animation: sheen 6.5s ease-in-out infinite;
  pointer-events: none;
  z-index: 2;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(18px) scale(.97); filter: blur(8px); }
  to { opacity: 1; transform: none; filter: none; }
}
@keyframes sheen {
  0%, 100% { transform: translateX(-30%) rotate(18deg); opacity: 0; }
  30% { opacity: .7; }
  55% { transform: translateX(260%) rotate(18deg); opacity: 0; }
}

.head, .identity, .stats, .hint { position: relative; z-index: 4; }

.head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 14px;
  padding: 18px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
  animation: fadeUp .7s var(--ease) .08s both;
}
.brand {
  font-family: var(--font);
  letter-spacing: .26em;
  color: var(--gold-2);
  font-size: clamp(15px, 2.6vw, 18px);
  text-shadow: 0 0 28px rgba(212,175,105,.35);
}
.brand small {
  display: block;
  margin-top: 6px;
  letter-spacing: .18em;
  color: var(--muted);
  font-size: 10px;
  font-family: var(--sans);
}
.scene { text-align: right; color: var(--muted); font-size: 12px; }
.scene b {
  display: block;
  color: var(--gold);
  font-family: var(--font);
  font-size: clamp(16px, 3vw, 20px);
  font-weight: 500;
  margin-bottom: 3px;
}

.identity {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1.15fr;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.id-cell {
  padding: 14px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.04);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: transform .4s var(--ease), background .35s ease, border-color .35s ease, box-shadow .4s var(--ease);
  animation: fadeUp .7s var(--ease) both;
}
.id-cell:nth-child(1) { animation-delay: .12s; }
.id-cell:nth-child(2) { animation-delay: .2s; }
.id-cell:nth-child(3) { animation-delay: .28s; }
.id-cell:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,.07);
  border-color: rgba(212,175,105,.28);
  box-shadow: 0 10px 28px rgba(0,0,0,.2);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
.k {
  color: var(--muted);
  font-size: 10px;
  letter-spacing: .14em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.v {
  font-family: var(--font);
  font-size: clamp(16px, 2.7vw, 20px);
  color: var(--text);
}
.sub { color: var(--muted); font-size: 12px; margin-top: 6px; word-break: break-word; }

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 12px;
}
.stat {
  position: relative;
  padding: 14px 14px 13px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.045);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  cursor: pointer;
  overflow: hidden;
  transition: transform .4s var(--ease), background .35s ease, border-color .35s ease, box-shadow .4s var(--ease);
  animation: fadeUp .75s var(--ease) both;
  -webkit-tap-highlight-color: transparent;
}
.stat:nth-child(1) { animation-delay: .18s; }
.stat:nth-child(2) { animation-delay: .24s; }
.stat:nth-child(3) { animation-delay: .3s; }
.stat:nth-child(4) { animation-delay: .36s; }
.stat:nth-child(5) { animation-delay: .42s; grid-column: 1 / -1; }
.stat::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(280px 80px at 0% 0%, rgba(255,255,255,.1), transparent 55%);
  opacity: 0;
  transition: opacity .35s ease;
  pointer-events: none;
}
.stat:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,.07);
  border-color: rgba(212,175,105,.32);
  box-shadow: 0 14px 32px rgba(0,0,0,.22);
}
.stat:hover::before, .stat.open::before { opacity: 1; }
.stat.open {
  background: rgba(212,175,105,.1);
  border-color: rgba(212,175,105,.4);
  box-shadow: 0 0 0 1px rgba(212,175,105,.12), 0 16px 40px rgba(0,0,0,.25);
}
.stat:active { transform: scale(.985); }

.stat-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.stat-name {
  font-family: var(--font);
  color: var(--gold-2);
  font-size: 16px;
  letter-spacing: .1em;
}
.stat-val {
  font-variant-numeric: tabular-nums;
  font-family: var(--font);
  color: var(--text);
  font-size: 18px;
  min-width: 2ch;
  text-align: right;
}

.bar {
  margin-top: 12px;
  height: 7px;
  border-radius: 99px;
  background: rgba(0,0,0,.28);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.35);
  overflow: hidden;
  position: relative;
}
.bar > i {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: inherit;
  position: relative;
  transition: width 1.15s var(--ease);
  box-shadow: 0 0 12px rgba(255,255,255,.25);
}
.bar > i::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
  animation: barGlow 2.2s ease-in-out infinite;
}
@keyframes barGlow {
  0%, 100% { transform: translateX(-130%); opacity: 0; }
  35% { opacity: 1; }
  70% { transform: translateX(130%); opacity: 0; }
}
.bar.filth > i { background: linear-gradient(90deg, #d4af69, #c45c6a 70%, #8b2f45); }
.bar.trust > i { background: linear-gradient(90deg, #6a8eab, #d4af69); }
.bar.favor > i { background: linear-gradient(90deg, #a8845c, #f0d9a0); }
.bar.fall > i { background: linear-gradient(90deg, #9e3d4a, #3d1018); }
.bar.dep > i { background: linear-gradient(90deg, #7a9e80, #6a8eab); }

.tier {
  margin-top: 8px;
  color: var(--muted);
  font-size: 11px;
  min-height: 1.35em;
}

.impact {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .5s var(--ease), margin .5s var(--ease), opacity .4s ease;
  opacity: 0;
  margin-top: 0;
}
.stat.open .impact {
  grid-template-rows: 1fr;
  opacity: 1;
  margin-top: 12px;
}
.impact-inner {
  overflow: hidden;
  border-top: 1px solid rgba(255,255,255,.1);
}
.impact b {
  display: block;
  color: var(--gold);
  font-weight: 500;
  margin: 10px 0 6px;
  font-size: 11px;
  letter-spacing: .1em;
}
.impact div {
  color: var(--muted);
  font-size: 11.5px;
  padding: 3px 0;
  border-radius: 6px;
  padding-left: 2px;
  transition: color .25s ease, transform .35s var(--ease), background .25s ease;
}
.impact div.now {
  color: var(--gold-2);
  transform: translateX(6px);
  background: rgba(212,175,105,.08);
  padding-left: 8px;
}

.hint {
  padding: 12px 18px 14px;
  color: var(--muted);
  font-size: 11px;
  border-top: 1px solid rgba(255,255,255,.08);
  letter-spacing: .05em;
  animation: fadeUp .7s var(--ease) .5s both;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 0 14px 14px;
  animation: fadeUp .7s var(--ease) .45s both;
  align-items: stretch;
}
.btn-draw {
  appearance: none;
  border: 1px solid rgba(212,175,105,.35);
  background:
    linear-gradient(145deg, rgba(212,175,105,.22), rgba(196,92,106,.12)),
    rgba(255,255,255,.05);
  color: var(--gold-2);
  font-family: var(--font);
  font-size: 15px;
  letter-spacing: .18em;
  padding: 12px 18px;
  border-radius: 999px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 10px 28px rgba(0,0,0,.22);
  transition: transform .35s var(--ease), border-color .3s ease, box-shadow .35s var(--ease), background .3s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn-draw.together {
  border-color: rgba(196,92,106,.4);
  background:
    linear-gradient(145deg, rgba(196,92,106,.22), rgba(212,175,105,.1)),
    rgba(255,255,255,.05);
  letter-spacing: .14em;
}
.btn-draw:hover {
  transform: translateY(-2px);
  border-color: rgba(212,175,105,.55);
  box-shadow: 0 14px 36px rgba(0,0,0,.28), 0 0 0 1px rgba(212,175,105,.12);
}
.btn-draw.together:hover {
  border-color: rgba(196,92,106,.6);
}
.btn-draw:active { transform: scale(.98); }
.btn-draw[disabled] {
  opacity: .55;
  cursor: wait;
  transform: none;
}
.draw-note {
  flex: 1 1 160px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.55;
  display: flex;
  align-items: center;
  min-height: 44px;
}
.toast {
  position: fixed;
  left: 50%;
  bottom: max(18px, env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(12px);
  padding: 10px 16px;
  border-radius: 12px;
  background: rgba(16,18,26,.82);
  border: 1px solid rgba(212,175,105,.35);
  color: var(--gold-2);
  font-size: 12px;
  letter-spacing: .06em;
  backdrop-filter: blur(16px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease, transform .35s var(--ease);
  z-index: 20;
  max-width: min(92vw, 420px);
  text-align: center;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Mobile */
@media (max-width: 720px) {
  .wrap { border-radius: 18px; }
  .head {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 16px 14px 14px;
  }
  .scene { text-align: left; }
  .identity {
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 10px;
  }
  .stats {
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 10px;
  }
  .stat:nth-child(5) { grid-column: auto; }
  .orb { opacity: .4; filter: blur(28px); }
}
/* Tablet */
@media (min-width: 721px) and (max-width: 960px) {
  .identity { grid-template-columns: 1fr 1fr; }
  .id-cell:nth-child(3) { grid-column: 1 / -1; }
  .stat:nth-child(5) { grid-column: 1 / -1; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
  .sheen, .orb, .bar > i::after { display: none; }
}
</style>
</head>
<body>
<div class="status-state status-loading show" id="statusState" role="status" aria-live="polite">正在读取圣堂变量…</div>
<div class="stage">
  <div class="orb a" aria-hidden="true"></div>
  <div class="orb b" aria-hidden="true"></div>
  <div class="orb c" aria-hidden="true"></div>
  <div class="wrap" id="root">
    <div class="sheen" aria-hidden="true"></div>
    <div class="head">
      <div class="brand">圣堂状态<small>SANCTUM STATUS</small></div>
      <div class="scene"><b id="scene">—</b><span id="mode">相遇方式 —</span></div>
    </div>
    <div class="identity">
      <div class="id-cell">
        <div class="k">初遇</div>
        <div class="v" id="name">—</div>
        <div class="sub" id="work">作品 —</div>
      </div>
      <div class="id-cell">
        <div class="k">关系 / 阶段</div>
        <div class="v" id="relation">陌路</div>
        <div class="sub" id="phase">仪式阶段 —</div>
      </div>
      <div class="id-cell">
        <div class="k">当前心态</div>
        <div class="v" id="mood" style="font-size:clamp(14px,2.4vw,17px)">—</div>
        <div class="sub" id="filthType">污秽 —</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="actions">
      <button type="button" class="btn-draw" id="btnDraw" title="从角色池抽一名加入当前剧情">枢纽抽卡</button>
      <button type="button" class="btn-draw together" id="btnTogether" title="与当前在场角色推进一段相处戏">相聚一刻</button>
      <div class="draw-note" id="drawNote">抽卡加人 · 相聚一刻推进相处（均不重置主线）。</div>
    </div>
    <div class="hint">点按数值展开影响分段 · 磨砂面板随数值脉动</div>
  </div>
</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
/* === SYNC_BEGIN:ROSTER === */
const ROSTER = [
  {
    "id": "kurisu",
    "name": "牧濑红莉栖",
    "work": "命运石之门",
    "age_note": "18",
    "appearance": "赤直长发及背；琥珀瞳；白大褂常披私服外；身材偏瘦高、胸围不明显；语速快时偶有咬舌；左手常夹报告或马克杯。",
    "blurb": "天才神经科学研究者，嘴硬心软，讨厌被叫克里斯蒂娜。",
    "intro": "牧濑红莉栖是维克多·孔多利亚大学脑科学研究所的天才研究员，十八岁便在学界引发关注。她好胜、毒舌，被叫「克里斯蒂娜」会当场炸毛；熟悉后却会默默帮人冲咖啡、改论文，别扭的温柔藏得很深。她信奉实验与可复现的证据，不轻信没有数据支撑的说法；证据链一旦成立，转向与担责都比谁都快。",
    "filth_seed": "时间跳跃实验残留的认知回响：像有第二层记忆在低语，提醒她「这条世界线不该存在」。"
  },
  {
    "id": "yor",
    "name": "约尔·福杰",
    "work": "间谍过家家",
    "age_note": "27",
    "appearance": "黑长直；红瞳；金环耳饰；身高偏高、胸臀曲线明显；市政职员装干练，刺客态黑裙配玫瑰饰；力大无穷却常手足无措。",
    "blurb": "外表笨拙的市政职员，真实身份是金牌刺客「荆棘公主」。",
    "intro": "约尔·福杰表面是伯林特市市政厅的平凡职员，笨手笨脚、不会做饭，社交也常常失礼；暗地里却是杀手组织「花园」的顶尖刺客「荆棘公主」。她为养活弟弟尤里走上暗杀之路，对家人却异常珍视；与间谍黄昏假结婚后，努力扮演贤妻，努力本身就很可爱。刺杀时干净利落，一回到家却因买错菜而手足无措。",
    "filth_seed": "暗杀契约留下的血腥咒印：杀意上涌时沿脊背发烫，像有人在数她的「业绩」。"
  },
  {
    "id": "zero_two",
    "name": "零二",
    "work": "DARLING in the FRANXX",
    "age_note": "14",

function animateNumber(el, to) {
  const from = Number(el.dataset.n || 0);
  const target = clamp(to);
  if (from === target) {
    el.textContent = String(target);
    return;
  }
  const start = performance.now();
  const dur = 700;
  function tick(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    const v = Math.round(from + (target - from) * eased);
    el.textContent = String(v);
    if (t < 1) frame(tick);
    else el.dataset.n = String(target);
  }
  frame(tick);
  el.dataset.n = String(target);
}

  if (!s) return "";
  const parts = s.split(/(?<=[。！？])/).filter(Boolean);
  s = (parts.slice(0, 2).join("") || s);
  if (s.length <= max) return s;
  const cut = s.slice(0, max);
  const i = Math.max(cut.lastIndexOf("。"), cut.lastIndexOf("，"));
  return (i > 32 ? cut.slice(0, i + (cut[i] === "。" ? 1 : 0)) : cut) + (i > 32 && cut[i] === "。" ? "" : "…");
}

function mergeTongchang(existing, name) {
  const parts = String(existing || "")
    .split(/[,，、|/／]+/)
    .map(s => s.trim())
    .filter(Boolean);
  if (name && !parts.includes(name)) parts.push(name);
  return parts.join("、");
}

function pickEntryReason(ch) {
  const pool = [
    "身上污秽忽然加重，循着圣堂气息找来",
    "枢纽接点波动，被拽到圣堂这一侧",
    "听说此处能净化，主动求见牧师",
    "误入侧廊，回过神时已站在圣堂里",
  ];
  const key = String(ch.id || ch.name || "");
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h + key.charCodeAt(i) * (i + 3)) % pool.length;
  return pool[h];
}

function buildEncounterPrompt(ch, stat) {
  const enc = (stat && stat.初遇) || {};
  const world = (stat && stat.世界) || {};
  const scene = world.场景 || world.教会名 || "当前场景";
  const cur = enc.姓名 || "初遇对象";
  const present = String(world.同场角色 || "").trim();
  const nextPresent = mergeTongchang(present || cur, ch.name);
  const ageBit = ch.age_note ? ` · ${ch.age_note}` : "";
  const voice = clipVoice(ch.blurb || ch.intro || "", 90);
  const look = String(ch.appearance || "").trim();
  const seed = ch.filth_seed || "异界残留的污秽气息";
  const reason = pickEntryReason(ch);
  return [
    "【圣堂初遇｜偶遇】第三人称；主角称 {{user}}。承接当前剧情：不推翻主线、不重置变量、不抹掉已有角色。",
    "",
    `新人：${ch.name}（${ch.work || "未知作品"}${ageBit}）`,
    look ? `外貌：${look}` : null,
    voice ? `辨识：${voice}` : null,
    `污秽种子：${seed}`,
    "",
    `落点承接「${scene}」；相关在场：${cur}${present ? `；同场已有 ${present}` : ""}。`,
    `入场由头：${reason}——与 {{user}}（及在场者）自然交集。`,
    "",
    "写法：口吻外貌贴原作；先写新人自己的目的与戒备，再写交集；禁万能美人套话、秒信/奉承{{user}}、标签堆砌与元叙事；同一善意可被拒绝或误解；若触及净化须有真实驱除反馈。写一段遭遇戏即可，结尾留互动口。",
    `变量：末尾输出一个 <UpdateVariable>（Analysis + JSONPatch）。将 /世界/同场角色 replace 为「${nextPresent}」；/世界/回合 可用 delta +1；可微调 /世界/场景；可写新人进场后的观察进 /初遇/对user判断 旁证或 /初遇/当前心态；关系数值仅在有可验证事件时小幅调整，禁止无事件惯性上涨；勿无故清空 /初遇 数值。`,
  ].filter(line => line != null && line !== "").join("\n");
}

function buildTogetherPrompt(stat) {
  const enc = (stat && stat.初遇) || {};
  const world = (stat && stat.世界) || {};
  const scene = world.场景 || world.教会名 || "当前场景";
  const cur = enc.姓名 || "";
  const present = String(world.同场角色 || "").trim();
  const phase = enc.仪式阶段 || "相处中";
  const relation = enc.与user关系 || "陌路";
  const mood = enc.当前心态 || "";
  const goal = enc.当前目标 || "";
  const judge = enc.对user判断 || "";
  const boundary = enc.当前边界 || "";
  const filth = enc.污秽类型 || "";
  const who = present || cur || "当前在场角色";
  const focus = cur || who.split(/[、,，]/)[0] || "对方";
  return [
    "【圣堂初遇｜相聚一刻】第三人称；主角称 {{user}}。承接当前剧情：不推翻主线、不重置变量、不新增大批路人。",
    "",
    `落点：「${scene}」。焦点人物：${focus}；同场：${who}。`,
    `关系阶段：${relation} / ${phase}${mood ? `；对方此刻：${mood}` : ""}`,
    goal ? `对方当前目标：${goal}` : null,
    judge ? `对方对{{user}}判断：${judge}` : null,
    boundary ? `对方当前边界：${boundary}` : null,
    filth ? `污秽线索（可轻触，勿喧宾夺主）：${filth}` : null,
    "",
    "请写一段「相聚一刻」：先推进对方自己的目标/事务/戒备，再写与焦点人物（及合理在场者）的相处——可以是并肩歇息、短谈、并肩办事、仪式间隙的私语等，贴合当前信任/好感/堕落区间。",
    "写法：口吻外貌贴原作；不围着讨好{{user}}转；禁止捷径吹捧与无事件秒升亲密；原作重要关系继续影响判断；尺度跟变量走，勿无故跳变亲密。一段戏即可，结尾留互动口。",
    "变量：末尾输出一个 <UpdateVariable>（Analysis + JSONPatch）。每项关系数值须有本回合可观察依据，无依据则不更新；可改 /初遇/当前心态|/初遇/当前目标|/初遇/对user判断|/初遇/当前边界|/初遇/仪式阶段|/世界/场景；信任/好感通常单次不超过 ±2；/世界/回合 可用 delta +1；勿改 /初遇/姓名 与 /世界/相遇方式。",
  ].filter(line => line != null && line !== "").join("\n");
}

let drawing = false;
function setActionBusy(busy) {
  drawing = !!busy;
  ["btnDraw", "btnTogether"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = !!busy;
  });
}

async function onDrawEncounter() {
  if (drawing) return;
  const note = document.getElementById("drawNote");
  const stat = isDemo() ? DEMO_STAT : readStat();
  const ch = pickRosterChar(stat);
  if (!ch) {
    toast("角色池为空，请先重新打包卡以同步名单");
    return;
  }
  setActionBusy(true);
  if (note) note.textContent = `抽到：${ch.name}（${ch.work || ""}）· 正在写入消息…`;
  const prompt = buildEncounterPrompt(ch, stat);
  let ok = false;
  try {
    ok = await dispatchSend(prompt);
  } catch (_) {
    ok = false;
  }
  if (ok) {
    toast(`已发送偶遇：${ch.name}`);
    if (note) note.textContent = `上次抽到 ${ch.name}。可继续抽卡，或点「相聚一刻」推进相处。`;
  } else {
    toast("未接入酒馆发送接口（演示页可预览文案）");
    if (note) note.textContent = `预览抽到：${ch.name}。导入角色卡后在对话里点击即可 /send|/trigger。`;
    if (isDemo()) console.log(prompt);
  }
  setActionBusy(false);
}

async function onTogetherMoment() {
  if (drawing) return;
  const note = document.getElementById("drawNote");
  const stat = isDemo() ? DEMO_STAT : readStat();
  const enc = (stat && stat.初遇) || {};
  if (!enc.姓名 && !String((stat.世界 || {}).同场角色 || "").trim()) {
    toast("尚无在场角色，请先开局或抽卡");
    return;
  }
  setActionBusy(true);
  if (note) note.textContent = "相聚一刻 · 正在写入消息…";
  const prompt = buildTogetherPrompt(stat);
  let ok = false;
  try {
    ok = await dispatchSend(prompt);
  } catch (_) {
    ok = false;
  }
  if (ok) {
    toast(`已发送相聚一刻：${enc.姓名 || "同场"}`);
    if (note) note.textContent = "已发送相聚一刻。可再点推进，或抽卡加入新人。";
  } else {
    toast("未接入酒馆发送接口（演示页可预览文案）");
    if (note) note.textContent = "预览：相聚一刻。导入角色卡后在对话里点击即可发送。";
    if (isDemo()) console.log(prompt);
  }
  setActionBusy(false);
}

window.addEventListener("pagehide", () => {
  destroyed = true;
  if (updateHandle && typeof updateHandle.stop === "function") updateHandle.stop();
  updateHandle = null;
  animationFrames.forEach(id => cancelAnimationFrame(id));
  animationFrames.clear();
  if (toast._t) clearTimeout(toast._t);
});

bind().catch(e => {
  console.error(e);
  showDataState("error", e && e.message ? e.message : String(e));
});
</script>
