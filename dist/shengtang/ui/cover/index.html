<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>圣堂初遇</title>
<style>
:root {
  --st-bg: #0b0b0d;
  --st-surface: linear-gradient(150deg, rgba(31,31,34,.86), rgba(13,13,15,.92));
  --st-line: rgba(255,255,255,.075);
  --st-gold: #d7bc82;
  --st-radius: 8px;
  --st-ease: cubic-bezier(.22,1,.36,1);
  --ink: #0c0d10;
  --ink-2: #14161c;
  --panel: rgba(18, 20, 28, 0.45);
  --line: rgba(212, 175, 105, 0.28);
  --gold: #d4af69;
  --gold-2: #f0d9a0;
  --rose: #9e3d4a;
  --glass: #5b7c99;
  --text: #ebe6dc;
  --muted: #9a958a;
  --danger: #c45c48;
  --ok: #6b8f71;
  --radius: 16px;
  --ease: cubic-bezier(.22, 1, .36, 1);
  --font-display: "Cormorant Garamond", "Noto Serif SC", "Songti SC", serif;
  --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overflow-x: hidden;
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(158, 61, 74, 0.22), transparent 55%),
    radial-gradient(900px 500px at 90% 10%, rgba(91, 124, 153, 0.18), transparent 50%),
    radial-gradient(700px 400px at 50% 100%, rgba(212,175,105,.06), transparent 40%),
    linear-gradient(180deg, #101218 0%, #0c0d10 45%, #0a0b0e 100%);
  background-attachment: fixed;
}
.app {
  height: 100%;
  max-width: 980px;
  margin: 0 auto;
  padding: 14px 14px 10px;
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.ornament {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.7;
  margin: 8px 0 12px;
  flex-shrink: 0;
}
.brand {
  font-family: var(--font-display);
  letter-spacing: 0.28em;
  text-indent: 0.28em;
  color: var(--gold-2);
  font-size: 12px;
  text-transform: uppercase;
  animation: fadeUp .6s var(--ease) both;
  flex-shrink: 0;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 500; margin: 0; }
.page { display: none; }
.page.active {
  display: flex;
  flex-direction: column;
  flex: 1 1 auto;
  gap: 10px;
  min-height: 0;
  overflow: hidden;
  animation: pageIn .55s var(--ease) both;
}
.page-body {
  flex: 1 1 auto;
  min-height: 0;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-right: 4px;
  padding-bottom: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,105,.38) transparent;
}
.page-body::-webkit-scrollbar { width: 5px; }
.page-body::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
.page-body::-webkit-scrollbar-thumb {
  background: rgba(212,175,105,.35);
  border-radius: 999px;
}
.page-body::-webkit-scrollbar-thumb:hover { background: rgba(212,175,105,.55); }
.page[data-page="1"] .page-body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}
.page[data-page="3"] .page-body {
  display: block;
}
.page[data-page="4"] .page-body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
}
#poolBox {
  display: block;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}

/* Page 1 */
.hero {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 0;
  width: 100%;
  padding: 12px 4px 8px;
  position: relative;
}
.hero-glass {
  position: relative;
  width: min(100%, 560px);
  margin: 0 auto;
  padding: 24px 20px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.12);
  background:
    linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.02) 45%, rgba(212,175,105,.05)),
    rgba(10, 12, 18, 0.35);
  backdrop-filter: blur(28px) saturate(1.55);
  -webkit-backdrop-filter: blur(28px) saturate(1.55);
  box-shadow: 0 24px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);
  overflow: hidden;
  animation: fadeUp .8s var(--ease) .12s both;
}
.hero-glass::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(400px 180px at 20% 0%, rgba(158,61,74,.18), transparent 60%),
    linear-gradient(180deg, rgba(255,255,255,.08), transparent 35%);
  pointer-events: none;
}
.hero-glass > * { position: relative; z-index: 1; }
.hero::before {
  content: "";
  position: absolute; inset: 8% 0 auto;
  height: 55%;
  background:
    linear-gradient(120deg, transparent 20%, rgba(212,175,105,.08) 45%, transparent 70%),
    repeating-linear-gradient(-18deg, transparent, transparent 18px, rgba(91,124,153,.045) 18px, rgba(91,124,153,.045) 19px);
  pointer-events: none;
  animation: fadeUp 1s var(--ease) .1s both;
}
.hero h1 {
  font-size: clamp(32px, 8vw, 64px);
  letter-spacing: 0.12em;
  color: var(--gold-2);
  text-shadow: 0 0 40px rgba(212,175,105,.2);
  animation: fadeUp .7s var(--ease) .15s both;
}
.hero .hook {
  margin-top: 14px;
  max-width: 34em;
  color: var(--muted);
  font-size: clamp(13px, 2.6vw, 15px);
  animation: fadeUp .7s var(--ease) .28s both;
}
.hero .hook em { color: var(--gold); font-style: normal; }
.loading-card {
  width: min(100%, 620px);
  margin: 0 auto;
}
.loading-card h2 {
  color: var(--gold-2);
  font-size: clamp(30px, 5vw, 52px);
  letter-spacing: .1em;
}
.loading-card p {
  margin: 12px 0 0;
  color: var(--muted);
}
.loading-card .meter {
  height: 8px;
  margin-top: 18px;
  border-radius: 999px;
  background: rgba(0,0,0,.34);
  overflow: hidden;
}
.loading-card .meter i {
  display: block;
  width: 42%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, transparent, var(--gold-2), var(--rose), transparent);
  animation: loadingSweep 1.35s ease-in-out infinite;
}
@keyframes loadingSweep {
  from { transform: translateX(-120%); }
  to { transform: translateX(260%); }
}

/* Shared UI — frosted glass */
.panel {
  position: relative;
  background:
    linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.02) 45%, rgba(212,175,105,.05)),
    rgba(12, 14, 20, 0.36);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--radius);
  padding: 14px 16px;
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  box-shadow: 0 16px 48px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.16);
  overflow: visible;
  animation: fadeUp .55s var(--ease) both;
}
.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,.06), transparent 30%);
  pointer-events: none;
}
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.grow { flex: 1; }
label.field {
  display: flex; flex-direction: column; gap: 6px;
  font-size: 12px; color: var(--muted); letter-spacing: .06em;
  position: relative; z-index: 1;
}
input, textarea, select {
  width: 100%;
  background: rgba(0,0,0,.32);
  border: 1px solid rgba(212,175,105,.22);
  color: var(--text);
  border-radius: 10px;
  padding: 10px 12px;
  font: inherit;
  outline: none;
  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
}
input:focus, textarea:focus, select:focus {
  border-color: rgba(212,175,105,.55);
  box-shadow: 0 0 0 3px rgba(212,175,105,.12);
  background: rgba(0,0,0,.4);
}
textarea { min-height: 64px; max-height: 160px; resize: vertical; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

.btn {
  appearance: none; border: 1px solid var(--gold);
  background: linear-gradient(180deg, rgba(212,175,105,.2), rgba(212,175,105,.06));
  color: var(--gold-2);
  padding: 11px 18px;
  border-radius: 999px;
  font: inherit;
  letter-spacing: .12em;
  cursor: pointer;
  transition: transform .25s var(--ease), background .25s ease, box-shadow .25s ease;
  backdrop-filter: blur(10px);
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: rgba(212,175,105,.3); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,175,105,.15); }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(180deg, #e0c07a, #b8914a);
  color: #1a140c;
  border-color: #e6c98a;
  font-weight: 600;
  box-shadow: 0 8px 28px rgba(212,175,105,.22);
}
.btn.primary:hover { box-shadow: 0 12px 32px rgba(212,175,105,.32); }
.btn.ghost { background: rgba(255,255,255,.03); border-color: rgba(212,175,105,.35); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
.foot {
  flex-shrink: 0;
  margin-top: 0;
  padding-top: 10px;
  display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  position: relative;
  z-index: 5;
  background: linear-gradient(180deg, transparent, rgba(10,11,14,.92) 35%);
  border-top: 1px solid rgba(255,255,255,.06);
  padding-bottom: 2px;
}
.page[data-page="3"] { padding-bottom: 0; }
.page[data-page="3"] .detail.show {
  margin-bottom: 12px;
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 4px;
}
@media (max-width: 640px) { .mode-grid { grid-template-columns: 1fr; } }
.mode-card, .char-card, .custom-card {
  border: 1px solid rgba(255,255,255,.1);
  background:
    linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
    rgba(8, 10, 14, 0.35);
  padding: 8px 10px;
  cursor: pointer;
  transition: transform .3s var(--ease), border-color .25s ease, box-shadow .3s var(--ease), background .25s ease;
  border-radius: 12px;
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.mode-card:hover, .char-card:hover {
  border-color: rgba(212,175,105,.45);
  transform: translateY(-1px);
  box-shadow: 0 10px 28px rgba(0,0,0,.28), 0 0 0 1px rgba(212,175,105,.1);
}
.mode-card.active, .char-card.active, .custom-card.active {
  border-color: rgba(212,175,105,.7);
  box-shadow: inset 0 0 0 1px rgba(212,175,105,.28), 0 8px 24px rgba(212,175,105,.12);
  background:
    linear-gradient(145deg, rgba(212,175,105,.14), rgba(255,255,255,.03)),
    rgba(12, 14, 20, 0.45);
}
.mode-card h3 { color: var(--gold-2); font-size: clamp(14px, 2.6vw, 16px); margin-bottom: 2px; }
.mode-card p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 单层滚动：角色池随 page-body 滚，禁止内层 max-height 再出一条系统白条 */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 8px;
  min-height: 0;
  max-height: none;
  overflow: visible;
  padding: 2px 0 4px;
  position: relative;
  z-index: 1;
  border: none;
  border-radius: 0;
  background: transparent;
}
.char-card.active {
  outline: 2px solid rgba(212,175,105,.85);
  outline-offset: 1px;
}
.char-card .swatch {
  height: 36px;
  border-radius: 10px;
  margin-bottom: 6px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 70%, #000), transparent),
    repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 2px, transparent 2px 6px);
  border: 1px solid rgba(255,255,255,.08);
  transition: transform .35s var(--ease);
  pointer-events: none;
}
.char-card:hover .swatch { transform: scale(1.03); }
.char-card .name { font-family: var(--font-display); font-size: 15px; color: var(--text); pointer-events: none; }
.char-card .work { color: var(--muted); font-size: 11px; margin-top: 2px; pointer-events: none; }
.char-card .blurb { display: none; }
.foot-msg {
  flex: 1 1 140px;
  color: var(--danger);
  font-size: 12px;
  line-height: 1.4;
  align-self: center;
  min-height: 1.2em;
}
.foot-msg:empty {
  display: none;
}
.detail {
  display: none;
  margin-top: 8px;
  flex: 0 0 auto;
  max-height: none;
  overflow: visible;
  animation: fadeUp .4s var(--ease);
}
.detail.show { display: block; }
.detail h3 { color: var(--gold-2); margin-bottom: 6px; font-size: 17px; }
.detail .meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.detail strong { color: var(--gold); font-weight: 500; }
.detail-row { margin-top: 6px; color: var(--text); line-height: 1.65; }
.detail-row.intro { margin-top: 8px; }
.hint { color: var(--muted); font-size: 12px; }
.warn { color: var(--danger); font-size: 12px; min-height: 1.2em; }
.section-title {
  font-family: var(--font-display);
  color: var(--gold);
  font-size: clamp(16px, 3vw, 18px);
  letter-spacing: .08em;
}
.tabs { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.tab {
  border: 1px solid transparent;
  background: rgba(255,255,255,.03);
  color: var(--muted);
  padding: 8px 12px;
  cursor: pointer;
  font: inherit;
  border-radius: 999px;
  transition: .25s ease;
}
.tab.active {
  color: #1a140c;
  background: linear-gradient(180deg, #e0c07a, #b8914a);
  border-color: #e6c98a;
}
#customBox { display: none; }
#customBox.show { display: grid; }
.scroll-thin { scrollbar-width: thin; scrollbar-color: rgba(212,175,105,.38) transparent; }
.scroll-thin::-webkit-scrollbar { width: 5px; }
.scroll-thin::-webkit-scrollbar-track { background: transparent; }
.scroll-thin::-webkit-scrollbar-thumb { background: rgba(212,175,105,.35); border-radius: 999px; }

@media (max-width: 480px) {
  .app {
    padding-top: 10px;
    padding-left: max(10px, env(safe-area-inset-left));
    padding-right: max(10px, env(safe-area-inset-right));
  }
  .char-grid { grid-template-columns: repeat(2, 1fr); }
  .btn {
    width: auto;
    min-width: 0;
    padding: 10px 14px;
    text-align: center;
    letter-spacing: .08em;
  }
  .foot {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 8px;
  }
  .foot .btn {
    flex: 1 1 0;
  }
  .foot-msg {
    order: -1;
    flex: 1 0 100%;
    width: 100%;
  }
  .grid-2 { gap: 10px; }
  .tabs { gap: 6px; margin-bottom: 6px; }
  .tab { padding: 7px 11px; }
  .hint { font-size: 11px; }
  .detail-row.intro {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .detail-row.appearance { display: none; }
}
@media (max-height: 720px) {
  textarea { min-height: 48px; max-height: 120px; }
  .panel { padding: 12px 12px; }
  .hero h1 { font-size: clamp(28px, 7vw, 48px); }
  .mode-card p { -webkit-line-clamp: 2; }
  .section-title { font-size: 15px; }
  .brand { font-size: 11px; }
}
@media (max-height: 560px) {
  .ornament { margin: 4px 0 8px; }
  .page.active { gap: 6px; }
  .page-body { padding-bottom: 8px; }
  .hero .hook { margin-top: 10px; font-size: 13px; }
  .mode-card, .char-card { padding: 7px 9px; }
  .char-card .swatch { height: 28px; }
  .foot {
    padding-top: 6px;
    padding-bottom: 0;
  }
  .detail.show {
    max-height: min(360px, 78vw);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}

/* Product finish: shared with the status surface. */
body {
  background:
    linear-gradient(135deg, rgba(255,255,255,.018), transparent 42%),
    linear-gradient(180deg, #111114, var(--st-bg));
}
.hero::before { opacity: .34; }
.hero-glass,
.panel {
  border: 1px solid var(--st-line);
  border-radius: var(--st-radius);
  background: var(--st-surface);
  box-shadow: inset 0 1px rgba(255,255,255,.055), 0 24px 64px rgba(0,0,0,.34);
  backdrop-filter: blur(24px) saturate(1.22);
  -webkit-backdrop-filter: blur(24px) saturate(1.22);
}
.hero-glass::before,
.panel::before { background: linear-gradient(180deg, rgba(255,255,255,.035), transparent 34%); }
.hero h1 { color: #ead7ad; text-shadow: none; }
.hero .hook { color: #aaa59e; }
.hero .hook em { color: var(--st-gold); }
.btn {
  min-height: 36px;
  padding: 8px 13px;
  border: 0;
  border-radius: 6px;
  color: #c8c0b4;
  background: rgba(255,255,255,.035);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.065);
  letter-spacing: 0;
  backdrop-filter: none;
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.btn:hover {
  color: var(--st-text);
  background: rgba(255,255,255,.06);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.09);
  transform: translateY(-1px);
}
.btn:active { transform: scale(.97); }
.btn.primary,
.tab.active {
  color: #19140e;
  border: 0;
  background: linear-gradient(180deg, #e2cb99, #c5a263);
  box-shadow: inset 0 1px rgba(255,255,255,.35), 0 5px 16px rgba(171,132,65,.16);
}
.btn.primary:hover { box-shadow: inset 0 1px rgba(255,255,255,.35), 0 7px 20px rgba(171,132,65,.2); }
.btn.ghost { border: 0; background: rgba(255,255,255,.025); box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
.tab {
  min-height: 32px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  background: rgba(255,255,255,.028);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.055);
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease;
}
.mode-card,
.char-card,
.custom-card {
  border: 0;
  border-radius: 6px;
  background: rgba(255,255,255,.026);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  backdrop-filter: none;
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.mode-card:hover,
.char-card:hover {
  border-color: transparent;
  background: rgba(255,255,255,.052);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.085);
  transform: translateY(-1px);
}
.mode-card.active,
.char-card.active,
.custom-card.active {
  border-color: transparent;
  background: rgba(215,188,130,.095);
  box-shadow: inset 0 0 0 1px rgba(215,188,130,.34);
}
.char-card.active { outline: 0; }
.char-card .swatch { border-radius: 4px; opacity: .76; }
input,
textarea,
select {
  border: 0;
  border-radius: 6px;
  background: rgba(255,255,255,.035);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.065);
}
input:focus,
textarea:focus,
select:focus {
  border-color: transparent;
  background: rgba(255,255,255,.05);
  box-shadow: inset 0 0 0 1px rgba(215,188,130,.34), 0 0 0 2px rgba(215,188,130,.07);
}
.foot { border-top-color: var(--st-line); background: linear-gradient(180deg, transparent, rgba(11,11,13,.94) 38%); }
.ornament { opacity: .42; }
.brand { color: #cdb887; }
.page.active { animation-duration: 420ms; animation-timing-function: var(--st-ease); }
.ui-build {
  margin: 6px 0 0;
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: rgba(232, 220, 196, 0.62);
  font-family: "Cormorant Garamond", "Times New Roman", serif;

function clipVoice(text, max = 96) {
  let s = String(text || "").trim().replace(/\s+/g, "");
  if (!s) return "";
  const parts = s.split(/(?<=[。！？])/).filter(Boolean);
  s = (parts.slice(0, 2).join("") || s);
  if (s.length <= max) return s;
  const cut = s.slice(0, max);
  const i = Math.max(cut.lastIndexOf("。"), cut.lastIndexOf("，"), cut.lastIndexOf("；"));
  return (i > 36 ? cut.slice(0, i + (cut[i] === "。" ? 1 : 0)) : cut) + (i > 36 && cut[i] === "。" ? "" : "…");
}

function getApi(name) {
  const roots = [];
  try { roots.push(window); } catch (_) {}
  try { if (window.parent && window.parent !== window) roots.push(window.parent); } catch (_) {}
  try { if (window.top && window.top !== window) roots.push(window.top); } catch (_) {}
  for (const w of roots) {
    try {
      if (w && typeof w[name] === "function") return w[name].bind(w);
    } catch (_) {}
  }
  for (const w of roots) {
    try {
      const st = w.SillyTavern || w.sillyTavern;
      if (st && typeof st[name] === "function") return st[name].bind(st);
    } catch (_) {}
  }
  return null;
}

async function waitMvu(timeout = 2500) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const Mvu = window.Mvu || (window.parent && window.parent.Mvu);
    if (Mvu && Mvu.parseMessage) return Mvu;
    await new Promise(r => setTimeout(r, 80));
  }
  return null;
}

function hasOpeningStatData(data) {
  const stat = data && data.stat_data;
  return !!(stat && stat.世界 && stat.主角 && stat.角色);
}

async function waitOpeningMvuData(Mvu, timeout = 5000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const data = Mvu.getMvuData({ type: "message", message_id: 0 });
    if (hasOpeningStatData(data)) return data;
    await new Promise(r => setTimeout(r, 100));
  }
  throw new Error("0 楼 MVU 变量尚未初始化，请先点击「重新读取初始变量」或重开本卡后再生成。");
}

function asGenText(raw) {
  if (typeof raw === "string") return raw;
  if (raw && typeof raw === "object") return String(raw.result || raw.message || raw.text || "");
  return "";
}

function openingMessage(text) {
  const body = String(text || "").trim();
  if (!body) return "";
  if (/<StatusPlaceHolderImpl\s*\/>/i.test(body)) return body;
  return body + "\n\n<StatusPlaceHolderImpl/>";
}

let activeOpening = null;

function currentChatId() {
  try {
    const roots = [window, window.parent, window.top];
    for (const root of roots) {
      const st = root && (root.SillyTavern || root.sillyTavern);
      if (st && typeof st.getCurrentChatId === "function") return String(st.getCurrentChatId() || "");
    }
  } catch (_) {}
  return "";
}

function assertOpeningCanCommit(run, getMsgs) {
  if (run.cancelled) throw new Error(run.cancelReason || "生成已取消");
  if (run.chatId && currentChatId() !== run.chatId) throw new Error("聊天已切换，开局未写入");
  const latestFloor0 = (getMsgs(0, { include_swipes: false }) || [])[0];
  if (!latestFloor0 || String(latestFloor0.message || "") !== run.originalMessage) {
    throw new Error("0 楼内容已变化，开局未覆盖");
  }
}

function stopOpening(reason) {
  const run = activeOpening;
  if (!run) return;
  run.cancelled = true;
  run.cancelReason = reason || "已取消";
  if (run.streamHandle && typeof run.streamHandle.stop === "function") {
    try { run.streamHandle.stop(); } catch (_) {}
  }
  if (run.timer) clearTimeout(run.timer);
  if (typeof run.stopGeneration === "function") {
    try { run.stopGeneration(run.generationId); } catch (_) {}
  }
  activeOpening = null;
}

function runGeneration(generatePromise, run, timeoutMs) {
  return new Promise((resolve, reject) => {
    run.timer = setTimeout(() => {
      if (typeof run.stopGeneration === "function") {
        try { run.stopGeneration(run.generationId); } catch (_) {}
      }
      reject(new Error("开局生成超时（" + Math.round(timeoutMs / 1000) + "s）"));
    }, timeoutMs);
    Promise.resolve(generatePromise).then(resolve, reject).finally(() => {
      if (run.timer) clearTimeout(run.timer);
      run.timer = null;
    });
  });
}

async function startGame() {

  const resetBtn = () => {
    state.starting = false;
    if (btn) {
      btn.disabled = false;
      btn.textContent = "生成开局";
    }
  };
  if (warn) warn.textContent = "";
  if (!state.modeId) {
    if (warn) warn.textContent = "请选择相遇方式。";
    return;
  }
  const mode = MEETING_MODES.find(m => m.id === state.modeId);
  const persona = getPersona();
  const enc = getEncounter();
  if (!enc || !enc.姓名) {
    if (warn) warn.textContent = "请先点选角色池中的角色，或改用自定义并填姓名。";
    return;
  }
  if (enc.custom) {
    if (!enc.作品 || !enc.外貌 || !enc.污秽类型) {
      if (warn) warn.textContent = "自定义需填写作品、外貌与污秽设定。";
      return;
    }
  }
  if (state.starting) return;
  state.starting = true;
  if (btn) {
    btn.disabled = true;
    btn.textContent = "生成中…";
  }
  setGenerationState("正在生成开局", "正在初始化变量并请求模型生成。");
  showPage(4);

  const patches = buildPatches(mode, persona, enc);
  const patchBlock = [
    "<UpdateVariable>",
    "<Analysis>",
    "- Initialize sanctum encounter from cover.",
    "</Analysis>",
    "<JSONPatch>",
    JSON.stringify(patches, null, 2),
    "</JSONPatch>",
    "</UpdateVariable>",
  ].join("\n");

  const prompt = buildPrompt(mode, persona, enc);
  const generateFn = getApi("generate") || getApi("Generate");
  const setMsgs = getApi("setChatMessages") || getApi("setChatMessage");
  const getMsgs = getApi("getChatMessages");
  const eventOn = getApi("eventOn");
  const stopGeneration = getApi("stopGenerationById");
  const streamEvt = (typeof iframe_events !== "undefined" && iframe_events.STREAM_TOKEN_RECEIVED_FULLY)
    || "js_stream_token_received_fully";
  const GEN_TIMEOUT_MS = 120000;

  try {
    const Mvu = await waitMvu(5000);
    if (!Mvu) throw new Error("MVU 未初始化，请确认变量框架已启用");
    if (!generateFn || !setMsgs || !getMsgs) {
      throw new Error("缺少 generate / setChatMessages / getChatMessages 接口");
    }

    const floor0 = (getMsgs(0, { include_swipes: false }) || [])[0];
    if (!floor0) throw new Error("无法读取封面所在的 0 楼");

    const generationId = "shengtang-opening-" + Date.now() + "-" + Math.random().toString(36).slice(2, 9);
    const run = {
      generationId,
      chatId: currentChatId(),
      originalMessage: String(floor0.message || ""),
      cancelled: false,
      cancelReason: "",
      streamHandle: null,
      timer: null,
      stopGeneration,
    };
    activeOpening = run;

    if (typeof eventOn === "function") {
      const onStream = (fullText, generationId) => {
        if (generationId !== run.generationId || run.cancelled) return;
        const length = String(fullText || "").length;
        if (warn) warn.textContent = length ? "正在生成 · " + length + " 字" : "正在生成…";
        setGenerationState("正在生成开局", length ? "正在生成 · " + length + " 字" : "正在等待模型返回。");
      };
      run.streamHandle = eventOn(streamEvt, onStream);
    }

    const oldData = await waitOpeningMvuData(Mvu, 6000);
    const initializedData = (await Mvu.parseMessage(patchBlock, oldData)) || oldData;
    setGenerationState("正在生成开局", "变量已初始化，正在写作首段剧情。");
    const raw = await runGeneration(
      generateFn({
        user_input: prompt,
        should_stream: true,
        generation_id: generationId,
      }),
      run,
      GEN_TIMEOUT_MS,
    );
    const text = asGenText(raw).trim();
    if (!text) throw new Error("模型返回空内容，请检查预设后重试");
    setGenerationState("正在写入开局", "正在解析 MVU 变量并替换封面楼层。");
    assertOpeningCanCommit(run, getMsgs);
    const finalData = (await Mvu.parseMessage(text, initializedData)) || initializedData;
    assertOpeningCanCommit(run, getMsgs);
    if (run.streamHandle && typeof run.streamHandle.stop === "function") {
      run.streamHandle.stop();
      run.streamHandle = null;
    }
    await setMsgs(
      [{ message_id: 0, message: openingMessage(text), data: finalData }],
      { refresh: "affected" },
    );
    activeOpening = null;
    state.starting = false;
    setGenerationState("开局已写入", "0 楼已替换为生成结果。若酒馆显示未刷新，请点本楼刷新或切换楼层。", true);
    return;
  } catch (err) {
    stopOpening(err && err.message ? err.message : String(err));
    if (warn) warn.textContent = "生成失败：" + (err && err.message ? err.message : String(err));
    setGenerationState("生成失败", err && err.message ? err.message : String(err), true);
    resetBtn();
    return;
  }
  resetBtn();
}

function init() {
  if (MEETING_MODES[0]) state.modeId = MEETING_MODES[0].id;
  if (CHARACTERS[0]) state.charId = CHARACTERS[0].id;
  renderModes();
  renderChars();

  $("#btnEnter").onclick = () => showPage(2);
  $("#btnToMeet").onclick = () => showPage(3);
  $("#btnStart").onclick = () => startGame();
  $("#btnCancelGeneration").onclick = () => {
    stopOpening("用户取消生成");
    state.starting = false;
    const btn = $("#btnStart");
    if (btn) {
      btn.disabled = false;
      btn.textContent = "生成开局";
    }
    setGenerationState("正在生成开局", "已提交生成请求，请稍等。");
    showPage(3);
  };
  $$("[data-back]").forEach(b => b.onclick = () => showPage(Number(b.dataset.back)));
  $$(".tab").forEach(t => t.onclick = () => setTab(t.dataset.tab));
}

window.addEventListener("pagehide", () => stopOpening("页面已卸载"));
try {
  const eventOn = getApi("eventOn");
  const chatEvt = (typeof tavern_events !== "undefined" && tavern_events.CHAT_CHANGED) || "chat_changed";
  if (typeof eventOn === "function") {
    eventOn(chatEvt, () => stopOpening("聊天已切换"));
  }
} catch (_) {}
init();
</script>
