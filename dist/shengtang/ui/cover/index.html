<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="data:," />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>万界圣堂</title>
<style>
:root {
  --st-bg: #0b0b0d;
  --st-surface: rgba(28,28,33,.65);
  --st-line: rgba(255,255,255,.055);
  --st-gold: #e2c08a;
  --st-radius: 16px;
  --st-ease: cubic-bezier(.22,1,.36,1);
  --ink: #0c0d10;
  --ink-2: #14161c;
  --panel: rgba(18, 20, 28, 0.45);
  --line: rgba(226, 192, 138, 0.32);
  --gold: #e2c08a;
  --gold-2: #f0d9a0;
  --rose: #9e3d4a;
  --glass: #5b7c99;
  --text: #ebe6dc;
  --muted: #9a958a;
  --danger: #c45c48;
  --ok: #6b8f71;
  --radius: 16px;
  --ease: cubic-bezier(.22, 1, .36, 1);
  --font-display: "Cormorant Garamond", "Noto Serif SC", "Songti SC", serif;
  --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overflow-x: hidden;
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(158, 61, 74, 0.22), transparent 55%),
    radial-gradient(900px 500px at 90% 10%, rgba(91, 124, 153, 0.18), transparent 50%),
    radial-gradient(700px 400px at 50% 100%, rgba(212,175,105,.06), transparent 40%),
    linear-gradient(180deg, #101218 0%, #0c0d10 45%, #0a0b0e 100%);
  background-attachment: fixed;
}
.app {
  height: 100%;
  width: 100%;
  max-width: none;
  margin: 0;
  padding: 10px 12px 8px;
  padding-left: max(12px, env(safe-area-inset-left));
  padding-right: max(12px, env(safe-area-inset-right));
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.ornament {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.7;
  margin: 8px 0 12px;
  flex-shrink: 0;
}
.brand {
  font-family: var(--font-display);
  letter-spacing: 0.28em;
  text-indent: 0.28em;
  color: var(--gold-2);
  font-size: 12px;
  text-transform: uppercase;
  animation: fadeUp .6s var(--ease) both;
  flex-shrink: 0;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 500; margin: 0; }
/* 非激活页必须彻底退出布局；勿在 .page[data-page] 上写死 display:flex，否则会盖过本规则并挤垮当前页 */
.page { display: none !important; }
.page.active {
  display: flex !important;
  flex-direction: column;
  flex: 1 1 0;
  height: 100%;
  gap: 10px;
  min-height: 0;
  overflow: hidden;
  animation: pageIn .55s var(--ease) both;
}
.page-body {
  flex: 1 1 auto;
  min-height: 0;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-right: 4px;
  padding-bottom: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,105,.38) transparent;
}
.page-body::-webkit-scrollbar { width: 5px; }
.page-body::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
.page-body::-webkit-scrollbar-thumb {
  background: rgba(212,175,105,.35);
  border-radius: 999px;
}
.page-body::-webkit-scrollbar-thumb:hover { background: rgba(212,175,105,.55); }
.page[data-page="1"] .page-body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
  padding-bottom: 0;
}
.page[data-page="1"] .brand,
.page[data-page="1"] .ornament {
  flex-shrink: 0;
}
.page[data-page="1"] .hero {
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
}
.page[data-page="1"] .cover-credit {
  flex-shrink: 0;
  margin-top: auto;
  padding-top: 8px;
}
.page[data-page="3"] .page-body {
  display: block;
}
.page[data-page="4"] .page-body {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  flex: 1 1 0;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}
.page[data-page="4"] .brand,
.page[data-page="4"] .ornament {
  flex: 0 0 auto;
}
.page[data-page="4"] .page-body {
  padding: 8px 10px 0 !important;
}
.page[data-page="4"] > .foot {
  padding: 6px 10px max(6px, env(safe-area-inset-bottom)) !important;
}
@media (max-height: 720px) {
  .page[data-page="4"] .brand,
  .page[data-page="4"] .ornament {
    display: none;
  }
}
#poolBox {
  display: block;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}

/* Page 1 */
.hero {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 0;
  width: 100%;
  padding: 12px 4px 8px;
  position: relative;
}
.hero-glass {
  position: relative;
  width: min(100%, 560px);
  margin: 0 auto;
  padding: 24px 20px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.12);
  background:
    linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.02) 45%, rgba(212,175,105,.05)),
    rgba(10, 12, 18, 0.35);
  backdrop-filter: blur(28px) saturate(1.55);
  -webkit-backdrop-filter: blur(28px) saturate(1.55);
  box-shadow: 0 24px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);
  overflow: hidden;
  animation: fadeUp .8s var(--ease) .12s both;
}
.hero-glass::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(400px 180px at 20% 0%, rgba(158,61,74,.18), transparent 60%),
    linear-gradient(180deg, rgba(255,255,255,.08), transparent 35%);
  pointer-events: none;
}
.hero-glass > * { position: relative; z-index: 1; }
.hero::before {
  content: "";
  position: absolute; inset: 8% 0 auto;
  height: 55%;
  background:
    linear-gradient(120deg, transparent 20%, rgba(212,175,105,.08) 45%, transparent 70%),
    repeating-linear-gradient(-18deg, transparent, transparent 18px, rgba(91,124,153,.045) 18px, rgba(91,124,153,.045) 19px);
  pointer-events: none;
  animation: fadeUp 1s var(--ease) .1s both;
}
.hero h1 {
  font-size: clamp(32px, 8vw, 64px);
  letter-spacing: 0.12em;
  color: var(--gold-2);
  text-shadow: 0 0 40px rgba(212,175,105,.2);
  animation: fadeUp .7s var(--ease) .15s both;
}
.hero .hook {
  margin-top: 14px;
  max-width: 34em;
  color: var(--muted);
  font-size: clamp(13px, 2.6vw, 15px);
  animation: fadeUp .7s var(--ease) .28s both;
}
.hero .hook em { color: var(--gold); font-style: normal; }
.loading-card {
  width: min(100%, 620px);
  margin: 0 auto;
}
.loading-card h2 {
  color: var(--gold-2);
  font-size: clamp(30px, 5vw, 52px);
  letter-spacing: .1em;
}
.loading-card p {
  margin: 12px 0 0;
  color: var(--muted);
}
.loading-card .meter {
  height: 8px;
  margin-top: 18px;
  border-radius: 999px;
  background: rgba(0,0,0,.34);
  overflow: hidden;
}
.loading-card .meter i {
  display: block;
  width: 42%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, transparent, var(--gold-2), var(--rose), transparent);
  animation: loadingSweep 1.35s ease-in-out infinite;
}
@keyframes loadingSweep {
  from { transform: translateX(-120%); }
  to { transform: translateX(260%); }
}

/* Shared UI — frosted glass */
.panel {
  position: relative;
  background:
    linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.02) 45%, rgba(212,175,105,.05)),
    rgba(12, 14, 20, 0.36);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--radius);
  padding: 14px 16px;
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  box-shadow: 0 16px 48px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.16);
  overflow: visible;
  animation: fadeUp .55s var(--ease) both;
}
.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,.06), transparent 30%);
  pointer-events: none;
}
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.grow { flex: 1; }
label.field {
  display: flex; flex-direction: column; gap: 6px;
  font-size: 12px; color: var(--muted); letter-spacing: .06em;
  position: relative; z-index: 1;
}
input, textarea, select {
  width: 100%;
  background: rgba(0,0,0,.32);
  border: 1px solid rgba(212,175,105,.22);
  color: var(--text);
  border-radius: 10px;
  padding: 10px 12px;
  font: inherit;
  outline: none;
  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
}
select {
  color-scheme: dark;
  background-color: #17171c;
}
select option {
  color: #eee8de;
  background: #1b1b20;
}
select option:checked {
  color: #fff8ed;
  background: #755a3d;
}
input:focus, textarea:focus, select:focus {
  border-color: rgba(212,175,105,.55);
  box-shadow: 0 0 0 3px rgba(212,175,105,.12);
  background: rgba(0,0,0,.4);
}
textarea { min-height: 64px; max-height: 160px; resize: vertical; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

.btn {
  appearance: none; border: 1px solid var(--gold);
  background: linear-gradient(180deg, rgba(212,175,105,.2), rgba(212,175,105,.06));
  color: var(--gold-2);
  padding: 11px 18px;
  border-radius: 999px;
  font: inherit;
  letter-spacing: .12em;
  cursor: pointer;
  transition: transform .25s var(--ease), background .25s ease, box-shadow .25s ease;
  backdrop-filter: blur(10px);
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: rgba(212,175,105,.3); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,175,105,.15); }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(180deg, #e0c07a, #b8914a);
  color: #1a140c;
  border-color: #e6c98a;
  font-weight: 600;
  box-shadow: 0 8px 28px rgba(212,175,105,.22);
}
.btn.primary:hover { box-shadow: 0 12px 32px rgba(212,175,105,.32); }
.btn.ghost { background: rgba(255,255,255,.03); border-color: rgba(212,175,105,.35); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
.foot {
  flex-shrink: 0;
  margin-top: 0;
  padding-top: 10px;
  display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  position: relative;
  z-index: 5;
  background: linear-gradient(180deg, transparent, rgba(10,11,14,.92) 35%);
  border-top: 1px solid rgba(255,255,255,.06);
  padding-bottom: 2px;
}
.page[data-page="3"] { padding-bottom: 0; }
.page[data-page="3"] .detail.show {
  margin-bottom: 12px;
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 4px;
}
@media (max-width: 640px) { .mode-grid { grid-template-columns: 1fr; } }
.mode-card, .char-card, .custom-card {
  border: 1px solid rgba(255,255,255,.1);
  background:
    linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
    rgba(8, 10, 14, 0.35);
  padding: 8px 10px;
  cursor: pointer;
  transition: transform .3s var(--ease), border-color .25s ease, box-shadow .3s var(--ease), background .25s ease;
  border-radius: 12px;
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.mode-card:hover, .char-card:hover {
  border-color: rgba(212,175,105,.45);
  transform: translateY(-1px);
  box-shadow: 0 10px 28px rgba(0,0,0,.28), 0 0 0 1px rgba(212,175,105,.1);
}
.mode-card.active, .char-card.active, .custom-card.active {
  border-color: rgba(212,175,105,.7);
  box-shadow: inset 0 0 0 1px rgba(212,175,105,.28), 0 8px 24px rgba(212,175,105,.12);
  background:
    linear-gradient(145deg, rgba(212,175,105,.14), rgba(255,255,255,.03)),
    rgba(12, 14, 20, 0.45);
}
.mode-card h3 { color: var(--gold-2); font-size: clamp(14px, 2.6vw, 16px); margin-bottom: 2px; }
.mode-card p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 单层滚动：角色池随 page-body 滚，禁止内层 max-height 再出一条系统白条 */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 8px;
  min-height: 0;
  max-height: none;
  overflow: visible;
  padding: 2px 0 4px;
  position: relative;
  z-index: 1;
  border: none;
  border-radius: 0;
  background: transparent;
}
.char-card.active {
  outline: 2px solid rgba(212,175,105,.85);
  outline-offset: 1px;
}
.char-card .swatch {
  height: 36px;
  border-radius: 10px;
  margin-bottom: 6px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 70%, #000), transparent),
    repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 2px, transparent 2px 6px);
  border: 1px solid rgba(255,255,255,.08);
  transition: transform .35s var(--ease);
  pointer-events: none;
}
.char-card:hover .swatch { transform: scale(1.03); }
.char-card .name { font-family: var(--font-display); font-size: 15px; color: var(--text); pointer-events: none; }
.char-card .work { color: var(--muted); font-size: 11px; margin-top: 2px; pointer-events: none; }
.char-card .blurb { display: none; }
.foot-msg {
  flex: 1 1 140px;
  color: var(--danger);
  font-size: 12px;
  line-height: 1.4;
  align-self: center;
  min-height: 1.2em;
}
.foot-msg:empty {
  display: none;
}
.detail {
  display: none;
  margin-top: 8px;
  flex: 0 0 auto;
  max-height: none;
  overflow: visible;
  animation: fadeUp .4s var(--ease);
}
.detail.show { display: block; }
.detail h3 { color: var(--gold-2); margin-bottom: 6px; font-size: 17px; }
.detail .meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.detail strong { color: var(--gold); font-weight: 500; }
.detail-row { margin-top: 6px; color: var(--text); line-height: 1.65; }
.detail-row.intro { margin-top: 8px; }
.hint { color: var(--muted); font-size: 12px; }
.warn { color: var(--danger); font-size: 12px; min-height: 1.2em; }
.section-title {
  font-family: var(--font-display);
  color: var(--gold);
  font-size: clamp(16px, 3vw, 18px);
  letter-spacing: .08em;
}
.tabs { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.tab {
  border: 1px solid transparent;
  background: rgba(255,255,255,.03);
  color: var(--muted);
  padding: 8px 12px;
  cursor: pointer;
  font: inherit;
  border-radius: 999px;
  transition: .25s ease;
}
.tab.active {
  color: #1a140c;
  background: linear-gradient(180deg, #e0c07a, #b8914a);
  border-color: #e6c98a;
}
#customBox { display: none; }
#customBox.show { display: grid; }
.scroll-thin { scrollbar-width: thin; scrollbar-color: rgba(212,175,105,.38) transparent; }
.scroll-thin::-webkit-scrollbar { width: 5px; }
.scroll-thin::-webkit-scrollbar-track { background: transparent; }
.scroll-thin::-webkit-scrollbar-thumb { background: rgba(212,175,105,.35); border-radius: 999px; }

@media (max-width: 480px) {
  .app {
    padding-top: 10px;
    padding-left: max(10px, env(safe-area-inset-left));
    padding-right: max(10px, env(safe-area-inset-right));
  }
  .char-grid { grid-template-columns: repeat(2, 1fr); }
  .btn {
    width: auto;
    min-width: auto;
    padding: 10px 14px;
    text-align: center;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .foot {
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    gap: 8px;
    padding-top: 8px;
  }
  .foot .btn {
    flex: 1 1 auto;
    min-width: max-content;
    max-width: none;
    height: auto;
    white-space: nowrap;
    writing-mode: horizontal-tb;
  }
  .foot-msg {
    order: -1;
    flex: 1 0 100%;
    width: 100%;
  }
  .grid-2 { gap: 10px; }
  .tabs { gap: 6px; margin-bottom: 6px; }
  .tab { padding: 7px 11px; }
  .hint { font-size: 11px; }
  .detail-row.intro {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .detail-row.appearance { display: none; }
}
@media (max-height: 720px) {
  textarea { min-height: 48px; max-height: 120px; }
  .panel { padding: 12px 12px; }
  .hero h1 { font-size: clamp(28px, 7vw, 48px); }
  .mode-card p { -webkit-line-clamp: 2; }
  .section-title { font-size: 15px; }
  .brand { font-size: 11px; }
}
@media (max-height: 560px) {
  .ornament { margin: 4px 0 8px; }
  .page.active { gap: 6px; }
  .page-body { padding-bottom: 8px; }
  .hero .hook { margin-top: 10px; font-size: 13px; }
  .mode-card, .char-card { padding: 7px 9px; }
  .char-card .swatch { height: 28px; }
  .foot {
    padding-top: 6px;
    padding-bottom: 0;
  }
  .detail.show {
    max-height: min(360px, 78vw);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}

/* Product finish: shared with the status surface. */
body {
  background:
    linear-gradient(135deg, rgba(255,255,255,.018), transparent 42%),
    linear-gradient(180deg, #111114, var(--st-bg));
}
.hero::before { opacity: .34; }
.hero-glass,
.panel {
  border: 1px solid var(--st-line);
  border-radius: var(--st-radius);
  background: var(--st-surface);
  box-shadow: inset 0 1px rgba(255,255,255,.055), 0 24px 64px rgba(0,0,0,.34);
  backdrop-filter: blur(24px) saturate(1.22);
  -webkit-backdrop-filter: blur(24px) saturate(1.22);
}
.hero-glass::before,
.panel::before { background: linear-gradient(180deg, rgba(255,255,255,.035), transparent 34%); }
.hero h1 { color: #ead7ad; text-shadow: none; }
.hero .hook { color: #aaa59e; }
.hero .hook em { color: var(--st-gold); }
.btn {
  min-height: 36px;
  padding: 8px 13px;
  border: 0;
  border-radius: 6px;
  color: #c8c0b4;
  background: rgba(255,255,255,.035);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.065);
  letter-spacing: 0;
  backdrop-filter: none;
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.btn:hover {
  color: var(--st-text);
  background: rgba(255,255,255,.06);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.09);
  transform: translateY(-1px);
}
.btn:active { transform: scale(.97); }
.btn.primary,
.tab.active {
  color: #19140e;
  border: 0;
  background: linear-gradient(180deg, #e2cb99, #c5a263);
  box-shadow: inset 0 1px rgba(255,255,255,.35), 0 5px 16px rgba(171,132,65,.16);
}
.btn.primary:hover { box-shadow: inset 0 1px rgba(255,255,255,.35), 0 7px 20px rgba(171,132,65,.2); }
.btn.ghost { border: 0; background: rgba(255,255,255,.025); box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
.tab {
  min-height: 32px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  background: rgba(255,255,255,.028);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.055);
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease;
}
.mode-card,
.char-card,
.custom-card {
  border: 0;
  border-radius: 6px;
  background: rgba(255,255,255,.026);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  backdrop-filter: none;

.summon-stage {
  position: relative;
  width: 100%;
  max-width: none;
  min-height: 0;
  flex: 1 1 0;
  height: 100%;
  margin: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  overflow: hidden;
  border: 1px solid rgba(246,220,177,.13);
  border-radius: 14px;
  background:
    linear-gradient(145deg, rgba(255,248,236,.075), transparent 32%),
    linear-gradient(180deg, rgba(58,39,42,.52), rgba(15,14,18,.7));
  box-shadow: inset 0 1px rgba(255,250,240,.1), 0 28px 70px rgba(0,0,0,.34);
  backdrop-filter: blur(22px) saturate(1.28);
  -webkit-backdrop-filter: blur(22px) saturate(1.28);
}
/* 光环必须大于前景卡，否则召唤动画会被卡片完全挡住 */
.summon-stage::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(115deg, transparent 0 26px, rgba(255,255,255,.018) 26px 27px);
}
.summon-stage::after {
  content: "";
  position: absolute;
  top: -20%;
  left: -40%;
  width: 34%;
  height: 140%;
  z-index: 0;
  pointer-events: none;
  opacity: .55;
  background: linear-gradient(90deg, transparent, rgba(242,201,139,.12), transparent);
  transform: translateX(-120%) skewX(-12deg);
  will-change: transform;
}
.summon-stage.summoning::after { animation: summonSweep 1.4s var(--ease) infinite; }
.summon-visual {
  position: relative;
  z-index: 1;
  min-height: 0;
  display: grid;
  place-items: center;
  padding: clamp(12px, 3.5%, 42px) clamp(10px, 2vw, 28px) clamp(10px, 2%, 22px);
  overflow: hidden;
}
.summon-fx {
  position: absolute;
  width: min(96%, 560px);
  height: min(96%, 560px);
  aspect-ratio: 1;
  left: 50%;
  top: 46%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1;
}
.summon-beam {
  position: absolute;
  left: 50%;
  top: -18%;
  width: 2px;
  height: 130%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, transparent, rgba(240,217,160,.85), transparent);
  filter: blur(.4px);
  animation: beamPulse 2.2s ease-in-out infinite;
  opacity: .9;
}
.summon-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(233,199,139,.72);
  box-shadow: 0 0 36px rgba(210,151,103,.34), inset 0 0 28px rgba(212,175,105,.14);
  animation: ringPulse 2.8s ease-in-out infinite;
}
.summon-ring.outer {
  inset: -10%;
  border-width: 1px;
  border-color: rgba(233,199,139,.42);
  animation-duration: 3.8s;
}
.summon-ring.mid {
  inset: 10%;
  border-style: dashed;
  border-color: rgba(240,217,168,.55);
  box-shadow: none;
  animation: sigilTurn 22s linear infinite;
}
.summon-sigil {
  position: absolute;
  inset: 18%;
  border-radius: 50%;
  border: 1.5px solid rgba(233,199,139,.62);
  opacity: 1;
  box-shadow: inset 0 0 0 14px rgba(213,169,113,.07), inset 0 0 0 15px rgba(233,199,139,.28), 0 0 44px rgba(202,137,107,.28);
  animation: sigilTurn 7s linear infinite;
}
.summon-sigil::before,
.summon-sigil::after {
  content: "";
  position: absolute;
  inset: 22%;
  border: 1px solid rgba(242,215,164,.55);
  transform: rotate(45deg);
}
.summon-sigil::after {
  inset: 34%;
  transform: none;
  border-radius: 50%;
  border-style: dashed;

.summon-card {
  position: relative;

  width: min(78%, 300px);

  box-shadow: 0 16px 36px rgba(0,0,0,.32);
  overflow: hidden;
  transition: transform 600ms var(--ease), border-color 600ms ease, box-shadow 600ms ease;
  animation: cardReveal .9s var(--ease) both;

.summon-card::before {
  content: "";

  inset: 0;
  border-radius: inherit;

}
.summon-card::after {

}

function streamPhaseForLength(length) {
  let phase = STREAM_PHASES[0];
  for (const item of STREAM_PHASES) {
    if (length >= item.min) phase = item;
  }
  return phase;
}

function setGenerationState(title, status, done = false) {
  const titleEl = $("#generationTitle");
  const statusEl = $("#generationStatus");
  const meter = $("#generationMeter");
  const cancel = $("#btnCancelGeneration");
  if (titleEl) titleEl.textContent = title || "";
  if (statusEl) statusEl.textContent = status || "";
  if (meter) {
    meter.style.display = done ? "none" : "block";
    meter.classList.toggle("is-done", !!done);
  }
  const cancelLabel = cancel && $(".btn-label", cancel);
  if (cancelLabel) cancelLabel.textContent = "再想一下";
}

/** 首楼只用短辨识，完整档案交给世界书触发 */
function clipVoice(text, max = 96) {
  let s = String(text || "").trim().replace(/\s+/g, "");
  if (!s) return "";
  const parts = s.split(/(?<=[。！？])/).filter(Boolean);
  s = (parts.slice(0, 2).join("") || s);
  if (s.length <= max) return s;
  const cut = s.slice(0, max);
  const i = Math.max(cut.lastIndexOf("。"), cut.lastIndexOf("，"), cut.lastIndexOf("；"));
  return (i > 36 ? cut.slice(0, i + (cut[i] === "。" ? 1 : 0)) : cut) + (i > 36 && cut[i] === "。" ? "" : "…");
}

function openingGoal(enc) {
  const seed = String(enc.污秽类型 || "").trim();
  if (seed) return "弄清污秽成因并压下症状，同时判断此处是否安全";
  return "确认污秽来源并保全自身";
}

function patchPathSegment(value) {
  return String(value || "").replace(/~/g, "~0").replace(/\//g, "~1");
}

function randomIndex(length) {
  if (!Number.isInteger(length) || length < 1) throw new Error("当前没有可用的随机选项。");
  if (globalThis.crypto && typeof globalThis.crypto.getRandomValues === "function") {
    const ceiling = Math.floor(0x100000000 / length) * length;
    const value = new Uint32Array(1);
    do globalThis.crypto.getRandomValues(value); while (value[0] >= ceiling);
    return value[0] % length;
  }
  return Math.floor(Math.random() * length);
}

function pickOne(list) {
  return list[randomIndex(list.length)];
}

function pickSanctumForm(era) {
  const candidates = OPENING_OPTIONS.sanctum_forms.filter(item =>
    Array.isArray(item.compatible_eras) && item.compatible_eras.includes(era.id)
  );
  if (!candidates.length) throw new Error(`当前时代没有可用的圣堂形态：${era.title}`);
  return pickOne(candidates);
}

function selectedAbility(randomAbility) {
  if (randomAbility) return pickOne(OPENING_OPTIONS.ability_presets);
  const id = String($("#abilityPreset") && $("#abilityPreset").value || "");
  const preset = OPENING_OPTIONS.ability_presets.find(item => item.id === id) || OPENING_OPTIONS.ability_presets[0];
  const summary = String($("#abilityCustom") && $("#abilityCustom").value || "").trim();
  if (!summary) throw new Error("请写下能力效果、限制或代价。");
  if (preset && summary === preset.summary) return preset;
  return { id: "custom", title: preset ? `${preset.title}·改` : "自定义能力", summary };
}

function sampleOpeningConfig({ randomAbility: randomAll }) {
  const era = pickOne(OPENING_OPTIONS.eras);
  return Object.freeze({
    character: pickOne(CHARACTERS),
    era,
    storyType: pickOne(OPENING_OPTIONS.story_types),
    atmosphere: pickOne(OPENING_OPTIONS.atmospheres),
    sanctumForm: pickSanctumForm(era),
    integrationMode: pickOne(OPENING_OPTIONS.integration_modes),
    ability: selectedAbility(randomAll),
  });
}

    年龄外观: inputText("heroAppearance", "帅气的高中生", 60),
    性格倾向: inputText("heroPersonality", "阴暗好色", 60),
    表面作风: inputText("heroStyle", "温和耐心，以救人为先", 120),
    私下心思: inputText("heroThought", "性压抑的高中男生", 120),
    能力摘要: config.ability.summary,
  };
}

function openingScene(config) {
  return config.sanctumForm.scene || config.sanctumForm.title;
}

function cloneOpeningData(data) {
  if (typeof structuredClone === "function") return structuredClone(data);
  return JSON.parse(JSON.stringify(data));
}

function applyOpeningInitialization(oldData, config, persona, enc) {
  const initialized = cloneOpeningData(oldData);
  if (!hasOpeningStatData(initialized)) throw new Error("开局变量结构不完整，请重新读取后再试。");
  const roleState = {
    污秽度: 40,
    好感度: 0,
    堕落值: 0,
    受孕进度: 0,
    外貌: enc.外貌,
    当前状态: "刚刚抵达陌生环境，保持戒备并观察周围",
    心里想法: "先弄清这里是什么地方，再决定下一步。",
    与user关系: "陌生",
    心情: "戒备",
  };
  initialized.stat_data.世界._开局配置 = {
    时代背景: config.era.title,
    故事类型: config.storyType.title,
    故事氛围: config.atmosphere.title,
    圣堂形态: config.sanctumForm.title,
    世界融入方式: config.integrationMode.title,
  };
  initialized.stat_data.世界.场景 = openingScene(config);
  initialized.stat_data.角色[enc.姓名] = roleState;
  initialized.stat_data.世界.出场角色 = [enc.姓名];
  Object.assign(initialized.stat_data.主角, persona);
  return initialized;
}

function buildOpeningPrompt(config, persona, enc) {
  const voice = clipVoice(enc.短识, 108);
  const rolePath = patchPathSegment(enc.姓名);
  const heroName = persona.姓名 || "{{user}}";
  return [
    "【圣堂初遇·随机开局】第三人称；主角称 {{user}}。写一场可以继续互动的完整开场，不写人物说明书。",
    `【时代与世界】${config.era.title}：${config.era.prompt}`,
    `【故事类型】${config.storyType.title}。核心目标：${config.storyType.core_goal}。失败风险：${config.storyType.failure_stakes}。${config.storyType.prompt}`,
    "【结构说明】核心目标是本局持续推进的主线，开场只建立冲突与第一个可执行步骤；失败风险随人物行动与事件发展逐步逼近。",
    `【故事氛围】${config.atmosphere.title}：${config.atmosphere.prompt}`,
    `【圣堂形态】${config.sanctumForm.title}：${config.sanctumForm.prompt}`,
    `【世界融入】${config.integrationMode.title}：${config.integrationMode.prompt}`,
    `【主角】姓名：${heroName}；身份：${persona.身份}；年龄外观：${persona.年龄外观}；性格倾向：${persona.性格倾向}`,
    `【主角作风】表面：${persona.表面作风}；私下：${persona.私下心思}；能力：${persona.能力摘要}`,
    `【初遇女主】${enc.姓名}（${enc.作品}）`,
    `原作辨识：${voice}`,
    `外貌锚点：${enc.外貌}`,
    `原始异常灵感：${enc.污秽类型}`,
    "【开场因果链】",
    "1. 用具体事件解释她为何出现在当前世界，并交代选择、代价或线索来源。",
    "2. 建立她在当前时代的身份、社会关系与现实约束。",
    "3. 通过具体事件说明她为何与圣堂发生联系。",
    "4. 让她围绕自己的主动追求采取行动，再与{{user}}形成交集。",
    "5. 说明异常如何进入因果链，并把原始异常灵感重构成当前题材可理解的表现。",
    "【跨时代改写规则】",
    "- 角色核心性格、语言习惯、价值冲突、独立目标和行动边界持续生效。",
    "- 原作能力保留功能核心；表现不适配时转译为当前时代功能相近的术法、技术、身份资源或专业能力。",
    "- 原作经历可映射为本世界功能相近的经历，由这些经历形成的人格矛盾继续驱动选择。",
    "- 圣堂保留净化体系、跨界节点、仪式规则和长期据点四项本质，外形与社会职能按当前时代重构。",
    "- 评价基于亲历且可验证的事实；初见从陌生、求证、试探或保持距离开始。",
    "- 认可效果本身，关系仍按事件推进；特殊感来自连续相处、共同承担和反复验证。",
    "- 从正在发生的事件起笔，结尾停在需要{{user}}回应或决策的位置。",
    `- 末尾输出一个 <UpdateVariable>（Analysis + JSONPatch），根据正文更新 /角色/${rolePath}/与user关系、/角色/${rolePath}/心情、/角色/${rolePath}/外貌、/角色/${rolePath}/当前状态、/角色/${rolePath}/心里想法及确有依据的污秽度/好感度/堕落值/受孕进度；信任或依存度不再单独记账；与user关系与心情均为 1~4 个汉字的短 tag；心里想法使用第一人称 15-40 个汉字，每项更新对应正文已发生或角色实际感知的变化。`,
  ].join("\n");
}

function clearRevealTimers() {
  if (state.revealTimer) clearInterval(state.revealTimer);
  state.revealTimer = null;
  if (state.revealFinishTimer) clearTimeout(state.revealFinishTimer);
  state.revealFinishTimer = null;
}

function finishReveal(config) {
  clearRevealTimers();
  const character = config.character;
  const kicker = $("#revealKicker");
  if (kicker) kicker.textContent = "异界来客已显现";
  const stage = $("#revealStage");
  if (stage) {
    stage.classList.remove("summoning");
    stage.classList.add("summon-resolved");
  }
  const reel = $("#revealReel");
  if (reel) {
    reel.classList.remove("spinning");
    reel.textContent = `${config.integrationMode.title} · ${config.sanctumForm.title}`;
  }
  $("#revealName").textContent = character.name;
  $("#revealWork").textContent = character.work || "";
  $("#revealBlurb").textContent = character.blurb || character.intro || "";
  $("#revealContext").textContent = `${config.era.title} · ${config.storyType.title} · ${config.atmosphere.title} · ${config.ability.title}`;
  if (activeOpening) activeOpening.revealDone = true;
}

function startReveal(config) {
  clearRevealTimers();
  const reduced = globalThis.matchMedia && globalThis.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const reel = $("#revealReel");
  const stage = $("#revealStage");
  if (stage) {
    stage.classList.remove("summon-resolved");
    stage.classList.add("summoning");
  }
  const kicker = $("#revealKicker");
  if (kicker) kicker.textContent = "召唤仪式进行中";
  $("#revealName").textContent = "异界回响正在聚形";
  $("#revealWork").textContent = "";
  $("#revealBlurb").textContent = "圣堂正在回应另一个世界的回声。";
  $("#revealContext").textContent = `${config.era.title} · ${config.storyType.title} · ${config.ability.title}`;
  if (reduced) {
    finishReveal(config);
    return Promise.resolve();
  }
  if (reel) reel.classList.add("spinning");
  state.revealTimer = setInterval(() => {
    const candidates = [];
    for (let index = 0; index < 4; index += 1) candidates.push(pickOne(CHARACTERS).name);
    if (reel) reel.textContent = candidates.join(" · ");
  }, 150);
  return new Promise(resolve => {
    state.revealResolve = resolve;
    state.revealFinishTimer = setTimeout(() => {
      state.revealFinishTimer = null;
      state.revealResolve = null;
      finishReveal(config);
      resolve();
    }, 1850);
  });
}

function getApi(name) {
  const roots = [];
  try { roots.push(window); } catch (_) {}
  try { if (window.parent && window.parent !== window) roots.push(window.parent); } catch (_) {}
  try { if (window.top && window.top !== window) roots.push(window.top); } catch (_) {}
  for (const w of roots) {
    try {
      if (w && typeof w[name] === "function") return w[name].bind(w);
    } catch (_) {}
  }
  for (const w of roots) {
    try {
      const st = w.SillyTavern || w.sillyTavern;
      if (st && typeof st[name] === "function") return st[name].bind(st);
    } catch (_) {}
  }
  return null;
}

async function waitMvu(timeout = 2500) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const Mvu = window.Mvu || (window.parent && window.parent.Mvu);
    if (Mvu && Mvu.parseMessage) return Mvu;
    await new Promise(r => setTimeout(r, 80));
  }
  return null;
}

function hasOpeningStatData(data) {
  const stat = data && data.stat_data;
  return !!(stat && stat.世界 && stat.主角 && stat.角色);
}

async function waitOpeningMvuData(Mvu, timeout = 5000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const data = Mvu.getMvuData({ type: "message", message_id: 0 });
    if (hasOpeningStatData(data)) return data;
    await new Promise(r => setTimeout(r, 100));
  }
  throw new Error("开局数据尚未就绪，请重新读取后再试。");
}

function asGenText(raw) {
  if (typeof raw === "string") return raw;
  if (raw && typeof raw === "object") return String(raw.result || raw.message || raw.text || "");
  return "";
}

function openingMessage(text) {
  const body = String(text || "").trim();
  if (!body) return "";
  if (/<StatusPlaceHolderImpl\s*\/>/i.test(body)) return body;
  return body + "\n\n<StatusPlaceHolderImpl/>";
}

let activeOpening = null;

function currentChatId() {
  try {
    const roots = [window, window.parent, window.top];
    for (const root of roots) {
      const st = root && (root.SillyTavern || root.sillyTavern);
      if (st && typeof st.getCurrentChatId === "function") return String(st.getCurrentChatId() || "");
    }
  } catch (_) {}
  return "";
}

function assertOpeningCanCommit(run, getMsgs) {
  if (run.cancelled) throw new Error(run.cancelReason || "生成已取消");
  if (run.chatId && currentChatId() !== run.chatId) throw new Error("聊天已切换，开局未写入");
  const latestFloor0 = (getMsgs(0, { include_swipes: false }) || [])[0];
  if (!latestFloor0 || String(latestFloor0.message || "") !== run.originalMessage) {
    throw new Error("0 楼内容已变化，开局未覆盖");
  }
}

function stopOpening(reason) {
  state.attemptId += 1;
  const run = activeOpening;
  clearRevealTimers();
  if (state.revealResolve) state.revealResolve();
  state.revealResolve = null;
  const stage = $("#revealStage");
  if (stage) stage.classList.remove("summoning");
  if (!run) return;
  run.cancelled = true;
  run.cancelReason = reason || "已取消";
  if (run.streamHandle && typeof run.streamHandle.stop === "function") {
    try { run.streamHandle.stop(); } catch (_) {}
  }
  if (run.timer) clearTimeout(run.timer);
  if (run.progressTimer) clearTimeout(run.progressTimer);
  if (typeof run.stopGeneration === "function") {
    try { run.stopGeneration(run.generationId); } catch (_) {}
  }
  activeOpening = null;
}

function scheduleStreamProgress(run, fullText) {
  run.pendingLength = String(fullText || "").length;
  if (run.progressTimer) return;
  run.progressTimer = setTimeout(() => {
    run.progressTimer = null;
    if (run.cancelled || activeOpening !== run) return;
    const phase = streamPhaseForLength(run.pendingLength);
    if (run.streamPhaseTitle === phase.title) return;
    run.streamPhaseTitle = phase.title;
    setGenerationState(phase.title, phase.status, false);
  }, 160);
}

function runGeneration(generatePromise, run, timeoutMs) {
  return new Promise((resolve, reject) => {
    run.timer = setTimeout(() => {
      if (typeof run.stopGeneration === "function") {
        try { run.stopGeneration(run.generationId); } catch (_) {}
      }
      reject(new Error("开局生成超时（" + Math.round(timeoutMs / 1000) + "s）"));
    }, timeoutMs);
    Promise.resolve(generatePromise).then(resolve, reject).finally(() => {
      if (run.timer) clearTimeout(run.timer);
      run.timer = null;
    });
  });
}

function setStartReady() {
  const button = $("#btnStart");
  if (!button || state.starting) return;
  const label = $(".btn-label", button);
  if (label) label.textContent = "那就开始吧~";
}

function syncAbilityFromPreset(announce = false) {
  const preset = $("#abilityPreset");
  const custom = $("#abilityCustom");
  if (!preset || !custom) return;
  const ability = OPENING_OPTIONS.ability_presets.find(item => item.id === preset.value)
    || OPENING_OPTIONS.ability_presets[0];
  if (!ability) return;
  custom.value = ability.summary;
  const notice = $("#abilityNotice");
  if (notice) notice.textContent = announce ? `随机抽到：${ability.title}` : `已选择：${ability.title}`;
}

function randomizeAbility() {
  const preset = $("#abilityPreset");
  if (!preset || !OPENING_OPTIONS.ability_presets.length) return;
  const alternatives = OPENING_OPTIONS.ability_presets.filter(item => item.id !== preset.value);
  const ability = pickOne(alternatives.length ? alternatives : OPENING_OPTIONS.ability_presets);
  preset.value = ability.id;
  syncAbilityFromPreset(true);
  const button = $("#btnRandomAbility");
  if (button && typeof button.animate === "function") {
    button.animate(
      [{ transform: "scale(.97)" }, { transform: "scale(1.02)" }, { transform: "scale(1)" }],
      { duration: 280, easing: "cubic-bezier(.22,1,.36,1)" },
    );
  }
}

async function startGame() {
  const warn = $("#warn");
  const startButton = $("#btnStart");
  const resetButtons = () => {
    state.starting = false;
    if (startButton) {
      startButton.disabled = false;
      setStartReady();
    }
  };
  if (warn) warn.textContent = "";
  if (state.starting) return;

  let config;
  try {
    config = sampleOpeningConfig({ randomAbility: false });
  } catch (error) {
    if (warn) warn.textContent = error.message || String(error);
    return;
  }
  const persona = openingPersona(config);
  const enc = encounterFromCharacter(config.character);
  const prompt = buildOpeningPrompt(config, persona, enc);
  const attemptId = ++state.attemptId;

  state.starting = true;
  if (startButton) {
    startButton.disabled = true;
    const label = $(".btn-label", startButton);
    if (label) label.textContent = "正在召唤…";
  }
  setGenerationState("正在召唤，请稍候~", "圣堂正在回应异界回响。", false);
  showPage(4);
  const revealPromise = startReveal(config);

  const generateFn = getApi("generate") || getApi("Generate");
  const setMsgs = getApi("setChatMessages") || getApi("setChatMessage");
  const getMsgs = getApi("getChatMessages");
  const eventOn = getApi("eventOn");
  const stopGeneration = getApi("stopGenerationById");
  const streamEvt = (typeof iframe_events !== "undefined" && iframe_events.STREAM_TOKEN_RECEIVED_FULLY)
    || "js_stream_token_received_fully";
  const GEN_TIMEOUT_MS = 120000;

  try {
    const Mvu = await waitMvu(5000);
    if (attemptId !== state.attemptId) throw new Error("生成已取消");
    if (!Mvu) throw new Error("开局组件尚未就绪，请稍后重试。");
    if (!generateFn || !setMsgs || !getMsgs) throw new Error("当前环境暂不支持生成，请检查酒馆助手后重试。");
    const floor0 = (getMsgs(0, { include_swipes: false }) || [])[0];
    if (!floor0) throw new Error("无法读取当前开局页面，请重新打开后再试。");

    const generationId = "shengtang-opening-" + Date.now() + "-" + Math.random().toString(36).slice(2, 9);
    const run = {
      generationId,
      generation_id: generationId,
      config: config,
      revealDone: false,
      generationDone: false,
      chatId: currentChatId(),
      originalMessage: String(floor0.message || ""),
      cancelled: false,
      cancelReason: "",
      streamHandle: null,
      timer: null,
      progressTimer: null,
      pendingLength: 0,
      streamPhaseTitle: "",
      stopGeneration,
    };
    activeOpening = run;
    if (typeof eventOn === "function") {
      const onStream = (fullText, generationId) => {
        if (generationId !== run.generationId || run.cancelled) return;
        scheduleStreamProgress(run, fullText);
      };
      run.streamHandle = eventOn(streamEvt, onStream);
    }

    const oldData = await waitOpeningMvuData(Mvu, 6000);
    const initializedData = applyOpeningInitialization(oldData, config, persona, enc);
    setGenerationState("召唤已经回应~", "来客的身影正在圣堂中显现。", false);
    const raw = await runGeneration(
      generateFn({ user_input: prompt, should_stream: true, generation_id: generationId }),
      run,
      GEN_TIMEOUT_MS,
    );
    const text = asGenText(raw).trim();
    if (!text) throw new Error("生成内容为空，请重试。");
    run.generationDone = true;
    await revealPromise;
    setGenerationState("初遇正在成形~", "圣堂正在整理最后的回响。", false);
    assertOpeningCanCommit(run, getMsgs);
    const finalData = (await Mvu.parseMessage(text, initializedData)) || initializedData;
    assertOpeningCanCommit(run, getMsgs);
    if (run.streamHandle && typeof run.streamHandle.stop === "function") run.streamHandle.stop();
    if (run.progressTimer) clearTimeout(run.progressTimer);
    await setMsgs(
      [{ message_id: 0, message: openingMessage(text), data: finalData }],
      { refresh: "affected" },
    );
    activeOpening = null;
    state.starting = false;
    setGenerationState("来客已现身~", "初遇已展开，轮到你回应。", true);
  } catch (error) {
    stopOpening(error && error.message ? error.message : String(error));
    console.error(error);
    if (warn) warn.textContent = "召唤暂未回应，请返回后再次尝试。";
    setGenerationState("召唤暂未回应", "可以调整能力后再次尝试。", true);
    resetButtons();
  }
}

function init() {
  const preset = $("#abilityPreset");
  if (preset) {
    preset.innerHTML = OPENING_OPTIONS.ability_presets
      .map(item => `<option value="${item.id}">${item.title}</option>`)
      .join("") + '<option value="custom">自定义能力</option>';
    preset.addEventListener("change", () => {
      if (preset.value === "custom") {
        const custom = $("#abilityCustom");
        if (custom) custom.focus();
        return;
      }
      syncAbilityFromPreset(false);
    });
  }
  syncAbilityFromPreset(false);
  const custom = $("#abilityCustom");
  if (custom) custom.addEventListener("input", () => { if (preset) preset.value = "custom"; });
  $("#btnRandomAbility").onclick = () => randomizeAbility();
  $("#btnEnter").onclick = () => showPage(2);
  $("#btnStart").onclick = () => startGame();
  $("#btnCancelGeneration").onclick = () => {
    stopOpening("用户取消生成");
    state.starting = false;
    const startButton = $("#btnStart");
    if (startButton) { startButton.disabled = false; setStartReady(); }
    setGenerationState("召唤尚未完成", "可以调整能力后再次尝试。");
    showPage(2);
  };
  $$("[data-back]").forEach(b => b.onclick = () => showPage(Number(b.dataset.back)));
}

window.addEventListener("pagehide", () => {
  stopOpening("页面已卸载");
  if (state.chatChangeHandle && typeof state.chatChangeHandle.stop === "function") state.chatChangeHandle.stop();
  state.chatChangeHandle = null;
});
try {
  const eventOn = getApi("eventOn");
  const chatEvt = (typeof tavern_events !== "undefined" && tavern_events.CHAT_CHANGED) || "chat_changed";
  if (typeof eventOn === "function") {
    state.chatChangeHandle = eventOn(chatEvt, () => stopOpening("聊天已切换"));
  }
} catch (_) {}
init();
</script>
