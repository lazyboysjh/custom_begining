<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>圣堂初遇</title>
<style>
:root {
  --ink: #0c0d10;
  --ink-2: #14161c;
  --panel: rgba(18, 20, 28, 0.45);
  --line: rgba(212, 175, 105, 0.28);
  --gold: #d4af69;
  --gold-2: #f0d9a0;
  --rose: #9e3d4a;
  --glass: #5b7c99;
  --text: #ebe6dc;
  --muted: #9a958a;
  --danger: #c45c48;
  --ok: #6b8f71;
  --radius: 16px;
  --ease: cubic-bezier(.22, 1, .36, 1);
  --font-display: "Cormorant Garamond", "Noto Serif SC", "Songti SC", serif;
  --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  max-height: 100dvh;
  overflow: hidden;
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(158, 61, 74, 0.22), transparent 55%),
    radial-gradient(900px 500px at 90% 10%, rgba(91, 124, 153, 0.18), transparent 50%),
    radial-gradient(700px 400px at 50% 100%, rgba(212,175,105,.06), transparent 40%),
    linear-gradient(180deg, #101218 0%, #0c0d10 45%, #0a0b0e 100%);
  background-attachment: fixed;
}
.app {
  height: 100%;
  max-height: 100dvh;
  max-width: 980px;
  margin: 0 auto;
  padding: 14px 14px 10px;
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.ornament {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.7;
  margin: 8px 0 12px;
  flex-shrink: 0;
}
.brand {
  font-family: var(--font-display);
  letter-spacing: 0.28em;
  text-indent: 0.28em;
  color: var(--gold-2);
  font-size: 12px;
  text-transform: uppercase;
  animation: fadeUp .6s var(--ease) both;
  flex-shrink: 0;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 500; margin: 0; }
.page { display: none; }
.page.active {
  display: flex;
  flex-direction: column;
  flex: 1 1 auto;
  gap: 10px;
  min-height: 0;
  overflow: hidden;
  animation: pageIn .55s var(--ease) both;
}
.page-body {
  flex: 1 1 auto;
  min-height: 0;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-right: 4px;
  padding-bottom: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,105,.38) transparent;
}
.page-body::-webkit-scrollbar { width: 5px; }
.page-body::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
.page-body::-webkit-scrollbar-thumb {
  background: rgba(212,175,105,.35);
  border-radius: 999px;
}
.page-body::-webkit-scrollbar-thumb:hover { background: rgba(212,175,105,.55); }
.page[data-page="1"] .page-body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}
.page[data-page="3"] .page-body {
  display: block;
}
#poolBox {
  display: block;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}

/* Page 1 */
.hero {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 0;
  width: 100%;
  padding: 12px 4px 8px;
  position: relative;
}
.hero-glass {
  position: relative;
  width: min(100%, 560px);
  margin: 0 auto;
  padding: 24px 20px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.12);
  background:
    linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.02) 45%, rgba(212,175,105,.05)),
    rgba(10, 12, 18, 0.35);
  backdrop-filter: blur(28px) saturate(1.55);
  -webkit-backdrop-filter: blur(28px) saturate(1.55);
  box-shadow: 0 24px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);
  overflow: hidden;
  animation: fadeUp .8s var(--ease) .12s both;
}
.hero-glass::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(400px 180px at 20% 0%, rgba(158,61,74,.18), transparent 60%),
    linear-gradient(180deg, rgba(255,255,255,.08), transparent 35%);
  pointer-events: none;
}
.hero-glass > * { position: relative; z-index: 1; }
.hero::before {
  content: "";
  position: absolute; inset: 8% 0 auto;
  height: 55%;
  background:
    linear-gradient(120deg, transparent 20%, rgba(212,175,105,.08) 45%, transparent 70%),
    repeating-linear-gradient(-18deg, transparent, transparent 18px, rgba(91,124,153,.045) 18px, rgba(91,124,153,.045) 19px);
  pointer-events: none;
  animation: fadeUp 1s var(--ease) .1s both;
}
.hero h1 {
  font-size: clamp(32px, 8vw, 64px);
  letter-spacing: 0.12em;
  color: var(--gold-2);
  text-shadow: 0 0 40px rgba(212,175,105,.2);
  animation: fadeUp .7s var(--ease) .15s both;
}
.hero .hook {
  margin-top: 14px;
  max-width: 34em;
  color: var(--muted);
  font-size: clamp(13px, 2.6vw, 15px);
  animation: fadeUp .7s var(--ease) .28s both;
}
.hero .hook em { color: var(--gold); font-style: normal; }

/* Shared UI — frosted glass */
.panel {
  position: relative;
  background:
    linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.02) 45%, rgba(212,175,105,.05)),
    rgba(12, 14, 20, 0.36);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--radius);
  padding: 14px 16px;
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  box-shadow: 0 16px 48px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.16);
  overflow: visible;
  animation: fadeUp .55s var(--ease) both;
}
.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,.06), transparent 30%);
  pointer-events: none;
}
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.grow { flex: 1; }
label.field {
  display: flex; flex-direction: column; gap: 6px;
  font-size: 12px; color: var(--muted); letter-spacing: .06em;
  position: relative; z-index: 1;
}
input, textarea, select {
  width: 100%;
  background: rgba(0,0,0,.32);
  border: 1px solid rgba(212,175,105,.22);
  color: var(--text);
  border-radius: 10px;
  padding: 10px 12px;
  font: inherit;
  outline: none;
  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
}
input:focus, textarea:focus, select:focus {
  border-color: rgba(212,175,105,.55);
  box-shadow: 0 0 0 3px rgba(212,175,105,.12);
  background: rgba(0,0,0,.4);
}
textarea { min-height: 64px; max-height: 160px; resize: vertical; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

.btn {
  appearance: none; border: 1px solid var(--gold);
  background: linear-gradient(180deg, rgba(212,175,105,.2), rgba(212,175,105,.06));
  color: var(--gold-2);
  padding: 11px 18px;
  border-radius: 999px;
  font: inherit;
  letter-spacing: .12em;
  cursor: pointer;
  transition: transform .25s var(--ease), background .25s ease, box-shadow .25s ease;
  backdrop-filter: blur(10px);
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: rgba(212,175,105,.3); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,175,105,.15); }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(180deg, #e0c07a, #b8914a);
  color: #1a140c;
  border-color: #e6c98a;
  font-weight: 600;
  box-shadow: 0 8px 28px rgba(212,175,105,.22);
}
.btn.primary:hover { box-shadow: 0 12px 32px rgba(212,175,105,.32); }
.btn.ghost { background: rgba(255,255,255,.03); border-color: rgba(212,175,105,.35); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
.foot {
  flex-shrink: 0;
  margin-top: 0;
  padding-top: 10px;
  display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  position: relative;
  z-index: 5;
  background: linear-gradient(180deg, transparent, rgba(10,11,14,.92) 35%);
  border-top: 1px solid rgba(255,255,255,.06);
  padding-bottom: 2px;
}
.page[data-page="3"] { padding-bottom: 0; }
.page[data-page="3"] .detail.show {
  margin-bottom: 12px;
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 4px;
}
@media (max-width: 640px) { .mode-grid { grid-template-columns: 1fr; } }
.mode-card, .char-card, .custom-card {
  border: 1px solid rgba(255,255,255,.1);
  background:
    linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
    rgba(8, 10, 14, 0.35);
  padding: 8px 10px;
  cursor: pointer;
  transition: transform .3s var(--ease), border-color .25s ease, box-shadow .3s var(--ease), background .25s ease;
  border-radius: 12px;
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.mode-card:hover, .char-card:hover {
  border-color: rgba(212,175,105,.45);
  transform: translateY(-1px);
  box-shadow: 0 10px 28px rgba(0,0,0,.28), 0 0 0 1px rgba(212,175,105,.1);
}
.mode-card.active, .char-card.active, .custom-card.active {
  border-color: rgba(212,175,105,.7);
  box-shadow: inset 0 0 0 1px rgba(212,175,105,.28), 0 8px 24px rgba(212,175,105,.12);
  background:
    linear-gradient(145deg, rgba(212,175,105,.14), rgba(255,255,255,.03)),
    rgba(12, 14, 20, 0.45);
}
.mode-card h3 { color: var(--gold-2); font-size: clamp(14px, 2.6vw, 16px); margin-bottom: 2px; }
.mode-card p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 单层滚动：角色池随 page-body 滚，禁止内层 max-height 再出一条系统白条 */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 8px;
  min-height: 0;
  max-height: none;
  overflow: visible;
  padding: 2px 0 4px;
  position: relative;
  z-index: 1;
  border: none;
  border-radius: 0;
  background: transparent;
}
.char-card.active {
  outline: 2px solid rgba(212,175,105,.85);
  outline-offset: 1px;
}
.char-card .swatch {
  height: 36px;
  border-radius: 10px;
  margin-bottom: 6px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 70%, #000), transparent),
    repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 2px, transparent 2px 6px);
  border: 1px solid rgba(255,255,255,.08);
  transition: transform .35s var(--ease);
  pointer-events: none;
}
.char-card:hover .swatch { transform: scale(1.03); }
.char-card .name { font-family: var(--font-display); font-size: 15px; color: var(--text); pointer-events: none; }
.char-card .work { color: var(--muted); font-size: 11px; margin-top: 2px; pointer-events: none; }
.char-card .blurb { display: none; }
.foot-msg {
  flex: 1 1 140px;
  color: var(--danger);
  font-size: 12px;
  line-height: 1.4;
  align-self: center;
  min-height: 1.2em;
}
.detail {
  display: none;
  margin-top: 8px;
  flex: 0 0 auto;
  max-height: none;
  overflow: visible;
  animation: fadeUp .4s var(--ease);
}
.detail.show { display: block; }
.detail h3 { color: var(--gold-2); margin-bottom: 6px; font-size: 17px; }
.detail .meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.detail strong { color: var(--gold); font-weight: 500; }
.hint { color: var(--muted); font-size: 12px; }
.warn { color: var(--danger); font-size: 12px; min-height: 1.2em; }
.section-title {
  font-family: var(--font-display);
  color: var(--gold);
  font-size: clamp(16px, 3vw, 18px);
  letter-spacing: .08em;
}
.tabs { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.tab {
  border: 1px solid transparent;
  background: rgba(255,255,255,.03);
  color: var(--muted);
  padding: 8px 12px;
  cursor: pointer;
  font: inherit;
  border-radius: 999px;
  transition: .25s ease;
}
.tab.active {
  color: #1a140c;
  background: linear-gradient(180deg, #e0c07a, #b8914a);
  border-color: #e6c98a;
}
#customBox { display: none; }
#customBox.show { display: grid; }
.scroll-thin { scrollbar-width: thin; scrollbar-color: rgba(212,175,105,.38) transparent; }
.scroll-thin::-webkit-scrollbar { width: 5px; }
.scroll-thin::-webkit-scrollbar-track { background: transparent; }
.scroll-thin::-webkit-scrollbar-thumb { background: rgba(212,175,105,.35); border-radius: 999px; }

@media (max-width: 480px) {
  .app { padding-top: 10px; padding-left: max(10px, env(safe-area-inset-left)); padding-right: max(10px, env(safe-area-inset-right)); }
  .char-grid { grid-template-columns: repeat(2, 1fr); }
  .btn { width: 100%; text-align: center; }
  .foot { flex-direction: column-reverse; }
  .foot-msg { order: -1; width: 100%; }
  .grid-2 { gap: 10px; }
}
@media (max-height: 720px) {
  textarea { min-height: 48px; max-height: 120px; }
  .panel { padding: 12px 12px; }
  .hero h1 { font-size: clamp(28px, 7vw, 48px); }
  .mode-card p { -webkit-line-clamp: 2; }
  .section-title { font-size: 15px; }
  .brand { font-size: 11px; }
}
@media (max-height: 560px) {
  .ornament { margin: 4px 0 8px; }
  .hero .hook { margin-top: 10px; font-size: 13px; }
  .mode-card, .char-card { padding: 7px 9px; }
  .char-card .swatch { height: 28px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="app" id="app">
  <!-- PAGE 1 -->
  <section class="page active" data-page="1">
    <div class="page-body">
      <div class="brand">SANCTUM ENCOUNTER</div>
      <div class="ornament"></div>
      <div class="hero">
        <div class="hero-glass">
          <h1>圣堂初遇</h1>
          <p class="hook">她踏入烛火与彩窗之间。<em>表面是净化污秽的仪式</em>——真正开始的，是你以圣职为名的靠近。</p>
          <div class="foot" style="justify-content:flex-start;margin-top:22px;background:none;border:0;padding:0;position:static;">
            <button class="btn primary" id="btnEnter" style="width:auto">进入圣堂</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- PAGE 2 -->
  <section class="page" data-page="2">
    <div class="page-body">
      <div class="brand">主角 · 牧师</div>
      <div class="ornament"></div>
      <div class="section-title">捏造你的身份</div>
      <p class="hint">默认是能净化污秽的教堂牧师。表面救人为先，私下可借仪式试探。</p>
      <div class="panel grid-2">
        <label class="field">姓名
          <input id="pName" placeholder="空则使用 {{user}}" />
        </label>
        <label class="field">年龄外观
          <input id="pAge" placeholder="例：二十七岁，清瘦，黑袍" value="二十余岁，黑袍牧师" />
        </label>
        <label class="field">教会 / 堂区名
          <input id="pChurch" value="圣言堂" />
        </label>
        <label class="field">性格倾向
          <input id="pTrait" placeholder="例：温和、耐心、话少" value="温和、耐心、话少" />
        </label>
        <label class="field">表面作风
          <textarea id="pSurface">温和耐心，以救人为先，流程专业。</textarea>
        </label>
        <label class="field">私下心思
          <textarea id="pPrivate">借检查与净化仪式靠近对方，试探底线。</textarea>
        </label>
      </div>
    </div>
    <div class="foot">
      <button class="btn ghost" data-back="1">返回</button>
      <button class="btn primary" id="btnToMeet">下一步 · 初遇</button>
    </div>
  </section>

  <!-- PAGE 3 -->
  <section class="page" data-page="3">
    <div class="page-body">
      <div class="brand">入局</div>
      <div class="ornament"></div>
      <div class="section-title">相遇方式</div>
      <div class="mode-grid" id="modeGrid"></div>

      <div class="section-title" style="margin-top:8px;">初遇角色</div>
      <div class="tabs">
        <button class="tab active" data-tab="pool">角色池</button>
        <button class="tab" data-tab="custom">自定义</button>
      </div>
      <div id="poolBox">
        <p class="hint" id="poolHint">点选下方角色；名单可上下滑动。</p>
        <div class="char-grid" id="charGrid"></div>
        <div class="panel detail" id="charDetail"></div>
      </div>
      <div id="customBox" class="panel grid-2">
        <label class="field">姓名<input id="cName" /></label>
        <label class="field">作品 / 世界观<input id="cWork" placeholder="例：原创 / 某作" /></label>
        <label class="field">外貌要点<textarea id="cLook" placeholder="只写可辨识特征"></textarea></label>
        <label class="field" style="grid-column:1/-1;">角色介绍（详细）<textarea id="cBlurb" placeholder="性格、经历、魅力与相处感觉，写详细些"></textarea></label>
        <label class="field" style="grid-column:1/-1;">污秽设定<textarea id="cFilth" placeholder="附体/诅咒/侵蚀等"></textarea></label>
        <p class="hint" style="grid-column:1/-1;">自定义需填姓名、作品、外貌与污秽设定。</p>
      </div>
    </div>
    <div class="foot">
      <div class="foot-msg" id="warn" role="status" aria-live="polite"></div>
      <button class="btn ghost" data-back="2">返回</button>
      <button class="btn primary" id="btnStart">生成开局</button>
    </div>
  </section>
</div>

<script>
/* === SYNC_BEGIN:MEETING_MODES === */
const MEETING_MODES = [
  {
    "id": "seek_purify",
    "title": "求净上门",
    "cover": "她带着污秽征兆来到教堂，主动求你净化。",
    "prompt": "落点：告解室或礼拜堂内侧。对方主动上门，身上已有可感征兆（黑纹、异香、低语、体温异常等择一写透）。\n{{user}}以牧师接待：问症→察看→准备净化。戏在照面与反应上，勿写成人物介绍。\n"
  },
  {
    "id": "isekai_fall",
    "title": "异界坠落",
    "cover": "她突然出现在礼拜堂/告解室，像被什么撕开缝隙丢进来。",
    "prompt": "落点：礼拜堂中殿或告解室。对方刚坠落/现身，衣着贴原作，对教堂与{{user}}陌生，或戒备或晕眩。\n污秽已附着或正从裂缝渗入。{{user}}以「此地安全、我能净化」介入，先稳住场面。\n"
  },
  {
    "id": "hub_cross",
    "title": "枢纽穿行",
    "cover": "教堂连通她的世界；你踏入接点，或她被拽到圣堂这一侧。",
    "prompt": "落点：地下密室/彩窗后接点，或对方世界边缘与圣堂重叠处。\n双方因枢纽相遇；污秽可来自接点本身。{{user}}握有接点与净化权，用引导、护送或「须净化才能回去」推进。\n"
  },
  {
    "id": "daily_crack",

const state = {
  page: 1,
  modeId: null,
  charId: null,
  tab: "pool",
  starting: false,
};

const $ = (s, el = document) => el.querySelector(s);
const $$ = (s, el = document) => [...el.querySelectorAll(s)];

function showPage(n) {
  state.page = n;
  $$(".page").forEach(p => p.classList.toggle("active", Number(p.dataset.page) === n));
}

function renderModes() {
  const box = $("#modeGrid");
  box.innerHTML = MEETING_MODES.map(m => `
    <div class="mode-card ${state.modeId === m.id ? "active" : ""}" data-id="${m.id}">
      <h3>${m.title}</h3>
      <p>${m.cover}</p>
    </div>`).join("");
  box.onclick = e => {
    const card = e.target.closest(".mode-card");
    if (!card) return;
    state.modeId = card.dataset.id;
    renderModes();
  };
}

function renderChars() {
  const box = $("#charGrid");
  if (!box) return;
  box.innerHTML = CHARACTERS.map(c => `
    <div class="char-card ${state.charId === c.id ? "active" : ""}" data-id="${c.id}" style="--accent:${c.accent || "#d4af69"}">
      <div class="swatch"></div>
      <div class="name">${c.name}</div>
      <div class="work">${c.work}</div>
    </div>`).join("");
  if (!box.dataset.bound) {
    box.dataset.bound = "1";
    box.addEventListener("click", e => {
      const card = e.target.closest(".char-card");
      if (!card) return;
      selectPoolChar(card.dataset.id);
    });
  }
  renderDetail();
  const active = box.querySelector(".char-card.active");
  if (active) {
    try { active.scrollIntoView({ block: "nearest", inline: "nearest" }); } catch (_) {}
  }
}

function selectPoolChar(id) {
  if (!id || !CHARACTERS.some(c => c.id === id)) return;
  state.charId = id;
  state.tab = "pool";
  $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === "pool"));
  const pool = $("#poolBox");
  const custom = $("#customBox");
  if (pool) pool.style.display = "block";
  if (custom) custom.classList.remove("show");
  renderChars();
}

function clipOneLine(text, max = 72) {
  let s = String(text || "").trim().replace(/\s+/g, " ");
  if (!s) return "";
  const stop = s.search(/[。！？]/);
  if (stop > 12 && stop < max) return s.slice(0, stop + 1);
  if (s.length <= max) return s;
  return s.slice(0, max) + "…";
}

function renderDetail() {
  const el = $("#charDetail");
  const c = CHARACTERS.find(x => x.id === state.charId);
  if (!c || state.tab !== "pool") {
    el.classList.remove("show");
    el.innerHTML = "";
    return;
  }
  el.classList.add("show");
  const workLine = clipOneLine(c.work_intro || "", 80);
  el.innerHTML = `
    <h3>${c.name}</h3>
    <div class="meta">${c.work} · ${c.age_note || "成年"}</div>
    ${workLine ? `<div class="hint">${workLine}</div>` : ""}
    <div style="margin-top:8px"><strong>角色介绍</strong>：${c.intro || c.blurb || ""}</div>
    <div style="margin-top:6px"><strong>外貌</strong>：${c.appearance}</div>
    <div style="margin-top:6px"><strong>污秽种子</strong>：${c.filth_seed}</div>`;
}

function setTab(tab) {
  state.tab = tab;
  $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  $("#poolBox").style.display = tab === "pool" ? "block" : "none";
  $("#customBox").classList.toggle("show", tab === "custom");
  if (tab === "custom") {
    state.charId = null;
    renderChars();
    $("#charDetail").classList.remove("show");
  } else if (!state.charId && CHARACTERS[0]) {
    state.charId = CHARACTERS[0].id;
    renderChars();
  } else {
    renderDetail();
  }
}

  return {

function sceneForMode(modeId, church) {
  const map = {
    seek_purify: `${church}·告解室`,
    isekai_fall: `${church}·礼拜堂中殿`,
    hub_cross: `${church}·地下接点密室`,
    daily_crack: `${church}·侧廊诊室`,
  };
  return map[modeId] || `${church}·礼拜堂`;
}

/** 首楼只用短辨识，完整档案交给世界书触发 */
function clipVoice(text, max = 96) {
  let s = String(text || "").trim().replace(/\s+/g, "");
  if (!s) return "";
  const parts = s.split(/(?<=[。！？])/).filter(Boolean);
  s = (parts.slice(0, 2).join("") || s);
  if (s.length <= max) return s;
  const cut = s.slice(0, max);
  const i = Math.max(cut.lastIndexOf("。"), cut.lastIndexOf("，"), cut.lastIndexOf("；"));
  return (i > 36 ? cut.slice(0, i + (cut[i] === "。" ? 1 : 0)) : cut) + (i > 36 && cut[i] === "。" ? "" : "…");
}

    "- 从照面起笔：环境、对方反应、{{user}}的接待；口吻外貌贴原作辨识，禁万能美人套话与性格标签堆砌。",
    "- 表面圣职流程 + 可察觉私心；净化写出真实驱除反馈。",
    "- 禁止元叙事、系统自指、提醒「在玩角色卡」。",
    "- 结尾停在可互动处，勿总结。末尾输出一个 <UpdateVariable>（Analysis + JSONPatch），至少写清 /初遇/当前心态、/初遇/仪式阶段，必要时改 /世界/场景。",
  ].filter(line => line != null && line !== "").join("\n");
}

function getApi(name) {
  const roots = [];
  try { roots.push(window); } catch (_) {}
  try { if (window.parent && window.parent !== window) roots.push(window.parent); } catch (_) {}
  try { if (window.top && window.top !== window) roots.push(window.top); } catch (_) {}
  for (const w of roots) {
    try {
      if (w && typeof w[name] === "function") return w[name].bind(w);
    } catch (_) {}
  }
  for (const w of roots) {
    try {
      const st = w.SillyTavern || w.sillyTavern;
      if (st && typeof st[name] === "function") return st[name].bind(st);
    } catch (_) {}
  }
  return null;
}

async function waitMvu(timeout = 8000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const Mvu = window.Mvu || (window.parent && window.parent.Mvu);
    if (Mvu && Mvu.parseMessage) return Mvu;
    await new Promise(r => setTimeout(r, 100));
  }
  return null;
}

async function applyVariables(text) {
  const Mvu = await waitMvu();
  if (!Mvu) return false;
  try {
    const oldData = Mvu.getMvuData({ type: "message", message_id: 0 });
    const newData = await Mvu.parseMessage(String(text), oldData || undefined);
    await Mvu.replaceMvuData(newData, { type: "message", message_id: 0 });
    return true;
  } catch (err) {
    console.warn("applyVariables failed", err);
    return false;
  }
}

async function startGame() {
  const warn = $("#warn");
  const btn = $("#btnStart");
  const resetBtn = () => {
    state.starting = false;
    if (btn) {
      btn.disabled = false;
      btn.textContent = "生成开局";
    }
  };
  if (warn) warn.textContent = "";
  if (!state.modeId) {
    if (warn) warn.textContent = "请选择相遇方式。";
    return;
  }
  const mode = MEETING_MODES.find(m => m.id === state.modeId);
  const persona = getPersona();
  const enc = getEncounter();
  if (!enc || !enc.姓名) {
    if (warn) warn.textContent = "请先点选角色池中的角色，或改用自定义并填姓名。";
    return;
  }
  if (enc.custom) {
    if (!enc.作品 || !enc.外貌 || !enc.污秽类型) {
      if (warn) warn.textContent = "自定义需填写作品、外貌与污秽设定。";
      return;
    }
  }
  if (state.starting) return;
  state.starting = true;
  if (btn) {
    btn.disabled = true;
    btn.textContent = "生成中…";
  }

  const patches = buildPatches(mode, persona, enc);
  const patchBlock = [
    "<UpdateVariable>",
    "<Analysis>",
    "- Initialize sanctum encounter from cover.",
    "</Analysis>",
    "<JSONPatch>",
    JSON.stringify(patches, null, 2),
    "</JSONPatch>",
    "</UpdateVariable>",
  ].join("\n");

  try {
    await applyVariables(patchBlock);
  } catch (err) {
    console.warn(err);
  }
  const prompt = buildPrompt(mode, persona, enc);
  // 写卡知识库判断（不以十国为真理）：
  // - generate() 契约是返回文本 + 可选流式事件；是否自动建楼未在 API 中保证
  // - 要「空白开场页再生成」必须 createChatMessages 显式建楼，再用 setChatMessages 写入
  // - should_silence 仅表示不抢停止按钮，≠ 不写楼；开局允许停止 → 默认 false
  // - Slash /trigger 仅作无 generate 时的兜底（知识库：优先助手接口）
  const generateFn = getApi("generate") || getApi("Generate");
  const createMsgs = getApi("createChatMessages");
  const setMsgs = getApi("setChatMessages") || getApi("setChatMessage");
  const deleteMsgs = getApi("deleteChatMessages");
  const getLast = getApi("getLastMessageId");
  const eventOn = getApi("eventOn");
  const eventOff = getApi("eventRemoveListener") || getApi("eventOff") || getApi("eventRemove");
  const trigger = getApi("triggerSlash");
  const streamEvt = (typeof iframe_events !== "undefined" && iframe_events.STREAM_TOKEN_RECEIVED_FULLY)
    || "js_stream_token_received_fully";

  const asText = (raw) => {
    if (typeof raw === "string") return raw;
    if (raw && typeof raw === "object") return String(raw.result || raw.message || raw.text || "");
    return "";
  };

  try {
    if (generateFn && createMsgs && setMsgs && typeof getLast === "function") {
      await createMsgs(
        [{ role: "assistant", message: "（开局生成中…）" }],
        { refresh: "all" },
      );
      const floorId = getLast();
      if (floorId == null || floorId < 0) {
        throw new Error("无法取得开场楼层 id");
      }

      let onStream = null;
      if (typeof eventOn === "function") {
        onStream = (fullText) => {
          const t = String(fullText || "");
          if (!t) return;
          setMsgs([{ message_id: floorId, message: t }], { refresh: "affected" }).catch(() => {});
        };
        try { eventOn(streamEvt, onStream); } catch (e) { console.warn(e); }
      }

      let text = "";
      try {
        const raw = await generateFn({ user_input: prompt, should_stream: true });
        text = asText(raw).trim();
      } finally {
        if (onStream && typeof eventOff === "function") {
          try { eventOff(streamEvt, onStream); } catch (_) {}
        }
      }

      // generate 若额外吐出楼层，删掉以免盖住我们的开场楼
      if (typeof deleteMsgs === "function") {
        const last = getLast();
        if (typeof last === "number" && last > floorId) {
          const extras = [];
          for (let i = floorId + 1; i <= last; i++) extras.push(i);
          try { await deleteMsgs(extras, { refresh: "all" }); } catch (e) { console.warn(e); }
        }
      }

      if (!text) {
        await setMsgs(
          [{ message_id: floorId, message: "（开局生成失败：模型返回空内容，请检查预设后重试）" }],
          { refresh: "all" },
        );
        if (warn) warn.textContent = "生成返回空内容。";
        resetBtn();
        return;
      }
      await setMsgs([{ message_id: floorId, message: text }], { refresh: "all" });
      if (warn) warn.textContent = "开局已写入新楼层，请下滑查看。";
    } else if (generateFn) {
      // 缺楼层 API 时只能赌 generate 副作用；仍校验返回值
      const text = asText(await generateFn({ user_input: prompt, should_stream: true })).trim();
      if (!text) {
        if (warn) warn.textContent = "生成返回空内容（且无 createChatMessages 可落楼）。";
        resetBtn();
        return;
      }
      if (warn) warn.textContent = "已生成，请下滑查看新楼层。";
    } else if (createMsgs && trigger) {
      // 知识库 Slash 示例兜底：先用户楼再 /trigger（字段用 message，不用示例里的 content）
      await createMsgs([{ role: "user", message: prompt }], { refresh: "all" });
      await trigger("/trigger");
      if (warn) warn.textContent = "已触发生成，请下滑查看新楼层。";
    } else if (setMsgs) {
      await setMsgs([{ message_id: 0, message: patchBlock + "\n\n" + prompt }], { refresh: "all" });
      if (warn) warn.textContent = "已写入开局提示（无 generate）。";
    } else {
      if (warn) warn.textContent = "未接入酒馆 API（请用酒馆打开本卡，勿单独开 CDN 页）。";
      console.log(prompt);
      console.log(patchBlock);
      resetBtn();
      return;
    }
  } catch (err) {
    if (warn) warn.textContent = "生成失败：" + (err && err.message ? err.message : String(err));
    resetBtn();
    return;
  }
  setTimeout(resetBtn, 4000);
}

function init() {
  if (MEETING_MODES[0]) state.modeId = MEETING_MODES[0].id;
  if (CHARACTERS[0]) state.charId = CHARACTERS[0].id;
  renderModes();
  renderChars();

  $("#btnEnter").onclick = () => showPage(2);
  $("#btnToMeet").onclick = () => showPage(3);
  $("#btnStart").onclick = () => startGame();
  $$("[data-back]").forEach(b => b.onclick = () => showPage(Number(b.dataset.back)));
  $$(".tab").forEach(t => t.onclick = () => setTab(t.dataset.tab));
}

init();
</script>
