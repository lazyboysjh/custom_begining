<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="data:," />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>圣堂状态</title>
<script>
(() => {
  const bg = new URLSearchParams(location.search).get("bg");
  if (bg === "a" || bg === "b") document.documentElement.dataset.statusBg = bg;
})();
</script>
<style>

:root {
  --st-text: #f6f0e6;
  --st-muted: #9a948a;
  --st-gold: #e2c08a;
  --st-ease: cubic-bezier(.22,1,.36,1);
  --st-serif: "Songti SC", "Noto Serif SC", Georgia, serif;
  --st-sans: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --st-art: url("https://raw.githubusercontent.com/lazyboysjh/image/main/NAI-2026-07-17-20-59-46.png");
  --st-radius: 16px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; width: 100%; overflow-x: hidden;
  background: transparent; color: var(--st-text);
  font-family: var(--st-sans); font-size: 13px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; -webkit-tap-highlight-color: transparent; }
.status-state {
  display: none; margin: 8px; min-height: 52px;
  align-items: center; justify-content: center; padding: 12px;
  border: 1px solid rgba(255,255,255,.08); border-radius: var(--st-radius);
  color: var(--st-muted); background: rgba(18,18,20,.88);
}
.status-state.show { display: flex; }
.status-error { color: #e5b2ad; }
.stage {
  width: 100%;
  padding: 8px;
}
.st-shell {
  position: relative; width: min(100%, 960px); margin: 0 auto;
  border-radius: var(--st-radius);
  border: 1px solid rgba(255,255,255,.1);
  background: rgba(12,11,10,.82);
  overflow: hidden; isolation: isolate;
  container-type: inline-size;
  container-name: st-shell;
  box-shadow: inset 0 1px rgba(255,255,255,.08), 0 14px 28px rgba(0,0,0,.28);
}
.st-shell::before {
  content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: var(--st-art) 50% 24% / cover no-repeat;
  opacity: .48; filter: saturate(.9) contrast(1.1);
}
.st-shell::after {
  content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    linear-gradient(105deg, rgba(10,9,8,.82) 0%, rgba(10,9,8,.58) 40%, rgba(10,9,8,.4) 70%),
    linear-gradient(180deg, rgba(10,9,8,.36) 0%, rgba(10,9,8,.28) 28%, rgba(10,9,8,.72) 100%);
}
.st-shell > * { position: relative; z-index: 1; }

.topbar {
  position: relative; z-index: 8;
  padding: 12px 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  background: rgba(10,9,8,.42);
}
.scene-row { display: flex; align-items: center; gap: 10px; }
.scene {
  flex: 1 1 auto; min-width: 0;
  font: 600 15px/1.3 var(--st-serif); letter-spacing: .04em; color: #f7efdf;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.top-actions { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; }
.icon-btn {
  appearance: none; width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid rgba(226,192,138,.4); background: rgba(0,0,0,.28);
  color: #f0d9a8; display: grid; place-items: center; cursor: pointer;
  transition: color .2s, border-color .2s, background .2s;
}
.icon-btn svg {
  width: 16px; height: 16px; stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
}
.icon-btn:hover { color: #ffe7b8; border-color: rgba(240,217,168,.65); background: rgba(0,0,0,.38); }
.icon-btn:active { background: rgba(0,0,0,.45); }
.icon-btn:focus-visible { outline: none; border-color: rgba(226,192,138,.7); box-shadow: 0 0 0 3px rgba(226,192,138,.14); }
.icon-btn:disabled { opacity: .4; cursor: default; }
.icon-btn.on { color: #1b1208; border-color: rgba(226,192,138,.55); background: #e2c08a; }

.float-panel {
  position: absolute; top: calc(100% + 6px); right: 10px; z-index: 30;
  width: min(220px, calc(100% - 20px)); display: none; padding: 8px;
  border-radius: 14px; border: 1px solid rgba(255,255,255,.12);
  background: rgba(16,14,12,.92); box-shadow: 0 16px 32px rgba(0,0,0,.45);
}
.float-panel.open { display: block; animation: stPop .24s var(--st-ease); }
@keyframes stPop {
  from { opacity: 0; transform: translateY(-6px) scale(.98); }
  to { opacity: 1; transform: none; }
}
.float-panel .panel-title {
  margin: 2px 6px 8px; font-size: 10px; letter-spacing: .14em; color: rgba(226,192,138,.75);
}
.float-panel .meta-row {
  display: grid; grid-template-columns: 4.2em minmax(0,1fr); gap: 8px; align-items: start;
  padding: 8px 9px; border-radius: 10px; border: 1px solid rgba(255,255,255,.08); background: rgba(0,0,0,.16);
}
.float-panel .meta-row + .meta-row { margin-top: 5px; }
.float-panel .meta-row small { font-size: 10px; letter-spacing: .1em; color: rgba(226,192,138,.72); padding-top: 1px; }
.float-panel .meta-row b { font-size: 12px; font-weight: 600; color: #f0e8da; line-height: 1.45; }
.float-panel .cast-list {
  display: flex; flex-direction: column; gap: 2px; max-height: 210px; overflow: auto;
  scrollbar-width: thin; scrollbar-color: rgba(226,192,138,.35) transparent;
}
.float-panel .cast-list button {
  appearance: none; width: 100%; border: 0; border-radius: 10px; background: transparent;
  color: rgba(240,232,218,.72); text-align: left; padding: 8px 10px; cursor: pointer;
  font: 600 12px/1.3 var(--st-serif); letter-spacing: .03em; position: relative;
}
.float-panel .cast-list button:hover { background: rgba(255,255,255,.05); color: #f6ecd8; }
.float-panel .cast-list button.active { color: #f6ecd8; background: rgba(226,168,96,.1); }
.float-panel .cast-list button.active::after {
  content: ""; position: absolute; left: 10px; right: 10px; bottom: 4px;
  height: 1.5px; border-radius: 2px; background: linear-gradient(90deg, #c48545, #e8c48a);
}

.cast-pack { position: relative; margin: 0; overflow: hidden; }
.sheet { position: relative; }
.role-nav {
  position: absolute; top: 50%; z-index: 4; transform: translateY(-50%);
  width: 22px; height: 28px; padding: 0; appearance: none; border-radius: 8px;
  border: 1px solid rgba(226,192,138,.4); background: rgba(0,0,0,.28); color: #f0d9a8;
  display: grid; place-items: center; cursor: pointer;
  transition: color .2s, border-color .2s, background .2s, opacity .2s;
}
.role-nav.prev { left: 6px; }
.role-nav.next { right: 6px; }
.role-nav svg {
  width: 13px; height: 13px; stroke: currentColor; fill: none;
  stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
}
.role-nav:hover { color: #ffe7b8; border-color: rgba(240,217,168,.65); background: rgba(0,0,0,.38); }
.role-nav:active { background: rgba(0,0,0,.45); }
.role-nav:focus-visible { outline: none; border-color: rgba(226,192,138,.7); box-shadow: 0 0 0 3px rgba(226,192,138,.14); }
.role-nav:disabled, .role-nav.is-disabled { opacity: .28; pointer-events: none; }

.carousel { overflow: hidden; touch-action: pan-y; cursor: grab; }
.carousel:active { cursor: grabbing; }
.carousel-track {
  display: flex; will-change: transform;
  transition: transform .48s cubic-bezier(.22,1,.36,1);
}
.carousel-track.dragging { transition: none; }
.slide {
  flex: 0 0 100%; width: 100%; padding: 10px 32px 8px; box-sizing: border-box;
  opacity: .4; transform: scale(.97);
  transition: opacity .42s var(--st-ease), transform .42s var(--st-ease);
}
.slide.is-active { opacity: 1; transform: scale(1); }

.hero {
  margin: 0; padding: 2px 2px 12px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.hero-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.hero h4 {
  margin: 0; min-width: 0; font: 600 17px/1.2 var(--st-serif); letter-spacing: .04em; color: #f7efdf;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tags { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px; max-width: 52%; }
.tag {
  flex: 0 1 auto; min-width: 0; display: inline-flex; align-items: center; justify-content: center;
  max-width: 4.8em; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
  letter-spacing: .04em; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tag.rel { border: 1px solid rgba(226,192,138,.4); background: rgba(226,192,138,.12); color: #ead2a4; }
.tag.mood { border: 1px solid rgba(232,154,176,.45); background: rgba(232,154,176,.14); color: #f3b8c8; }
.hero .work {
  margin: 5px 0 0; font-size: 11px; color: rgba(240,232,218,.7);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.pane { margin: 0; padding: 12px 2px 0; }
.pane + .pane { margin-top: 4px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.07); }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
.metric { min-width: 0; padding: 0 0 2px; }
.mh { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 6px; }
.mh span { font-size: 10px; color: rgba(240,232,218,.82); }
.mh b { font-size: 12px; color: #f7efdf; font-variant-numeric: tabular-nums; }
.bar { height: 3px; border-radius: 999px; background: rgba(255,255,255,.1); overflow: hidden; }
.bar i { display: block; height: 100%; border-radius: inherit; width: 0; transition: width .45s var(--st-ease); }
.bar.filth i { background: linear-gradient(90deg, #6a5a72, #b5a4c0); }
.bar.favor i { background: linear-gradient(90deg, #c45a72, #f0a0b4); }
.bar.fall i { background: linear-gradient(90deg, #7a3048, #c86a7e); }
.bar.seed i { background: linear-gradient(90deg, #b86a78, #e8b8c4); }
.metric.filth .mh span { color: rgba(196,184,210,.88); }
.metric.favor .mh span { color: rgba(240,168,184,.95); }
.metric.fall .mh span { color: rgba(214,148,162,.9); }
.metric.seed .mh span { color: rgba(232,184,196,.9); }

.facts { display: flex; flex-direction: column; gap: 0; }
.fact {
  appearance: none; width: 100%; margin: 0;
  display: grid; grid-template-columns: 2.4em minmax(0,1fr); gap: 10px;
  padding: 9px 0; border: 0; border-bottom: 1px solid rgba(255,255,255,.06);
  border-radius: 0; background: transparent; font: inherit; text-align: left;
  color: inherit; cursor: pointer; font-size: 11px; line-height: 1.55;
}
.fact:last-child { border-bottom: 0; padding-bottom: 2px; }
.fact:first-child { padding-top: 0; }
.fact em { font-style: normal; color: rgba(226,192,138,.82); letter-spacing: .06em; font-size: 10px; padding-top: 2px; }
.fact .fact-body { min-width: 0; color: rgba(248,242,232,.94); }
.fact .fact-text {
  display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden;
}
.fact.is-open .fact-text { display: block; -webkit-line-clamp: unset; overflow: visible; }
.fact .fact-more {
  display: none; margin-top: 4px; font-size: 10px; letter-spacing: .08em; color: rgba(226,192,138,.72);
}
.fact.is-clamp:not(.is-open) .fact-more { display: block; }
.fact.is-open .fact-more { display: block; }
.fact.is-open .fact-more::before { content: "收起"; }
.fact.is-clamp:not(.is-open) .fact-more::before { content: "展开全文"; }

.dots {
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px;
  padding: 8px 12px 2px; border-top: 1px solid rgba(255,255,255,.08); background: rgba(10,9,8,.42);
}
.dots button {
  appearance: none; width: 6px; height: 6px; padding: 0; border: 0; border-radius: 999px;
  background: rgba(240,217,168,.28); cursor: pointer;
  transition: width .2s, background .2s;
}
.dots button:hover { background: rgba(240,217,168,.5); }
.dots button.active { width: 14px; background: #e2c08a; }

.actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 8px 12px 12px; background: rgba(10,9,8,.42);
}
.command-btn {
  appearance: none; min-height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: .04em; cursor: pointer;
  border: 1px solid rgba(226,192,138,.4); background: rgba(0,0,0,.28); color: #f0d9a8;
  transition: color .2s, border-color .2s, background .2s;
}
.command-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.command-btn:hover { color: #ffe7b8; border-color: rgba(240,217,168,.65); background: rgba(0,0,0,.38); }
.command-btn:active { background: rgba(0,0,0,.45); }
.command-btn:focus-visible { outline: none; border-color: rgba(226,192,138,.7); box-shadow: 0 0 0 3px rgba(226,192,138,.14); }
.command-btn.primary { border-color: rgba(226,192,138,.55); color: #1b1208; background: #e2c08a; }
.command-btn.primary:hover { color: #1b1208; border-color: rgba(240,217,168,.75); background: #ecd3a0; }
.command-btn.primary:active { background: #d4b078; }
.command-btn:disabled { opacity: .4; cursor: default; }

.toast {
  position: fixed; left: 50%; bottom: 18px; z-index: 50;
  transform: translateX(-50%) translateY(12px);
  max-width: min(88vw, 320px); padding: 8px 12px; border-radius: 999px;
  background: rgba(16,14,12,.92); color: #f0e8da; font-size: 12px;
  border: 1px solid rgba(255,255,255,.1); opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* —— 窄屏（手机 iframe） —— */
@container st-shell (max-width: 400px) {
  .topbar { padding: 10px 10px 8px; }
  .scene { font-size: 14px; }
  .slide { padding: 8px 28px 6px; }
  .role-nav.prev { left: 4px; }
  .role-nav.next { right: 4px; }
  .hero h4 { font-size: 15px; }
  .tags { max-width: 48%; gap: 4px; }
  .tag { padding: 2px 6px; font-size: 10px; }
  .actions { padding: 8px 10px 10px; gap: 6px; }
  .command-btn { min-height: 40px; font-size: 11px; }
  .float-panel { width: min(200px, calc(100% - 16px)); right: 8px; }
}

/* —— 平板 —— */
@container st-shell (min-width: 480px) {
  .st-shell::before {
    background-position: 64% 18%;
    opacity: .34;
  }
  .topbar { padding: 14px 16px 12px; }
  .scene { font-size: 16px; }
  .slide { padding: 12px 48px 10px; }
  .role-nav { width: 26px; height: 32px; }
  .role-nav.prev { left: 10px; }
  .role-nav.next { right: 10px; }
  .role-nav svg { width: 14px; height: 14px; }
  .hero { padding-bottom: 14px; }
  .hero h4 { font-size: 18px; }
  .metrics { gap: 12px 20px; }
  .float-panel { width: min(260px, calc(100% - 28px)); }
  .dots { padding: 10px 16px 4px; gap: 7px; }
  .actions { padding: 10px 16px 14px; gap: 10px; }
  .command-btn { min-height: 42px; font-size: 13px; }
}

/* —— 宽屏：属性 | 记录 双栏 —— */
@container st-shell (min-width: 700px) {
  .st-shell::before {
    background-position: 58% 22%;
    opacity: .32;
  }
  .st-shell::after {
    background:
      linear-gradient(105deg, rgba(10,9,8,.78) 0%, rgba(10,9,8,.5) 38%, rgba(10,9,8,.32) 68%),
      linear-gradient(180deg, rgba(10,9,8,.3) 0%, rgba(10,9,8,.22) 26%, rgba(10,9,8,.68) 100%);
  }
  .topbar { padding: 14px 18px 12px; }
  .slide {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.08fr);
    column-gap: 22px;
    align-items: start;
    padding: 14px 56px 12px;
  }
  .hero { grid-column: 1 / -1; }
  .pane { padding-top: 12px; }
  .pane + .pane {
    margin-top: 0;
    padding-top: 12px;
    border-top: 0;
    border-left: 1px solid rgba(255,255,255,.08);
    padding-left: 20px;
  }
  .metrics { gap: 14px 22px; }
  .mh span { font-size: 11px; }
  .mh b { font-size: 13px; }
  .fact { font-size: 12px; padding: 10px 0; }
  .fact em { font-size: 11px; }
  .actions { max-width: 420px; margin: 0 auto; width: 100%; box-sizing: border-box; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

</style>
</head>
<body>

<div class="status-state status-loading show" id="statusState" role="status" aria-live="polite">正在读取状态…</div>
<div class="stage" id="stage" hidden>
  <section class="st-shell" id="root">
    <header class="topbar" id="topBar">
      <div class="scene-row">
        <div class="scene" id="scene">—</div>
        <div class="top-actions">
          <button type="button" class="icon-btn" id="metaBtn" aria-expanded="false" aria-controls="metaPanel" title="开局设定">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.2.6.7 1.1 1.5 1.1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>
          </button>
          <button type="button" class="icon-btn" id="castBtn" aria-expanded="false" aria-controls="castPanel" title="出场角色">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </button>
        </div>
      </div>
      <div class="float-panel" id="metaPanel">
        <div class="panel-title">开局设定</div>
        <div class="meta-row"><small>故事</small><b id="metaStory">—</b></div>
        <div class="meta-row"><small>氛围</small><b id="metaAtmosphere">—</b></div>
        <div class="meta-row"><small>主角能力</small><b id="metaAbility">—</b></div>
      </div>
      <div class="float-panel" id="castPanel">
        <div class="panel-title">出场角色</div>
        <div class="cast-list" id="castList" role="menu"></div>
      </div>
    </header>

    <div class="cast-pack">
      <div class="sheet" id="roleSheet">
        <button type="button" class="role-nav prev" id="navPrev" aria-label="上一位">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6 9 12l6 6"/></svg>
        </button>
        <button type="button" class="role-nav next" id="navNext" aria-label="下一位">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
        </button>
        <div class="carousel" id="roleCarousel">
          <div class="carousel-track" id="roleTrack"></div>
        </div>
      </div>
    </div>

    <div class="dots" id="roleDots" role="tablist" aria-label="角色页码"></div>
    <footer class="actions">
      <button type="button" class="command-btn" id="btnDraw">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
        <span>新角色入场</span>
      </button>
      <button type="button" class="command-btn primary" id="btnTogether">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 4 5 5L8 21l-5-5Z"/><path d="m6 14 5 5"/><path d="M6 4v4M4 6h4M19 15v4M17 17h4"/></svg>
        <span>推进剧情</span>
      </button>
    </footer>
  </section>
</div>
<div class="status-state status-empty" id="emptyState">此刻尚无来客。</div>
<div class="status-state status-error" id="errorState"><span id="errorCopy">状态暂不可用。</span></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* === SYNC_BEGIN:ROSTER === */
const ROSTER = [
  {
    "id": "kurisu",

function frame(callback) {
  const id = requestAnimationFrame(time => {

}

function isDemo() {
  try { return /(?:\?|&)demo=1(?:&|$)/.test(location.search) || location.hash === "#demo"; }
  catch (_) { return false; }
}

function getPath(source, path, fallback) {
  try { return typeof _ !== "undefined" ? _.get(source, path, fallback) : path.split(".").reduce((v, key) => v && v[key], source) ?? fallback; }
  catch (_) { return fallback; }
}

function resolveMvu() {
  try { return window.Mvu || (window.parent && window.parent.Mvu) || null; }
  catch (_) { return null; }
}

function currentMessageId() {
  try { if (typeof getCurrentMessageId === "function") return getCurrentMessageId(); } catch (_) {}
  try { if (window.parent && typeof window.parent.getCurrentMessageId === "function") return window.parent.getCurrentMessageId(); } catch (_) {}
  throw new Error("无法确定状态栏所在楼层");
}

function readStat() {
  if (isDemo()) return DEMO_STAT;
  const Mvu = resolveMvu();
  if (!Mvu || typeof Mvu.getMvuData !== "function") throw new Error("MVU 尚未初始化");
  return getPath(Mvu.getMvuData({ type: "message", message_id: currentMessageId() }), "stat_data", {});
}

function presentRoles(stat) {
  const names = getPath({ stat_data: stat }, "stat_data.世界.出场角色", []);
  const roles = getPath({ stat_data: stat }, "stat_data.角色", {});
  return [...new Set(Array.isArray(names) ? names.map(String).map(n => n.trim()).filter(Boolean) : [])]
    .filter(name => roles && typeof roles[name] === "object");
}

function getRoleState(stat, name) {
  const roles = stat && stat.角色;
  return roles && typeof roles[name] === "object" ? roles[name] : {};
}

function rosterRole(name) {
  return ROSTER.find(item => item && item.name === name) || {};
}

function setDataState(state, detail = "") {
  const ids = { loading: "statusState", empty: "emptyState", error: "errorState" };
  Object.values(ids).forEach(id => document.getElementById(id).classList.remove("show"));
  document.getElementById("stage").hidden = state !== "ready";
  if (ids[state]) document.getElementById(ids[state]).classList.add("show");
  if (state === "error") {
    document.getElementById("errorCopy").textContent = "状态暂不可用。";
    if (detail) console.error(detail);
  }
}

function clamp(value) { return Math.max(0, Math.min(100, Number(value) || 0)); }

function clipTag(value, fallback = "") {
  const text = String(value == null ? "" : value).replace(/\s+/g, "").trim();
  const clipped = Array.from(text).slice(0, 4).join("");
  return clipped || fallback;
}

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);
}

function metricHtml(role) {
  return STAT_META.map(item => {
    const value = clamp(role[item.key]);
    return `<div class="metric ${item.tone}"><div class="mh"><span>${item.label}</span><b>${value}</b></div><div class="bar ${item.tone}"><i data-value="${value}"></i></div></div>`;
  }).join("");
}

function factHtml(label, text) {
  return `<button type="button" class="fact" aria-expanded="false"><em>${escapeHtml(label)}</em><span class="fact-body"><span class="fact-text">${escapeHtml(text)}</span><span class="fact-more"></span></span></button>`;
}

  const mood = clipTag(role.心情, "戒备");
  const appear = role.外貌 || profile.appearance || "外貌尚未记录";
  const state = role.当前状态 || "正在观察当前环境";
  const thought = role.心里想法 || "先弄清眼前的情况。";
  const work = profile.work || "异界来客";
  return `<article class="slide" data-role="${escapeHtml(name)}">` +
    `<div class="hero"><div class="hero-row"><h4 title="${escapeHtml(name)}">${escapeHtml(name)}</h4>` +
    `<div class="tags"><span class="tag rel" title="${escapeHtml(role.与user关系 || rel)}">${escapeHtml(rel)}</span>` +
    `<span class="tag mood" title="${escapeHtml(role.心情 || mood)}">${escapeHtml(mood)}</span></div></div>` +
    `<p class="work" title="${escapeHtml(work)}">${escapeHtml(work)}</p></div>` +
    `<section class="pane"><div class="metrics">${metricHtml(role)}</div></section>` +
    `<section class="pane"><div class="facts">${factHtml("外貌", appear)}${factHtml("状态", state)}${factHtml("心声", thought)}</div></section>` +
    `</article>`;
}

function carouselWidth() {
  const viewport = document.getElementById("roleCarousel");
  return (viewport && viewport.clientWidth) || 1;
}

function paintCarousel(offsetPx) {
  const track = document.getElementById("roleTrack");
  if (!track) return;
  const names = presentRoles(currentStat);
  const idx = Math.max(0, names.indexOf(activeRoleName));
  const x = -idx * carouselWidth() + (offsetPx || 0);
  track.style.transform = `translate3d(${x}px,0,0)`;
}

function markFactClamp(scope) {
  Array.prototype.forEach.call((scope || document).querySelectorAll(".fact"), el => {
    const text = el.querySelector(".fact-text");
    if (!text) return;
    const content = (text.textContent || "").trim();
    const measured = text.scrollHeight > text.clientHeight + 1;
    const longEnough = content.length > 42;
    const clamped = el.classList.contains("is-open") || measured || longEnough;
    el.classList.toggle("is-clamp", clamped);
    el.style.cursor = clamped ? "pointer" : "default";
  });
}

function toggleFact(fact) {
  if (!fact) return;
  const open = !fact.classList.contains("is-open");
  fact.classList.toggle("is-open", open);
  fact.setAttribute("aria-expanded", open ? "true" : "false");
  if (open) fact.classList.add("is-clamp");
  else frame(() => markFactClamp(fact.closest(".slide") || document));
}

function syncChrome() {
  const names = presentRoles(currentStat);
  const idx = Math.max(0, names.indexOf(activeRoleName));
  const track = document.getElementById("roleTrack");
  const castList = document.getElementById("castList");
  const dotsEl = document.getElementById("roleDots");
  const prevBtn = document.getElementById("navPrev");
  const nextBtn = document.getElementById("navNext");
  if (!track) return;

  const slides = track.querySelectorAll(".slide");
  slides.forEach((el, i) => {
    el.classList.toggle("is-active", i === idx);
    if (i !== idx) {
      el.querySelectorAll(".fact.is-open").forEach(fact => {
        fact.classList.remove("is-open");
        fact.setAttribute("aria-expanded", "false");
      });
    }
  });
  Array.prototype.forEach.call(castList.children, (el, i) => el.classList.toggle("active", i === idx));
  Array.prototype.forEach.call(dotsEl.children, (el, i) => {
    el.classList.toggle("active", i === idx);
    el.setAttribute("aria-selected", i === idx ? "true" : "false");
  });
  prevBtn.disabled = idx <= 0;
  nextBtn.disabled = idx >= names.length - 1;
  prevBtn.classList.toggle("is-disabled", idx <= 0);
  nextBtn.classList.toggle("is-disabled", idx >= names.length - 1);
  paintCarousel(0);
  frame(() => {
    const active = slides[idx];
    if (active) {
      active.querySelectorAll(".bar i").forEach(bar => { bar.style.width = `${bar.dataset.value}%`; });
      markFactClamp(active);
    }
  });
}

function renderRoleSwitcher(names, activeName) {
  const track = document.getElementById("roleTrack");
  const castList = document.getElementById("castList");
  const dotsEl = document.getElementById("roleDots");
  track.innerHTML = "";
  castList.innerHTML = "";
  dotsEl.innerHTML = "";
  names.forEach((name, i) => {
    const role = getRoleState(currentStat, name);
    track.insertAdjacentHTML("beforeend", slideHtml(name, role));
    const item = document.createElement("button");
    item.type = "button";
    item.setAttribute("role", "menuitem");
    item.textContent = name;
    item.classList.toggle("active", name === activeName);
    item.addEventListener("click", () => { selectRole(name); closePanels(); });
    castList.appendChild(item);
    const dot = document.createElement("button");
    dot.type = "button";
    dot.setAttribute("role", "tab");
    dot.setAttribute("aria-label", `角色 ${i + 1}：${name}`);
    dot.addEventListener("click", () => selectRole(name));
    dotsEl.appendChild(dot);
  });
  syncChrome();
}

function renderRoleState(_role) {
  const profile = rosterRole(activeRoleName);
  document.getElementById("root").style.setProperty("--role-accent", profile.accent || "#b8926a");
  syncChrome();
}

function selectRole(name) {
  const names = presentRoles(currentStat);
  if (!names.includes(name)) return;
  activeRoleName = name;
  syncChrome();
}

function metaLabel(value, max = 16) {
  const text = String(value || "").trim();
  if (!text || text === "待生成") return "";
  const short = text.split(/[；;。]/)[0].trim() || text;
  return short.length <= max ? short : `${short.slice(0, max)}…`;
}

function firstMetaLabel(values, max = 12) {
  for (const value of values) {
    const label = metaLabel(value, max);
    if (label) return label;
  }
  return "—";
}

function storyFromScene(scene) {
  const text = String(scene || "").trim();
  if (!text || !text.includes("·")) return "";
  return text.split("·").slice(1).join("·").trim();
}

function renderWorldMeta(stat) {
  const world = stat && stat.世界 ? stat.世界 : {};
  const opening = world._开局配置 || {};
  const hero = stat && stat.主角 ? stat.主角 : {};
  const story = document.getElementById("metaStory");
  const atmosphere = document.getElementById("metaAtmosphere");
  const ability = document.getElementById("metaAbility");
  if (story) {
    story.textContent = firstMetaLabel([
      opening.故事类型,
      opening.时代背景,
      storyFromScene(world.场景),
    ], 12);
  }
  if (atmosphere) atmosphere.textContent = firstMetaLabel([opening.故事氛围], 12);
  if (ability) ability.textContent = firstMetaLabel([hero.能力摘要], 14);
}

function closePanels() {
  const metaPanel = document.getElementById("metaPanel");
  const castPanel = document.getElementById("castPanel");
  const metaBtn = document.getElementById("metaBtn");
  const castBtn = document.getElementById("castBtn");
  metaPanel.classList.remove("open");
  castPanel.classList.remove("open");
  metaBtn.classList.remove("on");
  castBtn.classList.remove("on");
  metaBtn.setAttribute("aria-expanded", "false");
  castBtn.setAttribute("aria-expanded", "false");
}

function openOnly(which) {
  const openMeta = which === "meta";
  const openCast = which === "cast";
  document.getElementById("metaPanel").classList.toggle("open", openMeta);
  document.getElementById("castPanel").classList.toggle("open", openCast);
  document.getElementById("metaBtn").classList.toggle("on", openMeta);
  document.getElementById("castBtn").classList.toggle("on", openCast);
  document.getElementById("metaBtn").setAttribute("aria-expanded", openMeta ? "true" : "false");
  document.getElementById("castBtn").setAttribute("aria-expanded", openCast ? "true" : "false");
}

function bindChromeControls() {
  const metaBtn = document.getElementById("metaBtn");
  const castBtn = document.getElementById("castBtn");
  const topBar = document.getElementById("topBar");
  const track = document.getElementById("roleTrack");
  const viewport = document.getElementById("roleCarousel");
  const prevBtn = document.getElementById("navPrev");
  const nextBtn = document.getElementById("navNext");

  metaBtn.addEventListener("click", e => {
    e.stopPropagation();
    if (document.getElementById("metaPanel").classList.contains("open")) closePanels();
    else openOnly("meta");
  });
  castBtn.addEventListener("click", e => {
    e.stopPropagation();
    if (document.getElementById("castPanel").classList.contains("open")) closePanels();
    else openOnly("cast");
  });
  document.addEventListener("click", e => {
    if (!topBar.contains(e.target)) closePanels();
  });

  prevBtn.addEventListener("click", () => {
    const names = presentRoles(currentStat);
    const idx = names.indexOf(activeRoleName);
    if (idx > 0) selectRole(names[idx - 1]);
  });
  nextBtn.addEventListener("click", () => {
    const names = presentRoles(currentStat);
    const idx = names.indexOf(activeRoleName);
    if (idx >= 0 && idx < names.length - 1) selectRole(names[idx + 1]);
  });

  track.addEventListener("pointerdown", e => {
    if (e.target.closest(".fact")) e.stopPropagation();
  }, true);
  track.addEventListener("click", e => {
    const fact = e.target.closest(".fact");
    if (!fact || !track.contains(fact)) return;
    e.preventDefault();
    e.stopPropagation();
    toggleFact(fact);
  });

  if (carouselBound) return;
  carouselBound = true;

  function onStart(x, y) {
    drag.active = true;
    drag.startX = x; drag.startY = y; drag.dx = 0; drag.locked = null; drag.t0 = Date.now();
    track.classList.add("dragging");
  }
  function onMove(x, y, e) {
    if (!drag.active) return;
    const dx = x - drag.startX;
    const dy = y - drag.startY;
    if (drag.locked === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      drag.locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
    }
    if (drag.locked === "y") return;
    if (drag.locked === "x" && e && e.cancelable) e.preventDefault();
    drag.dx = dx;
    const names = presentRoles(currentStat);
    const idx = names.indexOf(activeRoleName);
    let resist = 1;
    if ((idx <= 0 && dx > 0) || (idx >= names.length - 1 && dx < 0)) resist = 0.28;
    paintCarousel(dx * resist);
  }
  function onEnd() {
    if (!drag.active) return;
    drag.active = false;
    track.classList.remove("dragging");
    if (drag.locked !== "x") { paintCarousel(0); return; }
    const names = presentRoles(currentStat);
    const idx = names.indexOf(activeRoleName);
    const dt = Math.max(1, Date.now() - drag.t0);
    const v = drag.dx / dt;
    const threshold = carouselWidth() * 0.18;
    if (Math.abs(drag.dx) > threshold || Math.abs(v) > 0.45) {
      const next = idx + (drag.dx < 0 ? 1 : -1);
      if (next >= 0 && next < names.length) selectRole(names[next]);
      else paintCarousel(0);
    } else {
      paintCarousel(0);
    }
  }

  viewport.addEventListener("pointerdown", e => {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    if (e.target.closest(".fact, .role-nav, button, a, input, textarea")) return;
    viewport.setPointerCapture(e.pointerId);
    onStart(e.clientX, e.clientY);
  });
  viewport.addEventListener("pointermove", e => onMove(e.clientX, e.clientY, e));
  viewport.addEventListener("pointerup", onEnd);
  viewport.addEventListener("pointercancel", onEnd);
  window.addEventListener("resize", handleResize);
  if (typeof ResizeObserver === "function") {
    resizeObserver = new ResizeObserver(() => {
      if (destroyed) return;
      paintCarousel(0);
      const active = document.querySelector(".slide.is-active");
      if (active) markFactClamp(active);
    });
    resizeObserver.observe(viewport);
    const stage = document.getElementById("stage");
    if (stage) resizeObserver.observe(stage);
  }
}

function populateCharacterData() {
  try {
    currentStat = readStat();
    const names = presentRoles(currentStat);
    if (!names.length) { activeRoleName = ""; setDataState("empty"); return; }
    if (!names.includes(activeRoleName)) activeRoleName = names[0];
    const world = currentStat.世界 || {};
    document.getElementById("scene").textContent = world.场景 || world._开局配置?.圣堂形态 || "当前场景";
    renderWorldMeta(currentStat);
    renderRoleSwitcher(names, activeRoleName);
    setDataState("ready");
  } catch (error) {
    setDataState("error", error && error.message ? error.message : String(error));
  }
}

async function bind() {
  setDataState("loading");
  if (!isDemo() && typeof waitGlobalInitialized === "function") await waitGlobalInitialized("Mvu");
  if (!isDemo() && typeof waitUntil === "function") {
    await waitUntil(() => {
      const Mvu = resolveMvu();
      if (!Mvu || typeof Mvu.getMvuData !== "function") return false;
      return getPath(Mvu.getMvuData({ type: "message", message_id: currentMessageId() }), "stat_data", null) != null;
    });
  }
  if (destroyed) return;
  bindChromeControls();
  populateCharacterData();
  document.getElementById("btnDraw").addEventListener("click", onDrawEncounter);
  document.getElementById("btnTogether").addEventListener("click", onTogetherMoment);
  try {
    const Mvu = resolveMvu();
    if (destroyed) return;
    if (Mvu && Mvu.events && Mvu.events.VARIABLE_UPDATE_ENDED && typeof eventOn === "function") {
      updateHandle = eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, () => { if (!destroyed) populateCharacterData(); });
    }
  } catch (error) { console.error(error); }
}

function toast(message) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.classList.add("show");
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
}

function getApi(name) {
  const roots = [];
  try { roots.push(window); } catch (_) {}
  try { if (window.parent && window.parent !== window) roots.push(window.parent); } catch (_) {}
  try { if (window.top && window.top !== window) roots.push(window.top); } catch (_) {}
  for (const w of roots) {
    try {
      if (w && typeof w[name] === "function") return w[name].bind(w);
    } catch (_) {}
  }
  for (const w of roots) {
    try {
      const st = w.SillyTavern || w.sillyTavern;
      if (st && typeof st[name] === "function") return st[name].bind(st);
    } catch (_) {}
  }
  return null;
}

function getTriggerSlash() {
  return getApi("triggerSlash");
}

function slashSafe(text) {
  return String(text || "").replace(/<\/?q>/gi, "").trim().replace(/\|/g, "｜");
}

async function dispatchAction(visibleText, prompt) {
  const visible = String(visibleText || "").trim();
  const hidden = String(prompt || "").trim();
  if (!visible || !hidden) return false;

  const trigger = getTriggerSlash();
  const injectFn = getApi("injectPrompts");
  const generateFn = getApi("generate") || getApi("Generate");

  // 优先：提示词注入一次 + 友好楼层可见发送（与原先 /send|/trigger 同路径，保证聊天里有内容）
  if (trigger) {
    if (typeof injectFn === "function") {
      try {
        injectFn([{
          id: "shengtang-action-" + Date.now(),
          role: "system",
          content: hidden,
          position: "in_chat",
          depth: 0,
          should_scan: true,
        }], { once: true });
      } catch (error) {
        console.warn("injectPrompts failed, fallback to slash inject", error);
        try {
          await trigger(`/inject id=shengtang-action position=chat depth=0 role=system ephemeral=true ${slashSafe(hidden).replace(/\r?\n/g, " ")}`);
        } catch (injectError) {
          console.warn("slash inject failed", injectError);
        }
      }
    } else {
      try {
        await trigger(`/inject id=shengtang-action position=chat depth=0 role=system ephemeral=true ${slashSafe(hidden).replace(/\r?\n/g, " ")}`);
      } catch (injectError) {
        console.warn("slash inject failed", injectError);
      }
    }
    await trigger(`/send ${slashSafe(visible)}|/trigger`);
    return true;
  }

  // 无 slash 时退回 generate（封面同款 getApi）
  if (typeof generateFn === "function") {
    await generateFn({
      user_input: visible,
      should_stream: true,
      injects: [{
        role: "system",
        content: hidden,
        position: "in_chat",
        depth: 0,
        should_scan: true,
      }],
    });
    return true;
  }

  return false;
}

function friendlyDrawMessage(character) {
  return `【新角色入场】请让「${character.name}」进入当前场景，与在场众人自然相遇。`;
}

function friendlyAdvanceMessage(scenario) {
  return `【推进剧情｜${scenario.title}】请按当前情境续写下一段故事。`;
}

function presentNames(stat) { return new Set(presentRoles(stat)); }

function pickRosterChar(stat) {
  const pool = Array.isArray(ROSTER) ? ROSTER.filter(role => role && role.name) : [];
  const taken = presentNames(stat);
  const available = pool.filter(role => !taken.has(role.name));
  if (!available.length) return null;
  return available[Math.floor(Math.random() * available.length)];
}

function buildEncounterPrompt(character, stat) {
  const world = stat.世界 || {};
  const present = presentRoles(stat);
  return [
    "【新角色入场】让指定角色在本次回复中实际进入当前场景。",
    `新人：${character.name}（${character.work || "未知作品"}）；当前场景：${world.场景 || world._开局配置?.圣堂形态 || "圣言堂"}；入场前同场角色：${present.join("、") || "暂无"}。`,
    "入场表现依据角色资料、当前处境和已知信息；与{{user}}及实际在场者的反应分别建立在本次互动上。",
    "仅在正文确实写出新人入场后，按现有 MVU 规则首次建立角色档案，并将姓名加入 replace 后的完整出场数组；已有档案保留旧值。若正文没有完成入场，变量保持原值。",
  ].join("\n\n");
}

const ADVANCE_SCENARIOS = [
  { id: "clue", title: "线索浮现", loading: "正在翻找关键线索~", success: "线索已经悄悄落位~", instruction: "当前异常、人物动机或圣堂机制出现一条可验证的新线索。" },
  { id: "shift", title: "环境异变", loading: "周围好像有点不对劲~", success: "场景已经开始变化~", instruction: "当前场景出现有因果依据的声音、物件变化、来客痕迹或空间异常。" },
  { id: "bond", title: "关系事件", loading: "正在酝酿一点小默契~", success: "新的相处片段开场啦~", instruction: "在场人物遇到一件需要沟通、协作或互相判断的具体事件。" },
  { id: "visitor", title: "意外消息", loading: "门外好像有新动静~", success: "新的动静已经出现~", instruction: "与现有事件直接相关的消息、远程联络或无名访客带来新的现场信息；不新增具名出场角色。" },
  { id: "choice", title: "抉择分岔", loading: "命运正在摆出选项~", success: "下一步选择已经出现~", instruction: "当前事件出现两个均可执行但代价不同的行动方向。" },
  { id: "pressure", title: "危机升级", loading: "气氛突然紧张起来了~", success: "新的麻烦已经登场~", instruction: "现有风险发生一级有依据的变化，同时保留能够应对的条件。" },
  { id: "afterglow", title: "安静余波", loading: "先让故事轻轻喘口气~", success: "一段安静时刻开始了~", instruction: "外部冲突暂缓，在场人物获得整理现场、短暂休息或自然交谈的间隙。" },
  { id: "ensemble", title: "多人碰撞", loading: "大家的想法开始撞车啦~", success: "多人场面已经热闹起来~", instruction: "至少两名在场角色因各自立场产生不同意见、互补行动或轻微冲突。", requiresMultiple: true },
];

function pickAdvanceScenario(stat) {
  const present = presentRoles(stat);
  const pool = ADVANCE_SCENARIOS.filter(item => !item.requiresMultiple || present.length > 1);
  return pool[Math.floor(Math.random() * pool.length)] || ADVANCE_SCENARIOS[0];
}

function buildTogetherPrompt(stat, scenario) {
  const present = presentRoles(stat);
  const focus = activeRoleName || present[0] || "当前角色";
  const advance = scenario || pickAdvanceScenario(stat);
  return [
    "【剧情推进】承接当前正文，根据本轮方向写出下一段剧情。",
    `当前场景：${getPath(stat, "世界.场景", "圣言堂")}；焦点角色：${focus}；实际在场：${present.join("、") || "暂无"}。`,
    `本轮推进：${advance.title}。${advance.instruction}`,
    "角色依据各自性格、目标、已知信息和实际在场情况独立反应；关系变化以本轮实际互动为依据。",
    "按现有 MVU 规则记录本轮正文中已经发生且被角色实际感知的变化；没有正文依据的角色与变量保持原值。",
  ].join("\n\n");
}

let drawing = false;
function setActionBusy(value) {
  drawing = !!value;
  document.getElementById("btnDraw").disabled = drawing;
  document.getElementById("btnTogether").disabled = drawing;
}

async function onDrawEncounter() {
  if (drawing) return;
  const character = pickRosterChar(currentStat);
  if (!character) { toast("当前没有可加入的角色"); return; }
  setActionBusy(true);
  try {
    const sent = await dispatchAction(
      friendlyDrawMessage(character),
      buildEncounterPrompt(character, currentStat),
    );
    toast(sent ? `已安排 ${character.name} 入场` : `预览角色：${character.name}`);
  } catch (error) {
    console.error(error);
    toast("发送失败，请重试");
  } finally {
    setActionBusy(false);
  }
}

async function onTogetherMoment() {
  if (drawing || !presentRoles(currentStat).length) return;
  const scenario = pickAdvanceScenario(currentStat);
  setActionBusy(true);
  try {
    const sent = await dispatchAction(
      friendlyAdvanceMessage(scenario),
      buildTogetherPrompt(currentStat, scenario),
    );
    toast(sent ? scenario.success : `预览推进：${scenario.title}`);
  } catch (error) { console.error(error); toast("发送失败，请重试"); }
  setActionBusy(false);
}

window.addEventListener("pagehide", () => {
  destroyed = true;
  if (updateHandle && typeof updateHandle.stop === "function") updateHandle.stop();
  updateHandle = null;
  window.removeEventListener("resize", handleResize);
  if (resizeObserver) resizeObserver.disconnect();
  resizeObserver = null;
  animationFrames.forEach(id => cancelAnimationFrame(id));
  animationFrames.clear();
  if (toast.timer) clearTimeout(toast.timer);
});

if (typeof errorCatched === "function") $(errorCatched(bind));
else bind().catch(error => setDataState("error", error && error.message ? error.message : String(error)));
</script>
