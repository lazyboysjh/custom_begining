<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="data:," />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>圣堂状态</title>
<style>
:root {
  --st-bg: #0b0b0d;
  --st-surface: linear-gradient(150deg, rgba(31,31,34,.86), rgba(13,13,15,.92));
  --st-surface-soft: rgba(255,255,255,.026);
  --st-line: rgba(255,255,255,.075);
  --st-line-strong: rgba(216,188,128,.28);
  --st-gold: #d7bc82;
  --st-gold-deep: #b99558;
  --st-text: #f3eee5;
  --st-muted: #918d86;
  --st-danger: #c97770;
  --st-radius: 8px;
  --st-control-radius: 6px;
  --st-ease: cubic-bezier(.22,1,.36,1);
  --st-font-serif: "Songti SC", "Noto Serif SC", Georgia, serif;
  --st-font-sans: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
  background: transparent;
  color: var(--st-text);
  font-family: var(--st-font-sans);
  font-size: 13px;
  line-height: 1.5;
  letter-spacing: 0;
  -webkit-font-smoothing: antialiased;
}
button, input { font: inherit; letter-spacing: 0; }
button { -webkit-tap-highlight-color: transparent; }
.status-state {
  display: none;
  margin: 8px;
  min-height: 52px;
  align-items: center;
  justify-content: center;
  padding: 12px;
  border: 1px solid var(--st-line);
  border-radius: var(--st-radius);
  color: var(--st-muted);
  background: rgba(18,18,20,.82);
}
.status-state.show { display: flex; }
.status-error { color: #e5b2ad; }
.stage { width: 100%; padding: 8px; }
.st-shell {
  position: relative;
  width: min(100%, 960px);
  margin: 0 auto;
  border: 1px solid var(--st-line);
  border-radius: var(--st-radius);
  background: var(--st-surface);
  box-shadow: inset 0 1px rgba(255,255,255,.055), 0 24px 64px rgba(0,0,0,.34);
  backdrop-filter: blur(24px) saturate(1.22);
  -webkit-backdrop-filter: blur(24px) saturate(1.22);
  overflow: hidden;
  animation: stEnter 420ms var(--st-ease) both;
}
.topbar {
  min-height: 58px;
  display: grid;
  grid-template-columns: minmax(0,1fr) auto;
  align-items: center;
  gap: 12px;
  padding: 10px 12px 10px 16px;
  border-bottom: 1px solid var(--st-line);
}
.scene { min-width: 0; }
.scene b {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--st-text);
  font: 500 15px/1.3 var(--st-font-serif);
}
.scene span { display: block; margin-top: 3px; color: var(--st-muted); font-size: 10px; }
.toolbar { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  appearance: none;
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  padding: 0;
  border: 0;
  border-radius: var(--st-control-radius);
  color: #aaa59e;
  background: transparent;
  box-shadow: inset 0 0 0 1px transparent;
  cursor: pointer;
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.icon-btn:hover, .icon-btn:focus-visible {
  color: var(--st-text);
  background: rgba(255,255,255,.052);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.075);
  outline: none;
}
.icon-btn:active { transform: scale(.94); }
.icon-btn:disabled { opacity: .3; cursor: default; transform: none; }
.icon-btn.primary {
  color: #19140e;
  background: linear-gradient(180deg, #e2cb99, #c5a263);
  box-shadow: inset 0 1px rgba(255,255,255,.35), 0 5px 16px rgba(171,132,65,.16);
}
.role-strip {
  min-height: 48px;
  display: grid;
  grid-template-columns: minmax(0,1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--st-line);
}
.role-quick {
  display: grid;
  grid-template-columns: repeat(6, minmax(48px, 1fr));
  gap: 5px;
  min-width: 0;
}
.role-chip {
  min-width: 0;
  height: 30px;
  padding: 0 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border: 0;
  border-radius: var(--st-control-radius);
  color: #aaa59e;
  background: rgba(255,255,255,.026);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.055);
  cursor: pointer;
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.role-chip:hover { color: var(--st-text); background: rgba(255,255,255,.052); }
.role-chip:active { transform: scale(.97); }
.role-chip.active {
  color: #1b160f;
  background: linear-gradient(180deg, #e2ca94, #c6a363);
  box-shadow: inset 0 1px rgba(255,255,255,.34), 0 4px 14px rgba(173,135,70,.14);
}
.role-count { color: #716e69; font-size: 10px; white-space: nowrap; }
.content {
  display: grid;
  grid-template-columns: minmax(0,1.15fr) minmax(260px,.85fr);
  gap: 0;
}
.primary-pane, .detail-pane { min-width: 0; padding: 16px; }
.detail-pane { border-left: 1px solid var(--st-line); background: rgba(255,255,255,.012); }
.identity { display: flex; align-items: center; gap: 12px; min-width: 0; }
.monogram {
  width: 38px;
  height: 38px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  border-radius: var(--st-control-radius);
  color: #dac69e;
  background: linear-gradient(145deg, rgba(215,188,130,.16), rgba(255,255,255,.025));
  box-shadow: inset 0 0 0 1px rgba(215,188,130,.18);
  font: 500 15px var(--st-font-serif);
}
.identity-copy { min-width: 0; }
.identity-copy h2 {
  margin: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font: 500 19px/1.25 var(--st-font-serif);
}
.identity-copy p { margin: 4px 0 0; color: var(--st-muted); font-size: 10px; }
.metrics { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 5px 14px; margin-top: 16px; }
.metric { min-width: 0; padding: 9px 0; border-top: 1px solid rgba(255,255,255,.048); }
.metric-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; color: #aaa59e; font-size: 10px; }
.metric-head b { color: #ddd2bf; font-size: 11px; font-weight: 600; }
.track { height: 3px; margin-top: 8px; overflow: hidden; border-radius: 3px; background: rgba(255,255,255,.065); }
.track i { display: block; width: 0; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #806d52, var(--st-gold)); transition: width 600ms var(--st-ease); }
.relation-line { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 13px; }
.tag { padding: 4px 7px; border-radius: 4px; color: #bcb4a7; background: rgba(255,255,255,.035); box-shadow: inset 0 0 0 1px rgba(255,255,255,.055); font-size: 10px; }
.fact { display: grid; grid-template-columns: 64px minmax(0,1fr); gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,.045); }
.fact:last-child { border-bottom: 0; }
.fact span { color: #77746f; font-size: 10px; }
.fact b { min-width: 0; color: #d8d1c6; font-size: 11px; font-weight: 500; overflow-wrap: anywhere; }
.actions {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 12px;
  border-top: 1px solid var(--st-line);
}
.command-btn {
  appearance: none;
  min-height: 34px;
  padding: 7px 11px;
  border: 0;
  border-radius: var(--st-control-radius);
  color: #c6bfb3;
  background: rgba(255,255,255,.035);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.065);
  cursor: pointer;
  transition: color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.command-btn:hover { color: var(--st-text); background: rgba(255,255,255,.06); box-shadow: inset 0 0 0 1px rgba(255,255,255,.09); }
.command-btn:active { transform: scale(.97); }
.command-btn:disabled { opacity: .35; cursor: default; transform: none; }
.action-note { margin-left: auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #6f6c67; font-size: 9px; }
.role-picker {
  position: absolute;
  z-index: 20;
  top: 54px;
  right: 10px;
  width: min(340px, calc(100% - 20px));
  max-height: min(380px, 82vw);
  display: none;
  padding: 8px;
  border: 1px solid var(--st-line-strong);
  border-radius: var(--st-radius);
  background: rgba(18,18,20,.96);
  box-shadow: inset 0 1px rgba(255,255,255,.05), 0 22px 56px rgba(0,0,0,.5);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.role-picker.open { display: block; animation: pickerIn 240ms var(--st-ease) both; }
.role-search {
  width: 100%;
  height: 34px;
  padding: 0 10px;
  border: 0;
  border-radius: var(--st-control-radius);
  outline: none;
  color: var(--st-text);
  background: rgba(255,255,255,.045);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.07);
}
.role-search:focus { box-shadow: inset 0 0 0 1px rgba(215,188,130,.34), 0 0 0 2px rgba(215,188,130,.07); }
.role-list { display: grid; gap: 3px; margin-top: 7px; max-height: 300px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(215,188,130,.3) transparent; }
.role-option { min-height: 34px; padding: 7px 9px; border: 0; border-radius: var(--st-control-radius); color: #bdb6ab; background: transparent; text-align: left; cursor: pointer; }
.role-option:hover, .role-option.active { color: var(--st-text); background: rgba(255,255,255,.05); }
.toast { position: fixed; left: 50%; bottom: 14px; z-index: 40; max-width: calc(100% - 24px); padding: 8px 11px; border: 1px solid var(--st-line); border-radius: var(--st-control-radius); color: var(--st-text); background: rgba(18,18,20,.94); box-shadow: 0 12px 34px rgba(0,0,0,.36); opacity: 0; transform: translate(-50%,8px); pointer-events: none; transition: opacity 180ms ease, transform 180ms ease; }
.toast.show { opacity: 1; transform: translate(-50%,0); }
@keyframes stEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes pickerIn { from { opacity: 0; transform: translateY(-6px) scale(.98); } to { opacity: 1; transform: none; } }
@media (max-width: 720px) {
  .stage { padding: 6px; }
  .content { grid-template-columns: 1fr; }
  .detail-pane { border-left: 0; border-top: 1px solid var(--st-line); }
  .role-quick { grid-template-columns: repeat(4,minmax(42px,1fr)); }
  .role-chip:nth-child(n+5) { display: none; }
  .actions { flex-wrap: wrap; }
  .action-note { flex: 1 0 100%; margin-left: 0; }
}
@media (max-width: 420px) {
  .topbar { padding-left: 12px; }
  .primary-pane, .detail-pane { padding: 13px 12px; }
  .metrics { grid-template-columns: 1fr 1fr; column-gap: 10px; }
  .scene span { max-width: 22em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
}

/* C2 premium glass: shared material language with the cover surface. */
:root {
  --st-btn-bg: linear-gradient(180deg, rgba(61,63,69,.72), rgba(27,28,32,.88));
  --st-btn-edge: rgba(255,255,255,.11);
  --st-btn-edge-hover: rgba(227,201,151,.26);
  --st-btn-highlight: rgba(255,255,255,.32);
  --st-btn-shadow: inset 0 1px rgba(255,255,255,.115), inset 0 -1px rgba(0,0,0,.5), 0 7px 17px rgba(0,0,0,.25);
  --st-btn-active-shadow: inset 0 2px 5px rgba(0,0,0,.42), 0 3px 8px rgba(0,0,0,.24);
  --st-card-bg: linear-gradient(155deg, rgba(255,255,255,.048), rgba(255,255,255,.016));
  --st-card-shadow: inset 0 1px rgba(255,255,255,.065), 0 14px 30px rgba(0,0,0,.22);
  --st-focus: rgba(218,184,119,.42);
}
.stage { container-type: inline-size; }
.st-shell {
  border-color: rgba(255,255,255,.105);
  background:
    linear-gradient(145deg, rgba(255,255,255,.055), transparent 28%),
    linear-gradient(150deg, rgba(35,37,41,.84), rgba(10,11,14,.92));
  box-shadow: inset 0 1px rgba(255,255,255,.09), 0 28px 70px rgba(0,0,0,.46);
  backdrop-filter: blur(26px) saturate(1.25);
  -webkit-backdrop-filter: blur(26px) saturate(1.25);
}
.topbar,
.role-strip,
.actions { border-color: rgba(255,255,255,.075); }
.icon-btn,
.command-btn,
.role-chip {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--st-btn-edge);
  border-radius: 8px;
  color: #dedbd5;
  background: var(--st-btn-bg);
  box-shadow: var(--st-btn-shadow);
  backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  transition: transform 220ms var(--st-ease), border-color 220ms ease, box-shadow 220ms ease, filter 220ms ease, color 220ms ease;
}
.icon-btn::before,
.command-btn::before,
.role-chip::before {
  content: "";
  position: absolute;
  top: 0;
  right: 10%;
  left: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--st-btn-highlight), transparent);
  pointer-events: none;
}
.icon-btn:hover,
.command-btn:hover,
.role-chip:hover {
  color: var(--st-text);
  border-color: var(--st-btn-edge-hover);
  background: var(--st-btn-bg);
  box-shadow: inset 0 1px rgba(255,255,255,.16), inset 0 -1px rgba(0,0,0,.55), 0 12px 25px rgba(0,0,0,.34);
  filter: brightness(1.1);
  transform: translateY(-2px);
}
.icon-btn:active,
.command-btn:active,
.role-chip:active {
  filter: none;
  transform: translateY(1px) scale(.98);
  box-shadow: var(--st-btn-active-shadow);
}
.icon-btn:focus-visible,
.command-btn:focus-visible,
.role-chip:focus-visible {
  outline: none;
  border-color: var(--st-focus);
  box-shadow: var(--st-btn-shadow), 0 0 0 3px rgba(218,184,119,.12);
}
.icon-btn:disabled,
.command-btn:disabled,
.role-chip:disabled {
  opacity: .38;
  cursor: not-allowed;
  filter: saturate(.55);
  transform: none;
  box-shadow: inset 0 1px rgba(255,255,255,.055), 0 4px 10px rgba(0,0,0,.18);
}
.icon-btn { width: 36px; height: 36px; }
.icon-btn.primary,
.command-btn.primary {
  color: #241a0e;
  border-color: rgba(230,202,146,.58);
  background: linear-gradient(180deg, #f0d9a8 0%, #d0ad69 48%, #a97b39 100%);
  box-shadow: inset 0 1px #fff4d3, inset 0 -2px rgba(87,49,12,.38), 0 9px 24px rgba(183,135,59,.25);
}
.icon-btn.primary:hover,
.command-btn.primary:hover {
  border-color: #f1d9a6;
  box-shadow: inset 0 1px #fff8df, inset 0 -2px rgba(87,49,12,.38), 0 13px 30px rgba(183,135,59,.34), 0 0 20px rgba(207,168,97,.09);
}
.role-quick { gap: 7px; }
.role-chip { height: 34px; }
.role-chip::after {
  content: "";
  display: inline-block;
  width: 5px;
  height: 5px;
  margin-left: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.2);
  vertical-align: 1px;
}
.role-chip.active {
  color: #f0e8d8;
  border-color: rgba(215,180,112,.3);
  background: linear-gradient(180deg, rgba(104,86,57,.57), rgba(38,32,25,.9));
  box-shadow: inset 0 1px rgba(255,239,204,.12), 0 9px 20px rgba(0,0,0,.3), 0 0 0 1px rgba(212,175,105,.055);
}
.role-chip.active::after { background: var(--st-gold); box-shadow: 0 0 9px rgba(217,184,120,.55); }
.primary-pane,
.detail-pane { background: transparent; }
.detail-pane { border-color: rgba(255,255,255,.075); }
.monogram {
  width: 42px;
  height: 42px;
  border: 1px solid rgba(223,188,121,.2);
  border-radius: 8px;
  background: linear-gradient(155deg, rgba(225,190,123,.15), rgba(255,255,255,.025));
  box-shadow: inset 0 1px rgba(255,245,222,.11), 0 8px 20px rgba(0,0,0,.25);
}
.metric {
  padding: 10px;
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 7px;
  background: rgba(0,0,0,.2);
  box-shadow: inset 0 2px 8px rgba(0,0,0,.28);
}
.track { background: rgba(255,255,255,.07); }
.track i {
  background: linear-gradient(90deg, #9f783d, #dfbf7d);
  box-shadow: 0 0 8px rgba(216,177,102,.28);
}
.tag,
.fact {
  border-color: rgba(255,255,255,.06);
  background: linear-gradient(150deg, rgba(255,255,255,.035), rgba(0,0,0,.12));
}
.fact { margin-bottom: 6px; padding: 9px 10px; border: 1px solid rgba(255,255,255,.06); border-radius: 7px; }
.fact:last-child { border-bottom: 1px solid rgba(255,255,255,.06); }
.command-btn { min-height: 38px; padding: 8px 14px; }
.role-picker,
.status-state {
  border-color: rgba(255,255,255,.105);
  background: linear-gradient(150deg, rgba(35,37,41,.94), rgba(10,11,14,.98));
  box-shadow: inset 0 1px rgba(255,255,255,.09), 0 24px 58px rgba(0,0,0,.48);
}
.role-search {
  min-height: 40px;
  border: 1px solid rgba(255,255,255,.08);
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.16));
  box-shadow: inset 0 2px 8px rgba(0,0,0,.28), inset 0 1px rgba(255,255,255,.04);
}
.role-search:focus { border-color: var(--st-focus); box-shadow: inset 0 2px 8px rgba(0,0,0,.28), 0 0 0 3px rgba(218,184,119,.1); }
@container (max-width: 760px) {
  .content { grid-template-columns: 1fr; }
  .detail-pane { border-left: 0; border-top: 1px solid rgba(255,255,255,.075); }
  .role-strip { grid-template-columns: minmax(0,1fr) auto; }
  .role-quick { display: flex; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x proximity; }
  .role-quick::-webkit-scrollbar { display: none; }
  .role-chip { flex: 0 0 auto; min-width: 88px; scroll-snap-align: start; }
  .role-chip:nth-child(n+5) { display: block; }
}
@container (max-width: 480px) {
  .metrics { grid-template-columns: 1fr; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; }
  .action-note { grid-column: 1 / -1; margin-left: 0; }
  .command-btn { min-height: 40px; }
}
@media (max-width: 760px) {
  .stage { padding: 6px; }
  .content { grid-template-columns: 1fr; }
  .role-quick { display: flex; overflow-x: auto; }
  .role-chip:nth-child(n+5) { display: block; }
}
@media (max-width: 480px) {
  .topbar { padding-left: 12px; }
  .metrics { grid-template-columns: 1fr; }
  .icon-btn,
  .command-btn { min-height: 40px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
</head>
<body>
<div class="status-state status-loading show" id="statusState" role="status" aria-live="polite">正在读取状态…</div>
<div class="stage" id="stage" hidden>
  <section class="st-shell" id="root">
    <header class="topbar">
      <div class="scene"><b id="scene">—</b><span id="sceneMeta">—</span></div>
      <div class="toolbar">
        <button class="icon-btn" id="btnPrevRole" type="button" title="上一位" aria-label="上一位角色">‹</button>
        <button class="icon-btn primary" id="btnRolePicker" type="button" title="全部角色" aria-label="全部角色">⌘</button>
        <button class="icon-btn" id="btnNextRole" type="button" title="下一位" aria-label="下一位角色">›</button>
      </div>
    </header>
    <nav class="role-strip" aria-label="当前出场角色">
      <div class="role-quick" id="roleQuick"></div>
      <span class="role-count" id="roleCount">0 人</span>
    </nav>
    <div class="content">
      <section class="primary-pane">
        <div class="identity">
          <div class="monogram" id="monogram">—</div>
          <div class="identity-copy"><h2 id="name">—</h2><p id="work">—</p></div>
        </div>
        <div class="metrics" id="metrics"></div>
        <div class="relation-line"><span class="tag" id="relation">陌路</span><span class="tag" id="phase">初见</span></div>
      </section>
      <section class="detail-pane">
        <div class="fact"><span>此刻</span><b id="mood">—</b></div>
        <div class="fact"><span>目标</span><b id="goal">—</b></div>
        <div class="fact"><span>判断</span><b id="judgement">—</b></div>
        <div class="fact"><span>边界</span><b id="boundary">—</b></div>
        <div class="fact"><span>污秽</span><b id="filthType">—</b></div>
      </section>
    </div>
    <footer class="actions">
      <button type="button" class="command-btn" id="btnDraw">枢纽抽卡</button>
      <button type="button" class="command-btn primary" id="btnTogether">相聚一刻</button>
      <div class="action-note" id="drawNote"></div>
    </footer>
    <aside class="role-picker" id="rolePicker" aria-label="全部角色">
      <input class="role-search" id="roleSearch" type="search" placeholder="搜索当前出场角色" autocomplete="off" />
      <div class="role-list" id="roleList"></div>
    </aside>
  </section>

let activeRoleName = "";
let currentStat = {};
let updateHandle = null;
let destroyed = false;
const animationFrames = new Set();

function frame(callback) {
  const id = requestAnimationFrame(time => {
    animationFrames.delete(id);
    if (!destroyed) callback(time);
  });
  animationFrames.add(id);
  return id;
}

function isDemo() {
  try { return /(?:\?|&)demo=1(?:&|$)/.test(location.search) || location.hash === "#demo"; }
  catch (_) { return false; }
}

function getPath(source, path, fallback) {
  try { return typeof _ !== "undefined" ? _.get(source, path, fallback) : path.split(".").reduce((v, key) => v && v[key], source) ?? fallback; }
  catch (_) { return fallback; }
}

function resolveMvu() {
  try { return window.Mvu || (window.parent && window.parent.Mvu) || null; }
  catch (_) { return null; }
}

function currentMessageId() {
  try { if (typeof getCurrentMessageId === "function") return getCurrentMessageId(); } catch (_) {}
  try { if (window.parent && typeof window.parent.getCurrentMessageId === "function") return window.parent.getCurrentMessageId(); } catch (_) {}
  throw new Error("无法确定状态栏所在楼层");
}

function readStat() {
  if (isDemo()) return DEMO_STAT;
  const Mvu = resolveMvu();
  if (!Mvu || typeof Mvu.getMvuData !== "function") throw new Error("MVU 尚未初始化");
  return getPath(Mvu.getMvuData({ type: "message", message_id: currentMessageId() }), "stat_data", {});
}

function presentRoles(stat) {
  const names = getPath({ stat_data: stat }, "stat_data.世界.出场角色", []);
  const roles = getPath({ stat_data: stat }, "stat_data.角色", {});
  return [...new Set(Array.isArray(names) ? names.map(String).map(n => n.trim()).filter(Boolean) : [])]
    .filter(name => roles && typeof roles[name] === "object");
}

function getRoleState(stat, name) {
  const roles = stat && stat.角色;
  return roles && typeof roles[name] === "object" ? roles[name] : {};
}

function setDataState(state, detail = "") {
  const ids = { loading: "statusState", empty: "emptyState", error: "errorState" };
  Object.values(ids).forEach(id => document.getElementById(id).classList.remove("show"));
  document.getElementById("stage").hidden = state !== "ready";
  if (ids[state]) document.getElementById(ids[state]).classList.add("show");
  if (state === "error") {
    document.getElementById("errorCopy").textContent = "状态暂不可用。";
    if (detail) console.error(detail);
  }
}

function clamp(value) { return Math.max(0, Math.min(100, Number(value) || 0)); }

function renderRoleSwitcher(names, activeName) {
  const quick = document.getElementById("roleQuick");
  const list = document.getElementById("roleList");
  const query = document.getElementById("roleSearch").value.trim().toLowerCase();
  quick.innerHTML = names.slice(0, 6).map(name => `<button type="button" class="role-chip${name === activeName ? " active" : ""}" data-role="${escapeHtml(name)}" title="${escapeHtml(name)}">${escapeHtml(name)}</button>`).join("");
  list.innerHTML = names.filter(name => !query || name.toLowerCase().includes(query)).map(name => `<button type="button" class="role-option${name === activeName ? " active" : ""}" data-role="${escapeHtml(name)}">${escapeHtml(name)}</button>`).join("");
  document.getElementById("roleCount").textContent = `${names.length} 人`;
  quick.querySelectorAll("[data-role]").forEach(btn => btn.addEventListener("click", () => selectRole(btn.dataset.role)));
  list.querySelectorAll("[data-role]").forEach(btn => btn.addEventListener("click", () => { selectRole(btn.dataset.role); closeRolePicker(); }));
}

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);
}

function renderRoleState(role) {
  document.getElementById("monogram").textContent = activeRoleName.slice(0, 1) || "—";
  document.getElementById("name").textContent = activeRoleName || "—";
  document.getElementById("work").textContent = role.作品 || "作品未记录";
  document.getElementById("relation").textContent = role.与user关系 || "陌路";
  document.getElementById("phase").textContent = role.仪式阶段 || "初见";
  document.getElementById("mood").textContent = role.当前心态 || "暂无明显变化";
  document.getElementById("goal").textContent = role.当前目标 || "暂无记录";
  document.getElementById("judgement").textContent = role.对user判断 || "尚未形成判断";
  document.getElementById("boundary").textContent = role.当前边界 || "尚未说明";
  document.getElementById("filthType").textContent = role.污秽类型 || "未记录";
  const metrics = document.getElementById("metrics");
  metrics.innerHTML = STAT_META.map(key => {
    const value = clamp(role[key]);
    return `<div class="metric"><div class="metric-head"><span>${key}</span><b>${value}</b></div><div class="track"><i data-value="${value}"></i></div></div>`;
  }).join("");
  frame(() => metrics.querySelectorAll(".track i").forEach(bar => { bar.style.width = `${bar.dataset.value}%`; }));
}

function selectRole(name) {
  const names = presentRoles(currentStat);
  if (!names.includes(name)) return;
  activeRoleName = name;
  renderRoleSwitcher(names, activeRoleName);
  renderRoleState(getRoleState(currentStat, activeRoleName));
}

function populateCharacterData() {
  try {
    currentStat = readStat();
    const names = presentRoles(currentStat);
    if (!names.length) { activeRoleName = ""; setDataState("empty"); return; }
    if (!names.includes(activeRoleName)) activeRoleName = names[0];
    const world = currentStat.世界 || {};
    document.getElementById("scene").textContent = world.场景 || world.教会名 || "当前场景";
    document.getElementById("sceneMeta").textContent = [world.相遇方式, world.回合 ? `第 ${world.回合} 回合` : ""].filter(Boolean).join(" · ") || "圣堂记录";
    renderRoleSwitcher(names, activeRoleName);
    renderRoleState(getRoleState(currentStat, activeRoleName));
    setDataState("ready");
  } catch (error) {
    setDataState("error", error && error.message ? error.message : String(error));
  }
}

function roleStep(delta) {
  const names = presentRoles(currentStat);
  if (!names.length) return;
  const index = Math.max(0, names.indexOf(activeRoleName));
  selectRole(names[(index + delta + names.length) % names.length]);
}

function openRolePicker() { document.getElementById("rolePicker").classList.add("open"); document.getElementById("roleSearch").focus(); }
function closeRolePicker() { document.getElementById("rolePicker").classList.remove("open"); }

async function bind() {
  setDataState("loading");
  if (!isDemo() && typeof waitGlobalInitialized === "function") await waitGlobalInitialized("Mvu");
  if (!isDemo() && typeof waitUntil === "function") {
    await waitUntil(() => {
      const Mvu = resolveMvu();
      if (!Mvu || typeof Mvu.getMvuData !== "function") return false;
      return getPath(Mvu.getMvuData({ type: "message", message_id: currentMessageId() }), "stat_data", null) != null;
    });
  }
  if (destroyed) return;
  populateCharacterData();
  document.getElementById("btnPrevRole").addEventListener("click", () => roleStep(-1));
  document.getElementById("btnNextRole").addEventListener("click", () => roleStep(1));
  document.getElementById("btnRolePicker").addEventListener("click", () => document.getElementById("rolePicker").classList.contains("open") ? closeRolePicker() : openRolePicker());
  document.getElementById("roleSearch").addEventListener("input", () => renderRoleSwitcher(presentRoles(currentStat), activeRoleName));
  document.getElementById("btnDraw").addEventListener("click", onDrawEncounter);
  document.getElementById("btnTogether").addEventListener("click", onTogetherMoment);
  document.addEventListener("click", event => { if (!event.target.closest("#rolePicker") && !event.target.closest("#btnRolePicker")) closeRolePicker(); });
  try {
    const Mvu = resolveMvu();
    if (destroyed) return;
    if (Mvu && Mvu.events && Mvu.events.VARIABLE_UPDATE_ENDED && typeof eventOn === "function") {
      updateHandle = eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, () => { if (!destroyed) populateCharacterData(); });
    }
  } catch (error) { console.error(error); }
}

function toast(message) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.classList.add("show");
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
}

function getTriggerSlash() {
  try { if (window.parent && typeof window.parent.triggerSlash === "function") return window.parent.triggerSlash.bind(window.parent); } catch (_) {}
  try { if (window.top && typeof window.top.triggerSlash === "function") return window.top.triggerSlash.bind(window.top); } catch (_) {}
  try { if (typeof triggerSlash === "function") return triggerSlash; } catch (_) {}
  return null;
}

function dispatchSend(text) {
  const trigger = getTriggerSlash();
  if (!trigger) return Promise.resolve(false);
  const safe = String(text || "").replace(/<\/?q>/gi, "").trim().replace(/\|/g, "｜");
  return Promise.resolve(trigger(`/send ${safe}|/trigger`)).then(() => true);
}

function jsonPointerSegment(value) {
  return String(value == null ? "" : value).replace(/~/g, "~0").replace(/\//g, "~1");
}

function presentNames(stat) { return new Set(presentRoles(stat)); }

function pickRosterChar(stat) {
  const pool = Array.isArray(ROSTER) ? ROSTER.filter(role => role && role.name) : [];
  const taken = presentNames(stat);
  const available = pool.filter(role => !taken.has(role.name));
  if (!available.length) return null;
  return available[Math.floor(Math.random() * available.length)];
}

function buildEncounterPrompt(character, stat) {
  const world = stat.世界 || {};
  const roles = stat.角色 || {};
  const present = presentRoles(stat);
  const existing = roles[character.name];
  const roleValue = existing || {
    作品: character.work || "未知作品", 是否自定义: false, 污秽类型: character.filth_seed || "异界残留的污秽气息",
    污秽度: 40, 信任: 10, 好感度: 5, 堕落值: 5, 依存度: 0, 仪式阶段: "初见", 与user关系: "陌路",
    当前心态: "保持戒备并判断环境", 当前目标: "确认污秽来源并保全自身", 对user判断: "能力与动机待验证", 当前边界: "不接受未经说明的私密接触",
  };
  const rolePath = jsonPointerSegment(character.name);
  const insertRole = existing ? "" : `{ \"op\": \"insert\", \"path\": \"/角色/${rolePath}\", \"value\": ${JSON.stringify(roleValue)} },`;
  return [
    "【圣堂初遇｜偶遇】承接当前剧情，不重置主线或已有角色。",
    `新人：${character.name}（${character.work || "未知作品"}）；当前场景：${world.场景 || world.教会名 || "圣言堂"}；同场：${present.join("、") || "暂无"}。`,
    "先写新人的独立目的、戒备和入场反应，再写与{{user}}及实际在场者的交集。口吻贴原作，不围着讨好{{user}}转；禁止捷径吹捧、秒信/奉承和无事件亲密跳变。",
    "末尾输出一个 <UpdateVariable>。首次出现先建立独立角色档案，再把姓名加入出场数组；已有档案不得覆盖。关系数值仅按该角色实际感知更新，无依据则不更新。",
    `<JSONPatch>[${insertRole}{ \"op\": \"insert\", \"path\": \"/世界/出场角色/-\", \"value\": ${JSON.stringify(character.name)} }]</JSONPatch>`,
  ].join("\n\n");
}

function buildTogetherPrompt(stat) {
  const present = presentRoles(stat);
  const focus = activeRoleName || present[0] || "当前角色";
  const role = getRoleState(stat, focus);
  const focusPath = jsonPointerSegment(focus);
  return [
    "【圣堂初遇｜相聚一刻】承接当前剧情，不重置变量或新增无关人物。",
    `当前场景：${getPath(stat, "世界.场景", "圣言堂")}；焦点：${focus}；同场：${present.join("、") || "暂无"}。`,
    `焦点角色目标：${role.当前目标 || "未记录"}；判断：${role.对user判断 || "未形成"}；边界：${role.当前边界 || "未说明"}。`,
    "先推进各角色自己的目标与风险判断，再写相处。多人可以产生不同甚至冲突的反应；不围着讨好{{user}}转，禁止捷径吹捧和秒信/奉承。",
    `变量只更新实际感知并产生反应的 /角色/${focusPath} 或其他明确参与者；每项变化必须有各自依据，无依据则不更新。未出场角色保持不变。`,
  ].join("\n\n");
}

let drawing = false;
function setActionBusy(value) {
  drawing = !!value;
  document.getElementById("btnDraw").disabled = drawing;
  document.getElementById("btnTogether").disabled = drawing;
}

async function onDrawEncounter() {
  if (drawing) return;
  const character = pickRosterChar(currentStat);
  if (!character) { toast("当前没有可加入的角色"); return; }
  setActionBusy(true);
  document.getElementById("drawNote").textContent = `正在安排 ${character.name} 入场`;
  try {
    const sent = await dispatchSend(buildEncounterPrompt(character, currentStat));
    toast(sent ? `已安排 ${character.name} 入场` : `预览角色：${character.name}`);
  } catch (error) { console.error(error); toast("发送失败，请重试"); }
  document.getElementById("drawNote").textContent = "";
  setActionBusy(false);
}

async function onTogetherMoment() {
  if (drawing || !presentRoles(currentStat).length) return;
  setActionBusy(true);
  document.getElementById("drawNote").textContent = "正在推进当前场景";
  try {
    const sent = await dispatchSend(buildTogetherPrompt(currentStat));
    toast(sent ? "已发送相聚一刻" : "当前为界面预览");
  } catch (error) { console.error(error); toast("发送失败，请重试"); }
  document.getElementById("drawNote").textContent = "";
  setActionBusy(false);
}

window.addEventListener("pagehide", () => {
  destroyed = true;
  if (updateHandle && typeof updateHandle.stop === "function") updateHandle.stop();
  updateHandle = null;
  animationFrames.forEach(id => cancelAnimationFrame(id));
  animationFrames.clear();
  if (toast.timer) clearTimeout(toast.timer);
});

if (typeof errorCatched === "function") $(errorCatched(bind));
else bind().catch(error => setDataState("error", error && error.message ? error.message : String(error)));
</script>
</body>
</html>
