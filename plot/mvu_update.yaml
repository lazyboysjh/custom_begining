变量更新规则:
  世界:
    相遇方式: 开局后只读，勿改
    场景: 地点变化时 replace
    教会名: 极少改动
    回合: 每完成一轮主要互动 +1（delta 1）
    同场角色: 枢纽抽卡/新角色入场时，用顿号拼接姓名并去重；勿清空已有名单
  主角:
    姓名/身份/能力摘要: 开局后只读
    表面作风/私下心思: 人设偏移时才 replace
    年龄外观/性格倾向: 一般不改
  初遇:
    姓名/作品/是否自定义: 开局后只读（抽卡新人写入同场角色，不覆盖初遇姓名）
    污秽类型: 揭示新信息时可 replace
    污秽度: 0-100；净化成功降，侵蚀加深升
    信任: 0-100；兑现承诺/专业安抚升，露馅越界可降
    好感度: 0-100；温柔对待/共情升，侮辱强迫可降
    堕落值: 0-100；接受越界仪式/情欲暗示升；坚决抵抗或彻底净化可降
    依存度: 0-100；把{{user}}当唯一依靠时升；重获自主感可降
    仪式阶段: 短词，如 初见/检查/仪式中/余韵/结束
    与user关系: 两到四字，如 陌路/求助者/半信半疑/依存
    当前心态: 一两句口语，写此刻未说出口的状态；禁止元叙事
