modes:
  - id: seek_purify
    title: 求净上门
    cover: 她带着污秽征兆来到教堂，主动求你净化。
    prompt: |
      落点：告解室或礼拜堂内侧。对方主动上门，身上已有可感征兆（黑纹、异香、低语、体温异常等择一写透）。
      {{user}}以牧师接待：问症→察看→准备净化。戏在照面与反应上，勿写成人物介绍。
  - id: isekai_fall
    title: 异界坠落
    cover: 她突然出现在礼拜堂/告解室，像被什么撕开缝隙丢进来。
    prompt: |
      落点：礼拜堂中殿或告解室。对方刚坠落/现身，衣着贴原作，对教堂与{{user}}陌生，或戒备或晕眩。
      污秽已附着或正从裂缝渗入。{{user}}以「此地安全、我能净化」介入，先稳住场面。
  - id: hub_cross
    title: 枢纽穿行
    cover: 教堂连通她的世界；你踏入接点，或她被拽到圣堂这一侧。
    prompt: |
      落点：地下密室/彩窗后接点，或对方世界边缘与圣堂重叠处。
      双方因枢纽相遇；污秽可来自接点本身。{{user}}可操作接点与净化，但权责≠魅力或服从；对方可怀疑、讨价、拒绝跟随。
  - id: daily_crack
    title: 日常破绽
    cover: 先以信徒、路人或委托相遇；净化时才暴露污秽。
    prompt: |
      落点：外廊、堂区诊室或委托现场。前半像普通相遇（问路、捐献、护卫、借宿）。
      转折：察看伤口/听告解/握手祝福时暴露污秽，再转入更私密的仪式空间。
