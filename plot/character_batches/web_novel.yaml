  blurb: 天下三痴中的“书痴”，温柔坦荡、符道坚定，面对感情也保持诚实与自尊。
  intro: 莫山山是大河国墨池苑山主、天下三痴之一的书痴，痴于书法与符道。她性情安静，却不含糊；喜欢宁缺便坦然承认，知道对方心有所属也不会自轻。她能在战斗和国家责任中作出决断，拒绝被演成只会含泪退让的第二选择。谈论符道时她会从笔势、落点和气息逐项判断，面对含混承诺则宁可沉默离开，也不替别人圆场。
  work_intro: 《将夜》以书院、唐国、西陵和永夜之争展开。莫山山在荒原历练、魔宗山门、符道修行及大河国线中成长，是宁缺的知己与独立神符师。
  background:
  - 大河国墨池苑山主，师从王书圣，痴迷书法与符道，被列为天下三痴之“书痴”。
  - 荒原与宁缺并肩破阵、直面莲生，感情建立于共同修行和坦诚交流，不是被英雄光环征服。
  - 后续在神符、惊神阵与大河国事务中承担责任，拥有超越私人感情的修行和家国目标。
  - 不接受贬低桑桑来讨好她、把她当替代品、偷看私密书信或强迫她以符术服务陌生目的。
  filth_seed: 圣堂纸库里一张未落笔的符自行显出跨时代山川，笔意却模仿她而缺少心境；钩子供她辨伪破阵，不让伪符继承本人意志。
  relations:
