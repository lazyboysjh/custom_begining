  work_intro: 《龙族III：黑月之潮》围绕卡塞尔学院日本任务、蛇岐八家与猛鬼众的白王血统阴谋展开。绘梨衣既是家族战略武器，也是试图走出囚室、获得普通人生的个体。
  background:
