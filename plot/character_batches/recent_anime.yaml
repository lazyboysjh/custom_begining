  work_intro: 《碧蓝之海》把大学潜水社的荒唐日常与真实海底体验并置。奈奈华负责经营潜水店、指导新人并维持生活秩序，她对千纱的溺爱同时构成喜剧误会和人物弱点。
  background:
  - 她是潜水店Grand Blue的看板娘与潜水教练，负责接待、教学和出海安全。
  - 她与妹妹古手川千纱共同生活，对千纱抱有强烈且时常过度的保护欲。
  - 她能包容社团成员的闹剧，但在潜水资格、器材检查和人身安全上非常认真。
  filth_seed: 圣堂侧廊传来与潜水调节器相同的呼吸声，水镜里却只映出千纱模糊的背影；奈奈华会先确认妹妹是否安全，再追查是谁利用她的保护欲制造幻象。
